/* ===================== GAME LIFECYCLE ===================== */
function buildQuestions(){
  const n = LENGTHS[state.lengthKey];
  let list = [];
  ["facile","moyen","difficile"].forEach(tier=>{
    const pool = shuffle(BANK[tier]);
    pool.slice(0,n).forEach(q=>{ list.push({ ...q, tier, shuffledOptions: shuffle(q.options) }); });
  });
  state.questions = shuffle(list);
}
function startGame(){
  if(state.mode==="group"){
    const valid = validTeams();
    if(valid.length<2){
      document.getElementById("setupError").textContent = "Ajoutez au moins deux joueurs avec un nom pour commencer.";
      return;
    }
    state.teams = valid;
    state.scores = valid.map(()=>0);
  } else {
    state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; state.soloCorrect = 0; displayedSoloScore = 0;
  }
  buildQuestions();
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function replayGame(){
  buildQuestions();
  if(state.mode==="group"){ state.scores = state.teams.map(()=>0); }
  else { state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; state.soloCorrect = 0; displayedSoloScore = 0; }
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;

}

}

/* ===================== PLAY ===================== */
function currentQ(){ return state.questions[state.currentIndex]; }

function confirmLeaveGame(){
  showModal({
    title:"Quitter la partie ?",
    message:"La partie en cours sera perdue.",
    okLabel:"Quitter", cancelLabel:"Rester", danger:true,
    onOk:()=>{ stopQTimer(); clearSavedGame(); goToModeSelect(); }
  });
}

function revealAnswer(){ stopQTimer(); state.revealed = true; justRevealed = true; playReveal(); render(); }

function soloAnswer(idx){
  if(state.revealed) return;
  stopQTimer();
  const q = currentQ();
  const opt = q.shuffledOptions[idx];
  state.soloSelected = opt;
  state.revealed = true;
  justRevealed = true;
  if(opt===q.correct){
    state.soloScore += TIER_INFO[q.tier].pts;
    state.soloCorrect += 1;
    state.soloStreak += 1;
    if(state.soloStreak > state.soloBestStreak) state.soloBestStreak = state.soloStreak;
    if(state.soloStreak>=3 && state.soloStreak%3===0){ playStreak(); } else { playCorrect(); }
  } else {
    state.soloStreak = 0;
    playIncorrect();
  }
  render();
}

function toggleAward(teamIdx){
  const q = currentQ();
  const pos = state.awarded.indexOf(teamIdx);
  if(pos>=0){ state.awarded.splice(pos,1); state.scores[teamIdx] -= TIER_INFO[q.tier].pts; }
  else { state.awarded.push(teamIdx); state.scores[teamIdx] += TIER_INFO[q.tier].pts; }
  render();
}
function adjustScore(teamIdx, delta){ const cap = maxPossibleScore(); state.scores[teamIdx] = Math.min(cap, Math.max(0, state.scores[teamIdx]+delta)); render(); }

function nextQuestion(){
  if(!state.revealed) return;
  if(state.currentIndex >= state.questions.length-1){
    state.screen = "end";
    render();
    playWin();
    launchConfetti();
    return;
  }
  state.currentIndex++;
  state.revealed = false; state.awarded = []; state.soloSelected = null; state.timedOut = false;
  render();
}

function rankedTeamIndices(){ return state.teams.map((t,i)=>i).sort((a,b)=>state.scores[b]-state.scores[a]); }
function computeRanks(){
  const ranked = rankedTeamIndices();
  const ranks = []; let prevScore=null, prevRank=0;
  ranked.forEach((teamIdx,pos)=>{
    const sc = state.scores[teamIdx];
    if(sc===prevScore){ ranks.push(prevRank); } else { ranks.push(pos+1); prevRank=pos+1; prevScore=sc; }
  });
  return ranked.map((teamIdx,pos)=>({teamIdx, rank:ranks[pos]}));
}
function maxPossibleScore(){ return state.questions.reduce((sum,q)=>sum+TIER_INFO[q.tier].pts,0); }
function soloPerformanceMessage(pct){
  if(pct>=85) return "Excellent ! Tu connais vraiment bien ta Bible.";
  if(pct>=65) return "Très bien ! Continue comme ça.";
  if(pct>=40) return "Bien joué, il y a de bonnes bases.";
  return "Beau début ! Chaque partie t'apprend un peu plus.";
}

function launchConfetti(){
  if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const old = document.getElementById("btConfetti"); if(old) old.remove();
  const cv = document.createElement("canvas");
  cv.id = "btConfetti";
  cv.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:55;";
  document.body.appendChild(cv);
  const ctx = cv.getContext("2d");
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const W = cv.width = window.innerWidth*dpr;
  const H = cv.height = window.innerHeight*dpr;
  const PALETTE = ["#F1502F","#EFAD26","#FFD968","#2FA96E","#4DA8FF","#FFF2D6"];
  const pieces = [];
  for(let i=0;i<64;i++){
    const spark = Math.random() < 0.25; // étincelles dorées lumineuses
    pieces.push({
      x: (0.5 + (Math.random()-0.5)*0.5)*W,
      y: H*0.52,
      vx: (Math.random()-0.5)*7.5*dpr,
      vy: -(6.5+Math.random()*7)*dpr,
      g: 0.15*dpr,
      w: (spark? 2.2+Math.random()*1.5 : 4.5+Math.random()*3.5)*dpr,
      h: (spark? 0 : 8+Math.random()*6)*dpr,
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5)*0.22,
      sway: Math.random()*Math.PI*2,
      color: spark ? "#FFD968" : PALETTE[i%PALETTE.length],
      spark
    });
  }
  const DUR = 2600, t0 = performance.now();
  function frame(now){
    const t = now - t0;
    ctx.clearRect(0,0,W,H);
    const fade = t > DUR-650 ? Math.max(0,(DUR-t)/650) : 1;
    for(const p of pieces){
      p.vy += p.g;
      p.x += p.vx + Math.sin(p.sway + t/320)*0.65*dpr;
      p.y += p.vy;
      p.rot += p.vrot;
      p.vx *= 0.996; if(p.vy>0) p.vy *= 0.996;
      ctx.save();
      ctx.globalAlpha = 0.94*fade;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.spark){
        ctx.shadowColor = "rgba(239,173,38,0.85)";
        ctx.shadowBlur = 7*dpr;
        ctx.beginPath(); ctx.arc(0,0,p.w,0,Math.PI*2); ctx.fill();
      } else if(ctx.roundRect){
        ctx.beginPath(); ctx.roundRect(-p.w/2,-p.h/2,p.w,p.h,2.2*dpr); ctx.fill();
      } else {
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      }
      ctx.restore();
    }
    if(t < DUR) requestAnimationFrame(frame);
    else cv.remove();
  }
  requestAnimationFrame(frame);
}

/* ===================== RENDER: PLAY ===================== */
let lastPlayedQ = -1;
let justRevealed = false;
let displayedSoloScore = 0;
function animateCount(el, from, to, duration, suffix){
  if(!el) return;
  suffix = suffix || "";
  if(from === to){ el.textContent = to + suffix; return; }
  const start = performance.now();
  function step(now){
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
    const val = Math.round(from + (to - from) * eased);
    el.textContent = val + suffix;
    if(t < 1) requestAnimationFrame(step);
    else el.textContent = to + suffix;
  }
  requestAnimationFrame(step);
}
function renderPlay(){
  const el = document.createElement("div");
  el.className = "screen";
  const q = currentQ();
  const info = TIER_INFO[q.tier];
  const total = state.questions.length;

  const fresh = (state.currentIndex !== lastPlayedQ);
  lastPlayedQ = state.currentIndex;
  const pop = justRevealed;
  justRevealed = false;

  const optionsHtml = q.shuffledOptions.map((opt,idx)=>{
    const letter = ["A","B","C","D"][idx];
    let cls = "option-btn";
    let trailingIcon = "";
    if(state.revealed){
      if(opt===q.correct){ cls+=" correct" + (pop?" reveal-pop":""); trailingIcon = `<span class="opt-icon">${ICONS.checkCircle}</span>`; }
      else if(state.mode==="solo" && opt===state.soloSelected){ cls+=" incorrect" + (pop?" reveal-shake":""); trailingIcon = `<span class="opt-icon">${ICONS.xCircle}</span>`; }
      else { cls+=" dim"; }
    }
    const interactive = state.mode==="solo" && !state.revealed;
    if(interactive){
      return `<button class="${cls}" onclick="soloAnswer(${idx})"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span></button>`;
    }
    return `<div class="${cls}"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span>${trailingIcon}</div>`;
  }).join("");

  let bottomHtml;
  if(state.mode==="group"){
    const ranked = rankedTeamIndices();
    bottomHtml = `
      ${state.revealed ? `<div class="fact-card${pop?' reveal-in':''}"><span class="ficon">${ICONS.bookOpen}</span><span class="ftext"><span class="fact-label">Le savais-tu ?</span>${escapeHtml(q.fact)}</span></div>` : `<button class="btn-reveal" onclick="revealAnswer()">Révéler la réponse</button>`}
      ${state.revealed ? `
        <div class="award-label">Qui a trouvé la bonne réponse ?</div>
        <div class="award-grid">
          ${state.teams.map((t,i)=>`
            <button class="award-btn ${state.awarded.includes(i)?'awarded':''}" onclick="toggleAward(${i})">
              <span class="team-token aw-token" style="background:linear-gradient(150deg, color-mix(in srgb, ${TEAM_COLORS[i%6]} 68%, #ffffff), ${TEAM_COLORS[i%6]})">${((t.name||"").trim().charAt(0).toUpperCase())||(i+1)}</span>
              <span class="aw-name">${escapeHtml(t.name)}</span>
              ${state.awarded.includes(i)?`<span class="aw-check" style="color:${TEAM_COLORS[i%6]}">${ICONS.checkCircle}</span>`:""}
              <span class="pts">+${info.pts}</span>
            </button>
          `).join("")}
        </div>
      ` : ""}
      ${state.revealed ? `<button class="btn-next${pop?' reveal-in':''}" onclick="nextQuestion()">${state.currentIndex>=total-1 ? "Voir les résultats" : "Question suivante"}</button>` : ""}
      <div class="flex-sp"></div>
      <div class="score-strip">
        ${ranked.map(i=>`
          <div class="score-pane">
            <span class="nm"><span class="dot-sm" style="background:${TEAM_COLORS[i%6]}"></span>${escapeHtml(state.teams[i].name)}</span>
            <span class="score-row">
              <button class="adj-btn" onclick="adjustScore(${i},-10)" aria-label="Retirer 10 points">−</button>
              <span class="sc">${state.scores[i]}</span>
              <button class="adj-btn" onclick="adjustScore(${i},10)" aria-label="Ajouter 10 points">+</button>
            </span>
          </div>
        `).join("")}
      </div>
    `;
  } else {
    bottomHtml = `
      ${state.timedOut && state.revealed ? `<div class="timeout-note${pop?' reveal-in':''}"><span class="ico">${ICONS.clock}</span>Temps écoulé !</div>` : ""}
      ${state.revealed ? `<div class="fact-card${pop?' reveal-in':''}"><span class="ficon">${ICONS.bookOpen}</span><span class="ftext"><span class="fact-label">Le savais-tu ?</span>${escapeHtml(q.fact)}</span></div>` : ""}
      ${state.revealed ? `<button class="btn-next${pop?' reveal-in':''}" onclick="nextQuestion()">${state.currentIndex>=total-1 ? "Voir les résultats" : "Question suivante"}</button>` : ""}
      <div class="flex-sp"></div>
      <div class="solo-score-bar"><span class="label">Score</span><span class="value" data-count-value>${state.soloScore} pts</span></div>
    `;
  }

  const streakHot = state.soloStreak >= 3;
  el.innerHTML = `
    ${renderHeader("BibleTrivia", true, "confirmLeaveGame()")}
    <div class="play-meta">
      <span class="tier-chip ${info.cls}">${tierDotsHtml(info.level)}${info.label} · ${info.pts} pts</span>
      <span class="q-counter">${state.currentIndex+1}/${total}</span>
      ${!state.revealed ? timerChipHtml(timerSecondsFor(state.timerKey)) : ""}
      ${state.mode==="solo" ? `<span class="streak-chip${streakHot?' hot':''}"><span class="ico">${ICONS.flame}</span>${state.soloStreak}</span>` : ""}
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${Math.round(((state.currentIndex + (state.revealed?1:0)) / total) * 100)}%"></div>
    </div>
    <div class="flex-sp"></div>
    <div class="question-card${fresh?' animate':''}"><div class="qtext">${escapeHtml(q.q)}</div></div>
    <div class="options-grid${fresh?' animate':''}">${optionsHtml}</div>
    ${bottomHtml}
  `;

  // Chrono : démarre sur chaque nouvelle question non révélée
  if(fresh && !state.revealed){
    const secs = timerSecondsFor(state.timerKey);
    startQTimer(secs, state.mode==="solo" ? soloTimeUp : groupTimeUp);
  }

  // Animate the solo score count-up when it changes
  if(state.mode==="solo"){
    const target = state.soloScore;
    const from = displayedSoloScore;
    displayedSoloScore = target;
    if(from !== target){
      requestAnimationFrame(()=>animateCount(el.querySelector("[data-count-value]"), from, target, 600, " pts"));
    }
  }
  return el;
}

  const barByRank = {1:"p1",2:"p2",3:"p3"};
  const podiumTeams = withRanks.slice(0,3);

  const podiumHtml = podiumTeams.length>=2 ? `
    <div class="podium">
      ${podiumOrder.filter(i=>i<podiumTeams.length).map(i=>{
        const r = podiumTeams[i];
        const initial = escapeHtml(state.teams[r.teamIdx].name.charAt(0).toUpperCase());
        return `
        <div class="podium-col">

      }).join("")}

  return `
    <div class="end-hero">
      <div class="end-medal"><span class="em-cup">${TROPHY_GOLD}</span></div>
      <div class="end-eyebrow">${winners.length>1 ? "Égalité" : "Vainqueur"}</div>

      <p class="end-sub">Bravo à tous — continuez à explorer la Parole.</p>
    </div>
    ${podiumHtml}
    <div class="rank-list">
      ${withRanks.map(r=>{
        const g = r.rank<=3 ? `g${r.rank}` : "";
        return `
        <div class="rank-row">
          <span class="rank-badge ${g}">${r.rank}</span>
          <span class="team-token rank-token" style="background:linear-gradient(150deg, color-mix(in srgb, ${TEAM_COLORS[r.teamIdx%6]} 68%, #ffffff), ${TEAM_COLORS[r.teamIdx%6]})">${((state.teams[r.teamIdx].name||"").trim().charAt(0).toUpperCase())||"?"}</span>
          <span class="rank-name">${escapeHtml(state.teams[r.teamIdx].name)}</span>
          <span class="rank-score-wrap">
            <button class="adj-btn" onclick="adjustScore(${r.teamIdx},-10)" aria-label="Retirer 10 points">−</button>
            <span class="rank-score">${state.scores[r.teamIdx]} pts</span>
            <button class="adj-btn" onclick="adjustScore(${r.teamIdx},10)" aria-label="Ajouter 10 points">+</button>
          </span>
        </div>`;
      }).join("")}
    </div>
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Quitter</button>
    </div>
    ${shareLineHtml(state.mode)}
  `;
}
function renderEndSolo(){
  const max = maxPossibleScore();
  const pct = max>0 ? Math.round((state.soloScore/max)*100) : 0;
  const totalQ = state.questions.length;
  const R = 52, C = 2*Math.PI*R;
  const offset = C * (1 - pct/100);
  return `
    <div class="end-hero">
      <div class="end-medal"><span class="em-cup">${TROPHY_GOLD}</span></div>
      <div class="end-eyebrow">Partie terminée</div>
      <h1 class="end-title">${state.soloScore} points</h1>
      <p class="end-sub">${soloPerformanceMessage(pct)}</p>
    </div>
    <div class="flex-sp"></div>
    <div class="solo-summary">
      <div class="ring-wrap">
        <svg viewBox="0 0 120 120">
          <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F1502F"/><stop offset="100%" stop-color="#EFAD26"/>
          </linearGradient></defs>
          <circle class="ring-bg" cx="60" cy="60" r="${R}"></circle>
          <circle class="ring-fg" cx="60" cy="60" r="${R}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}" data-target="${offset.toFixed(1)}"></circle>

function render(){
  const app = document.getElementById("app");
  const sameScreen = (state.screen === lastScreen);
  const prevScroll = sameScreen ? app.scrollTop : 0;

  let node;
  if(state.screen==="splash") node = renderSplash();
  else if(state.screen==="mode") node = renderModeSelect();
  else if(state.screen==="setup") node = renderSetup();
  else if(state.screen==="play") node = renderPlay();
  else if(state.screen==="profile") node = renderProfile();
  else if(state.screen==="online-name") node = renderOnlineName();
  else if(state.screen==="online") node = renderOnline();
  else if(state.screen==="online-join") node = renderOnlineJoin();
  else if(state.screen==="online-room") node = renderOnlineRoom();
  else if(state.screen==="online-play") node = renderOnlinePlay();
  else if(state.screen==="online-end") node = renderOnlineEnd();
  else node = renderEnd();

  if(!sameScreen){
    node.classList.add("screen-enter");
    Array.prototype.forEach.call(node.children, (c,i)=>{ if(c && c.style) c.style.setProperty("--i", i); });
  }
  const prevNode = !sameScreen ? Array.prototype.find.call(app.children, c=>c.classList && !c.classList.contains("screen-exit")) : null;
  if(prevNode){
    // L'ancien écran reste visible et s'efface pendant que le nouveau entre.
    const cs = getComputedStyle(app);
    prevNode.classList.add("screen-exit");
    prevNode.style.position = "absolute";
    prevNode.style.top = cs.paddingTop;
    prevNode.style.left = cs.paddingLeft;
    prevNode.style.right = cs.paddingRight;
    prevNode.style.pointerEvents = "none";
    app.appendChild(node);
    app.scrollTop = 0;
    setTimeout(()=>{ if(prevNode.parentNode) prevNode.remove(); }, 420);
  } else {
    app.replaceChildren(node);
    if(sameScreen) app.scrollTop = prevScroll;
  }
  lastScreen = state.screen;

  // iOS Safari : libérer les états d'animation résiduels, sinon le backdrop-filter
  // (effet verre) se coupe une fois l'animation figée. On retire les classes après coup.
  setTimeout(()=>{
    node.querySelectorAll(".question-card.animate, .options-grid.animate").forEach(n=>n.classList.remove("animate"));
    node.querySelectorAll(".reveal-pop").forEach(n=>n.classList.remove("reveal-pop"));
    node.querySelectorAll(".reveal-shake").forEach(n=>n.classList.remove("reveal-shake"));
    queueGlassSync();
  }, 820);

  queueGlassSync();

  if(state.screen!=="play" && state.screen!=="online-play"){ stopQTimer(); }
  if(state.screen==="play") saveState();
  else if(state.screen==="end" || state.screen==="mode") clearSavedGame();
}

/* Son universel : léger tap sur chaque élément interactif.
   Les boutons de réponse et « Révéler » sont exclus (ils ont leur propre son). */
document.addEventListener("click", (e)=>{
  const b = e.target && e.target.closest ? e.target.closest("button") : null;
  if(!b || b.disabled) return;
  if(b.classList.contains("option-btn") || b.classList.contains("btn-reveal")) return;
  playTap();
}, true);

/* ===================== VERRE VIVANT : alignement viewport synchrone =====
   Chaque surface montre la portion de photo floutée située derrière elle
   (l'effet "fenêtre"). Calcul par offsets de mise en page (jamais les
   transforms), écrit de façon SYNCHRONE : valeurs stables, aucun saut. */
const GLASS_SEL = ".app-header,.card,.mode-card,.question-card,.solo-summary,.solo-score-bar,.score-pane,.option-btn,.btn-primary,.btn-next,.btn-replay,.fact-card,.tier-chip,.q-counter,.chip,.icon-btn,.btn-reveal,.btn-newgame,.award-btn,.team-row,.presence-card,.me-row,.online-action,.searching-card,.waiting-card,.info-card,.vs-row,.len-chip,.duel-scorebar,.timer-chip,.dr-side,.rank-row,.text-input,.code-input,.fs-hint,.modal-card,.add-team,.btn-ghost,.fsh-close,.hs-item,.settings-sheet,.hero-verse-card,.end-medal";
const GLASS_SKIP = ".online-action.primary,.timer-chip.low,.len-chip.sel,.chip.active,.option-btn.correct,.option-btn.incorrect,.btn-primary:disabled,.btn-next:disabled";
function glassPos(el){
  let x = 0, y = 0, n = el;
  while(n && n !== document.body){ x += n.offsetLeft; y += n.offsetTop; n = n.offsetParent; }
  const app = document.getElementById("app");
  if(app && el !== app && app.contains(el)){ x -= app.scrollLeft; y -= app.scrollTop; }
  return { left: x, top: y };
}
function queueGlassSync(){
  const w = window.innerWidth, h = window.innerHeight;
  const iw = Math.round(w * 1.04), ih = Math.round(h * 1.04);
  const ox = Math.round((iw - w) / 2), oy = Math.round((ih - h) / 2);
  const size = "auto, " + iw + "px " + ih + "px";
  document.querySelectorAll(GLASS_SEL).forEach(el=>{
    if(el.matches(GLASS_SKIP)){ el.style.backgroundSize = ""; el.style.backgroundPosition = ""; return; }
    const r = glassPos(el);
    el.style.backgroundSize = size;
    el.style.backgroundPosition = "0 0, " + (-(r.left + ox)) + "px " + (-(r.top + oy)) + "px";
  });
}
window.addEventListener("resize", queueGlassSync);
window.addEventListener("orientationchange", queueGlassSync);
document.getElementById("app").addEventListener("scroll", queueGlassSync, { passive:true });

/* Plein écran réel : demandé au premier toucher là où l'API existe (Android,
   iPad, desktop). Sur iPhone, Safari interdit cette API : le vrai plein écran
   passe par « Ajouter à l'écran d'accueil » (déjà configuré), d'où l'astuce. */
const isStandalone = (window.matchMedia && (window.matchMedia("(display-mode: standalone)").matches || window.matchMedia("(display-mode: fullscreen)").matches || window.matchMedia("(display-mode: minimal-ui)").matches)) || window.navigator.standalone === true;
const IS_IOS = /iP(hone|od|ad)/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
const IS_ANDROID = /Android/i.test(navigator.userAgent);
function fsAvailable(){ const el = document.documentElement; return !isStandalone && !!(el.requestFullscreen || el.webkitRequestFullscreen); }
function fsActive(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function toggleFullscreen(){
  if(fsActive()){
    const ex = document.exitFullscreen || document.webkitExitFullscreen;
    if(ex){ try { ex.call(document); } catch(e){} }
    return;
  }
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen;
  if(req){ try { const p = req.call(el, { navigationUI:"hide" }); if(p && p.catch){ p.catch(()=>{}); } } catch(e){} }
  try { if(screen.orientation && screen.orientation.lock){ screen.orientation.lock("portrait").catch(()=>{}); } } catch(e){}
}
function onFsChange(){
  document.documentElement.classList.toggle("is-fs", fsActive());
  render();
}
document.addEventListener("fullscreenchange", onFsChange);
document.addEventListener("webkitfullscreenchange", onFsChange);
window.addEventListener("offline", ()=>{
  if(String(state.screen).indexOf("online") === 0){
    leaveOnline();
    showModal({ title:"Connexion perdue", message:"Le mode en ligne a été interrompu. Tu peux continuer en Solo ou en Groupe.", okLabel:"OK", cancelLabel:"Fermer" });
  }
});
/* Plein écran permanent : activé dès le premier toucher, et rétabli au
   toucher suivant si le système en sort (geste, appel, etc.). */
function updateRotateHint(){
  const rl = document.getElementById("rotate-lock");
  if(!rl) return;
  /* Sur iPhone comme sur Android : 90 = penché à gauche, -90/270 = penché à droite. */
  let a = null;
  if(typeof window.orientation === "number"){ a = window.orientation; }
  else if(screen.orientation && typeof screen.orientation.angle === "number"){ a = screen.orientation.angle; }
  rl.classList.toggle("from-right", a === 90 || a === 180);
}
/* iOS met à jour les angles juste APRÈS l'événement : on relit une seconde fois */
function updateRotateHintSoon(){
  updateRotateHint();
  requestAnimationFrame(updateRotateHint);
  setTimeout(updateRotateHint, 120);
}
window.addEventListener("orientationchange", updateRotateHintSoon);
if(screen.orientation && screen.orientation.addEventListener){ try { screen.orientation.addEventListener("change", updateRotateHintSoon); } catch(e){} }
window.addEventListener("resize", updateRotateHintSoon);
const rotMq = window.matchMedia ? window.matchMedia("(orientation: landscape)") : null;
if(rotMq){ try { rotMq.addEventListener("change", updateRotateHintSoon); } catch(e){ if(rotMq.addListener) rotMq.addListener(updateRotateHintSoon); } }
updateRotateHint();

let fsPending = false;
function tryAutoFullscreen(){
  if(fsPending || !fsAvailable() || fsActive()) return;
  fsPending = true;
  setTimeout(()=>{ fsPending = false; }, 600);
  toggleFullscreen();
}
/* Pas de plein écran forcé sur le web : l'utilisateur passe par « écran d'accueil ». */
function fsHintHtml(){
  if(isStandalone || !IS_IOS) return "";
  let hidden = false;
  try { hidden = localStorage.getItem("bt_fs_hint") === "1"; } catch(e){}
  if(hidden) return "";
  return `<div class="fs-hint" onclick="openFsGuide()" role="button"><span class="fsh-txt"><b>Jouer en vrai plein écran ?</b> Touche ici pour voir comment.</span><button class="fsh-close" onclick="event.stopPropagation();dismissFsHint()" aria-label="Fermer"><span class="ico" style="width:0.8rem;height:0.8rem;">${ICONS.close}</span></button></div>`;
}
function dismissFsHint(){ try { localStorage.setItem("bt_fs_hint","1"); } catch(e){} render(); }
function openFsGuide(){
  const msg = IS_IOS
    ? "Sur iPhone, Safari n'autorise pas le plein écran d'une page web. Pour jouer sans aucune barre : ouvre le menu Partager (le carré avec une flèche), choisis « Sur l'écran d'accueil », puis lance BibleTrivia depuis sa nouvelle icône — l'app s'ouvrira en plein écran complet."
    : "Pour jouer sans aucune barre : ouvre le menu ⋮ du navigateur, choisis « Ajouter à l'écran d'accueil » (ou « Installer l'application »), puis lance BibleTrivia depuis sa nouvelle icône.";
  showModal({ title:"Plein écran total", message:msg, okLabel:"Compris", hideCancel:true });
}

/* Correctif Safari iOS : quand une animation d'entrée se termine, on retire la
   classe d'animation. Sinon Safari fige le backdrop-filter et le verre devient
   opaque. Ce nettoyage force le recalcul du flou en continu. */
document.addEventListener("animationend", (e)=>{
  const t = e.target;
  if(!t || !t.classList) return;
  const n = e.animationName;
  if(n === "cardSlideIn"){ t.classList.remove("animate"); queueGlassSync(); }
  else if(n === "optionIn"){
    t.style.opacity = "1";
    const grid = t.parentElement;
    if(grid && grid.classList.contains("options-grid") && t === grid.lastElementChild){
      grid.classList.remove("animate");
      Array.prototype.forEach.call(grid.children, c=>{ c.style.opacity = "1"; });
    }
    queueGlassSync();
  }
  else if(n === "childIn" || n === "fadeSlide"){ t.style.opacity = "1"; t.style.animationName = "none"; queueGlassSync(); }
  else if(n === "glowBurst"){ t.classList.remove("reveal-pop"); }
  else if(n === "screenOut"){ if(t.parentNode) t.remove(); }
  else if(n === "wrongFlash"){ t.classList.remove("reveal-shake"); t.classList.remove("shake"); }
});

/* Hors connexion : si le fichier sw.js (fourni) est déployé à côté de cette page,
   l'app se met en cache et reste jouable sans Internet. Sans lui, rien ne change. */
if("serviceWorker" in navigator){
  /* Quand une nouvelle version prend le contrôle, on recharge une seule fois :
     Safari et l'app installée restent ainsi toujours identiques. */
  let hadController = !!navigator.serviceWorker.controller;
  let reloadedOnce = false;
  navigator.serviceWorker.addEventListener("controllerchange", ()=>{
    if(!hadController){ hadController = true; return; }
    if(reloadedOnce) return;
    reloadedOnce = true;
    location.reload();
  });
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js")
      .then((reg)=>{ try { reg.update(); } catch(e){} })
      .catch(()=>{});
  });
}

const _savedGame = loadSavedGame();
render();
if(_savedGame){
  // Reprise automatique : le jeu ne repart plus à zéro après une mise en arrière-plan
  setTimeout(()=>{ Object.assign(state, _savedGame); render(); }, 900);
} else if(state.screen==="splash"){
  setTimeout(()=>{ state.screen="mode"; render(); }, 2500);
}
</script>
