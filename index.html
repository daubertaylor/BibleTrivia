  #app{ position:relative; z-index:1; width:100%; max-width:640px; margin:0 auto; height:100%; height:100dvh; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; display:flex; flex-direction:column; padding:calc(env(safe-area-inset-top) + 0.35rem) calc(env(safe-area-inset-right) + 0.7rem) calc(env(safe-area-inset-bottom) + 0.35rem) calc(env(safe-area-inset-left) + 0.7rem); }

  /* ---------- Header ---------- */

  /* ---------- Cards / setup ---------- */

  .streak-chip{ display:flex; align-items:center; gap:0.32rem; background:linear-gradient(180deg, rgba(251,241,221,0.9), rgba(246,217,139,0.75)); backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%); border:1px solid rgba(214,162,60,0.5); color:#8a5e14; padding:0.34rem 0.7rem; border-radius:100px; font-size:0.8rem; font-weight:700; box-shadow:inset 0 1px 0 rgba(255,255,255,0.7), 0 2px 8px rgba(184,140,50,0.18); }
  .streak-chip.hot{ background:linear-gradient(180deg, #FF8A4C, #F26430); border-color:rgba(242,100,48,0.6); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 3px 12px rgba(242,100,48,0.45); }

  .progress-track{ position:relative; height:8px; margin-bottom:1.4rem; background:rgba(255,255,255,0.32); backdrop-filter:blur(14px) saturate(180%); -webkit-backdrop-filter:blur(14px) saturate(180%); border-radius:100px; border:1px solid rgba(255,255,255,0.4); box-shadow:inset 0 1px 2px rgba(15,12,10,0.12); overflow:hidden; }

  .question-card{ background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1.6rem 1.4rem; margin-bottom:1.1rem; box-shadow:0 2px 12px var(--shadow); text-align:center; }

  .podium-bar{ width:100%; border-radius:12px 12px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:0.5rem; font-family:'Poppins',sans-serif; font-weight:700; color:rgba(255,255,255,0.95); font-size:1.05rem; box-shadow:inset 0 2px 6px rgba(255,255,255,0.25); }

/* ===================== SEED / DECK SYNCHRONISÉ ===================== */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function seededDeck(seed, lengthKey){
  const rng = mulberry32(seed>>>0);
  const ss = (arr)=>{ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
  const n = LENGTHS[lengthKey] || 5;
  let list = [];
  ["facile","moyen","difficile"].forEach(tier=>{
    ss(BANK[tier]).slice(0,n).forEach(q=>{ list.push({ ...q, tier, shuffledOptions: ss(q.options) }); });
  });
  return ss(list);
}
function genCode(){ const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s=""; for(let i=0;i<4;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }

/* ===================== PRÉSENCE / LOBBY ===================== */
function reRenderIfOnline(){
  if(String(state.screen).indexOf("online")===0) render();
}
function joinLobby(){
  const supa = initSupa();
  if(!supa) return;
  if(net.lobby) return;
  net.lookers = {};
  const ch = supa.channel("bt-lobby-v1", { config:{ presence:{ key: myId }, broadcast:{ self:false } } });
  net.lobby = ch;
  ch.on("presence", { event:"sync" }, ()=>{
    const st = ch.presenceState();
    net.connected = Object.keys(st).length;
    reRenderIfOnline();
  });
  ch.on("broadcast", { event:"looking" }, ({ payload })=>{
    if(!payload || payload.id===myId) return;
    net.lookers[payload.id] = Date.now();
    matchFromLookers();
    reRenderIfOnline();
  });
  ch.on("broadcast", { event:"matched" }, ({ payload })=>{
    if(!payload || net.room) return;
    if(payload.guest === myId){
      net.searching = false; net.matching = false; stopSearchHeartbeat();
      joinRoom(payload.code, false);
    }
  });
  ch.subscribe(async (status)=>{
    if(status === "SUBSCRIBED"){ await ch.track(meMeta()); reRenderIfOnline(); }
  });
}
function setSearching(on){
  net.searching = on; net.matching = false;
  if(on){ startSearchHeartbeat(); } else { stopSearchHeartbeat(); }
  reRenderIfOnline();
}
function startSearchHeartbeat(){
  stopSearchHeartbeat();
  net.lookers = {};
  const beat = ()=>{
    if(!net.searching || net.room){ stopSearchHeartbeat(); return; }
    if(net.lobby){ net.lobby.send({ type:"broadcast", event:"looking", payload:{ id: myId, ts: Date.now() } }); }
    matchFromLookers();
  };
  beat();
  net.hbTimer = setInterval(beat, 1500);
}
function stopSearchHeartbeat(){ if(net.hbTimer){ clearInterval(net.hbTimer); net.hbTimer = null; } }
function freshLookers(){
  const now = Date.now(); let c = 0;
  Object.keys(net.lookers||{}).forEach(id=>{ if(id!==myId && (now - net.lookers[id]) < 4500) c++; });
  return c;
}
function matchFromLookers(){
  if(!net.searching || net.matching || net.room) return;
  const now = Date.now();
  const ids = [myId];
  Object.keys(net.lookers).forEach(id=>{ if(id!==myId && (now - net.lookers[id]) < 4500) ids.push(id); });
  ids.sort();
  const pos = ids.indexOf(myId);
  const partnerPos = pos % 2 === 0 ? pos+1 : pos-1;
  if(partnerPos < 0 || partnerPos >= ids.length) return;
  if(pos % 2 === 0){
    net.matching = true;
    net.searching = false; stopSearchHeartbeat();
    const code = genCode();
    const guest = ids[partnerPos];
    net.lobby.send({ type:"broadcast", event:"matched", payload:{ code, host:myId, guest } });
    createRoom(code, true);
  }
}
function leaveLobby(){
  stopSearchHeartbeat();
  if(net.lobby){ try { net.lobby.untrack(); net.supa.removeChannel(net.lobby); } catch(e){} net.lobby = null; }
  net.searching = false; net.matching = false; net.connected = 0; net.lookers = {};
}

/* ===================== SALON / DUEL ===================== */
function bindRoom(ch){
  ch.on("presence", { event:"sync" }, ()=>{
    const st = ch.presenceState();
    const others = [];
    Object.keys(st).forEach(k=>{ if(k!==myId && st[k] && st[k][0]) others.push(st[k][0]); });
    net.oppPresent = others.length > 0;
    if(others.length){ net.opp = others[0]; }
    reRenderIfOnline();
  });
  ch.on("presence", { event:"leave" }, ()=>{
    const st = ch.presenceState();
    const stillThere = Object.keys(st).some(k=>k!==myId);
    if(!stillThere && state.screen==="online-play"){ net.oppLeft = true; reRenderIfOnline(); }
    else if(!stillThere){ net.oppPresent=false; reRenderIfOnline(); }
  });
  ch.on("broadcast", { event:"start" }, ({ payload })=>{
    if(!payload) return;
    beginDuel(payload.seed, payload.lengthKey);
  });
  ch.on("broadcast", { event:"progress" }, ({ payload })=>{
    if(!payload || payload.id===myId) return;
    net.oppIndex = payload.idx; net.oppScore = payload.score; net.oppDone = !!payload.done;
    if(net.myDone && net.oppDone && state.screen!=="online-end"){ state.screen="online-end"; playWin(); }
    reRenderIfOnline();
  });
  ch.on("broadcast", { event:"rematch" }, ()=>{
    if(state.screen==="online-end"){ net.status="Ton adversaire veut rejouer…"; reRenderIfOnline(); }
  });
}
function createRoom(code, host){
  const supa = initSupa(); if(!supa) return;
  net.code = code; net.isHost = host; net.opp=null; net.oppPresent=false; net.oppLeft=false;
  const ch = supa.channel("bt-room-"+code, { config:{ presence:{ key: myId } } });
  net.room = ch;
  bindRoom(ch);
  ch.subscribe(async (status)=>{
    if(status==="SUBSCRIBED"){ await ch.track(meMeta()); state.screen="online-room"; render(); }
  });
}
function joinRoom(code, host){
  code = (code||"").toUpperCase().trim();
  if(code.length<4){ net.error="Code invalide."; render(); return; }
  createRoom(code, !!host);
}
function hostStart(){
  if(!net.isHost || !net.room || !net.oppPresent) return;
  const seed = (Math.random()*1e9)|0;
  net.room.send({ type:"broadcast", event:"start", payload:{ seed, lengthKey: net.lengthKey } });
  beginDuel(seed, net.lengthKey);
}
function beginDuel(seed, lengthKey){
  net.seed = seed; net.lengthKey = lengthKey;
  net.deck = seededDeck(seed, lengthKey);
  net.idx = 0; net.score = 0; net.correct = 0; net.selected=null; net.revealed=false; net.myDone=false;
  net.oppScore = 0; net.oppIndex = 0; net.oppDone=false; net.oppLeft=false; net.status="";
  state.screen = "online-play";
  render();
}
function onlineAnswer(i){
  if(net.revealed || net.myDone) return;
  const q = net.deck[net.idx];
  const opt = q.shuffledOptions[i];
  net.selected = opt; net.revealed = true;
  if(opt === q.correct){ net.score += TIER_INFO[q.tier].pts; net.correct += 1; playCorrect(); }
  else { playIncorrect(); }
  broadcastProgress(false);
  render();
}
function onlineNext(){
  if(!net.revealed) return;
  net.idx += 1; net.selected=null; net.revealed=false;
  if(net.idx >= net.deck.length){
    net.myDone = true;
    broadcastProgress(true);
    if(net.oppDone){ state.screen="online-end"; playWin(); }
  }
  render();
}
function broadcastProgress(done){
  if(net.room){ net.room.send({ type:"broadcast", event:"progress", payload:{ id:myId, idx:net.idx, score:net.score, done } }); }
}
function onlineRematch(){
  if(net.room){ net.room.send({ type:"broadcast", event:"rematch", payload:{ id:myId } }); }
  if(net.isHost){ hostStart(); }
  else { net.status = "En attente que l'hôte relance…"; render(); }
}
function leaveOnline(){
  if(net.room){ try { net.room.untrack(); net.supa.removeChannel(net.room); } catch(e){} net.room=null; }
  net.code=null; net.isHost=false; net.opp=null; net.oppPresent=false; net.oppLeft=false;
  net.deck=[]; net.idx=0; net.myDone=false; net.status=""; net.error="";
  leaveLobby();
  state.screen = "mode"; render();
}
function openOnline(){
  net.error="";
  if(!profile.name){ state.screen="online-name"; render(); return; }
  if(!onlineConfigured()){ state.screen="online"; render(); return; }
  initSupa(); joinLobby();

/* ===================== UTILS ===================== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function muteLabel(){ return state.muted ? "Activer le son" : "Couper le son"; }

/* ===================== SOUND — cloches douces, chaudes et très légères ===================== */
let actx = null;
let masterGain = null, masterFilter = null;
function getCtx(){
  if(!actx){
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterFilter = actx.createBiquadFilter();
    masterFilter.type = "lowpass";
    masterFilter.frequency.value = 2400;   // arrondit les aigus -> chaud et doux
    masterFilter.Q.value = 0.4;
    masterGain = actx.createGain();
    masterGain.gain.value = 0.8;            // volume général léger
    masterFilter.connect(masterGain);
    masterGain.connect(actx.destination);
  }
  return actx;
}
// une voix "cloche" : montée sans clic, extinction douce
function blip(freq, start, dur, vol, type){
  const ctx = getCtx();
  if(ctx.state==="suspended"){ ctx.resume(); }
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  osc.connect(gain); gain.connect(masterFilter);
  const t0 = ctx.currentTime + start;
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);   // 12ms, aucun clic
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);  // queue douce
  osc.start(t0); osc.stop(t0 + dur + 0.03);
}
// bonne réponse : tierce ascendante chaleureuse + léger scintillement
function playCorrect(){ if(state.muted) return; blip(523.25,0,0.4,0.05); blip(659.25,0.1,0.5,0.045); blip(1046.5,0.1,0.45,0.016); }
// mauvaise réponse : deux notes graves douces qui descendent (jamais agressif)
function playIncorrect(){ if(state.muted) return; blip(329.63,0,0.42,0.038); blip(261.63,0.11,0.5,0.032); }
// tap : petit tic très léger et aéré
function playTap(){ if(state.muted) return; blip(783.99,0,0.08,0.02); }
// série : arpège scintillant montant
function playStreak(){ if(state.muted) return; [659.25,880,1174.66].forEach((f,i)=>blip(f,i*0.075,0.32,0.026)); }
// victoire : arpège majeur doux et chaleureux + note aiguë cristalline
function playWin(){ if(state.muted) return; [523.25,659.25,783.99,1046.5].forEach((f,i)=>blip(f,i*0.12,0.65,0.036)); blip(1567.98,0.52,0.6,0.014); }
function toggleMute(){ state.muted = !state.muted; render(); }
function ensureAudioAwake(){ if(actx && actx.state==="suspended"){ actx.resume().catch(()=>{}); } }
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible"){ ensureAudioAwake(); } });

/* ===================== GAME LIFECYCLE ===================== */
function buildQuestions(){
  const n = LENGTHS[state.lengthKey];
  let list = [];
  ["facile","moyen","difficile"].forEach(tier=>{
    const pool = shuffle(BANK[tier]);
    pool.slice(0,n).forEach(q=>{ list.push({ ...q, tier, shuffledOptions: shuffle(q.options) }); });
  });
  state.questions = shuffle(list);
}
function startGame(){
  if(state.mode==="group"){
    const valid = validTeams();
    if(valid.length<2){
      document.getElementById("setupError").textContent = "Ajoutez au moins deux équipes avec un nom pour commencer.";
      return;
    }
    state.teams = valid;
    state.scores = valid.map(()=>0);
  } else {
    state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; state.soloCorrect = 0; displayedSoloScore = 0;
  }
  buildQuestions();
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function replayGame(){
  buildQuestions();
  if(state.mode==="group"){ state.scores = state.teams.map(()=>0); }
  else { state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; state.soloCorrect = 0; displayedSoloScore = 0; }
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function newGame(){
  clearSavedGame();
  state = { screen:"mode", mode:null, teams:[{name:"Équipe 1"},{name:"Équipe 2"}], lengthKey: state.lengthKey, scores:[], soloScore:0, soloStreak:0, soloBestStreak:0, soloCorrect:0, soloSelected:null, questions:[], currentIndex:0, revealed:false, awarded:[], muted: state.muted };

}

function saveState(){

        questions:state.questions, currentIndex:state.currentIndex, revealed:state.revealed, awarded:state.awarded
      };

}

function loadSavedGame(){

/* ===================== PLAY ===================== */
function currentQ(){ return state.questions[state.currentIndex]; }

function revealAnswer(){ state.revealed = true; justRevealed = true; playCorrect(); render(); }

function soloAnswer(idx){
  if(state.revealed) return;
  const q = currentQ();
  const opt = q.shuffledOptions[idx];
  state.soloSelected = opt;
  state.revealed = true;
  justRevealed = true;
  if(opt===q.correct){
    state.soloScore += TIER_INFO[q.tier].pts;
    state.soloCorrect += 1;
    state.soloStreak += 1;
    if(state.soloStreak > state.soloBestStreak) state.soloBestStreak = state.soloStreak;
    if(state.soloStreak>=3 && state.soloStreak%3===0){ playStreak(); } else { playCorrect(); }
  } else {
    state.soloStreak = 0;
    playIncorrect();
  }
  render();
}

function toggleAward(teamIdx){
  const q = currentQ();
  const pos = state.awarded.indexOf(teamIdx);
  if(pos>=0){ state.awarded.splice(pos,1); state.scores[teamIdx] -= TIER_INFO[q.tier].pts; }
  else { state.awarded.push(teamIdx); state.scores[teamIdx] += TIER_INFO[q.tier].pts; playTap(); }
  render();
}
function adjustScore(teamIdx, delta){ state.scores[teamIdx] = Math.max(0, state.scores[teamIdx]+delta); render(); }

function nextQuestion(){
  if(!state.revealed) return;
  if(state.currentIndex >= state.questions.length-1){
    state.screen = "end";
    render();
    launchConfetti();
    playWin();
    return;
  }
  state.currentIndex++;
  state.revealed = false; state.awarded = []; state.soloSelected = null;
  render();
}

function rankedTeamIndices(){ return state.teams.map((t,i)=>i).sort((a,b)=>state.scores[b]-state.scores[a]); }
function computeRanks(){
  const ranked = rankedTeamIndices();
  const ranks = []; let prevScore=null, prevRank=0;
  ranked.forEach((teamIdx,pos)=>{
    const sc = state.scores[teamIdx];
    if(sc===prevScore){ ranks.push(prevRank); } else { ranks.push(pos+1); prevRank=pos+1; prevScore=sc; }
  });
  return ranked.map((teamIdx,pos)=>({teamIdx, rank:ranks[pos]}));
}
function maxPossibleScore(){ return state.questions.reduce((sum,q)=>sum+TIER_INFO[q.tier].pts,0); }
function soloPerformanceMessage(pct){
  if(pct>=85) return "Excellent ! Tu connais vraiment bien ta Bible.";
  if(pct>=65) return "Très bien ! Continue comme ça.";
  if(pct>=40) return "Bien joué, il y a de bonnes bases.";
  return "Beau début ! Chaque partie t'apprend un peu plus.";
}

let lastPlayedQ = -1;
let justRevealed = false;
let displayedSoloScore = 0;
function animateCount(el, from, to, duration, suffix){
  if(!el) return;
  suffix = suffix || "";
  if(from === to){ el.textContent = to + suffix; return; }
  const start = performance.now();
  function step(now){
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
    const val = Math.round(from + (to - from) * eased);
    el.textContent = val + suffix;
    if(t < 1) requestAnimationFrame(step);
    else el.textContent = to + suffix;
  }
  requestAnimationFrame(step);
}
function renderPlay(){
  const el = document.createElement("div");
  el.className = "screen";
  const q = currentQ();

      ${state.revealed ? `<div class="fact-card"><span class="ficon">${ICONS.book}</span><span class="ftext">${escapeHtml(q.fact)}</span></div>` : ""}

  const streakHot = state.soloStreak >= 3;
  el.innerHTML = `

    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${Math.round(((state.currentIndex + (state.revealed?1:0)) / total) * 100)}%"></div>
    </div>
    <div class="question-card${fresh?' animate':''}"><div class="qtext">${escapeHtml(q.q)}</div></div>
    <div class="options-grid${fresh?' animate':''}">${optionsHtml}</div>
    ${bottomHtml}
  `;

  // Animate the solo score count-up when it changes
  if(state.mode==="solo"){
    const target = state.soloScore;
    const from = displayedSoloScore;
    displayedSoloScore = target;
    if(from !== target){
      requestAnimationFrame(()=>animateCount(el.querySelector("[data-count-value]"), from, target, 600, " pts"));
    }
  }
  return el;
}

/* ===================== RENDER: END ===================== */
function renderEndGroup(){
  const withRanks = computeRanks();
  const winners = withRanks.filter(r=>r.rank===1).map(r=>state.teams[r.teamIdx].name);
  const podiumOrder = [1,0,2]; // visual: 2nd, 1st, 3rd
  const barClass = {0:"p1",1:"p2",2:"p3"};
  const podiumTeams = withRanks.slice(0,3);

  const podiumHtml = podiumTeams.length>=2 ? `
    <div class="podium">
      ${podiumOrder.filter(i=>i<podiumTeams.length).map(i=>{
        const r = podiumTeams[i];
        const initial = escapeHtml(state.teams[r.teamIdx].name.charAt(0).toUpperCase());
        return `
        <div class="podium-col">
          ${i===0 ? `<span class="podium-crown">${ICONS.crown}</span>` : `<span class="podium-crown" style="visibility:hidden"></span>`}
          <span class="podium-avatar" style="background:${TEAM_COLORS[r.teamIdx%6]}">${initial}</span>
          <span class="podium-name">${escapeHtml(state.teams[r.teamIdx].name)}</span>
          <span class="podium-score">${state.scores[r.teamIdx]}</span>
          <div class="podium-bar ${barClass[i]}">${r.rank}</div>
        </div>`;
      }).join("")}
    </div>` : "";

  return `
    <div class="end-hero">
      <div class="end-icon">${ICONS.trophy}</div>
      <div class="end-eyebrow">${winners.length>1 ? "Égalité" : "Vainqueur"}</div>
      <h1 class="end-title">${winners.length>1 ? "Ex æquo en tête !" : escapeHtml(winners[0])}</h1>
      <p class="end-sub">Bravo à toutes les équipes — continuez à explorer la Parole.</p>
    </div>
    ${podiumHtml}
    <div class="rank-list">
      ${withRanks.map(r=>{
        const g = r.rank<=3 ? `g${r.rank}` : "";
        return `
        <div class="rank-row">
          <span class="rank-badge ${g}">${r.rank}</span>
          <span class="rank-dot" style="background:${TEAM_COLORS[r.teamIdx%6]}"></span>
          <span class="rank-name">${escapeHtml(state.teams[r.teamIdx].name)}</span>
          <span class="rank-score-wrap">
            <button class="adj-btn" onclick="adjustScore(${r.teamIdx},-10)" aria-label="Retirer 10 points">−</button>
            <span class="rank-score">${state.scores[r.teamIdx]} pts</span>
            <button class="adj-btn" onclick="adjustScore(${r.teamIdx},10)" aria-label="Ajouter 10 points">+</button>
          </span>
        </div>`;
      }).join("")}
    </div>
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Nouvelle partie</button>
    </div>
  `;
}
function renderEndSolo(){
  const max = maxPossibleScore();
  const pct = max>0 ? Math.round((state.soloScore/max)*100) : 0;
  const totalQ = state.questions.length;
  const R = 52, C = 2*Math.PI*R;
  const offset = C * (1 - pct/100);
  return `
    <div class="end-hero">
      <div class="end-icon">${ICONS.trophy}</div>
      <div class="end-eyebrow">Partie terminée</div>
      <h1 class="end-title">${state.soloScore} points</h1>
      <p class="end-sub">${soloPerformanceMessage(pct)}</p>
    </div>
    <div class="solo-summary">
      <div class="ring-wrap">
        <svg viewBox="0 0 120 120">
          <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E0573B"/><stop offset="100%" stop-color="#D6A23C"/>
          </linearGradient></defs>
          <circle class="ring-bg" cx="60" cy="60" r="${R}"></circle>
          <circle class="ring-fg" cx="60" cy="60" r="${R}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}" data-target="${offset.toFixed(1)}"></circle>
        </svg>
        <div class="ring-center">
          <span class="ring-score" data-ring-pct data-target-pct="${pct}">0%</span>
          <span class="ring-label">du maximum</span>
        </div>
      </div>
      <div class="solo-stats">
        <div class="solo-stat"><div class="val"><span class="ico">${ICONS.target}</span>${state.soloCorrect}/${totalQ}</div><div class="lbl">Bonnes réponses</div></div>
        <div class="solo-stat"><div class="val"><span class="ico">${ICONS.bolt}</span>${state.soloBestStreak}</div><div class="lbl">Meilleure série</div></div>
      </div>
    </div>
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Nouvelle partie</button>
    </div>
  `;
}
function renderEnd(){
  const el = document.createElement("div");
  el.className = "screen";
  el.innerHTML = renderHeader("Résultats", false) + (state.mode==="group" ? renderEndGroup() : renderEndSolo());
  // Animate the solo progress ring + percentage after paint
  if(state.mode==="solo"){
    requestAnimationFrame(()=>{
      const ring = el.querySelector(".ring-fg");
      if(ring){ requestAnimationFrame(()=>{ ring.style.strokeDashoffset = ring.getAttribute("data-target"); }); }
      const pctEl = el.querySelector("[data-ring-pct]");
      if(pctEl){ const tgt = parseInt(pctEl.getAttribute("data-target-pct"),10) || 0; animateCount(pctEl, 0, tgt, 1000, "%"); }
    });
  }
  return el;
}

/* ===================== RENDER ROOT ===================== */
function renderSplash(){
  const el = document.createElement("div");
  el.className = "screen splash-screen";
  el.innerHTML = `
    <div class="splash-center">
      <div class="splash-dove-wrap">
        <img class="splash-dove" src="${DOVE_ICON}" alt="BibleTrivia">
      </div>
      <p class="splash-verse">2 Timothée 2:15</p>
    </div>
    <div class="splash-dots"><span class="splash-dot"></span><span class="splash-dot"></span><span class="splash-dot"></span></div>
  `;
  return el;
}

let lastScreen = null;
/* ===================== ÉCRANS PROFIL & EN LIGNE ===================== */
function avatarHtml(name, color, size, creator){
  const initial = escapeHtml((name||"?").charAt(0).toUpperCase());
  const s = size || 2.6;
  return `<span class="avatar" style="width:${s}rem;height:${s}rem;background:${color};font-size:${(s*0.42).toFixed(2)}rem;">${initial}${creator?`<span class="crown-badge">${ICONS.crown}</span>`:""}</span>`;
}
function creatorBadge(){ return `<span class="creator-badge">${ICONS.crown} Créateur</span>`; }
function openProfile(){ state.screen="profile"; render(); }
function setProfileColor(c){ profile.color=c; if(net.lobby) net.lobby.track(meMeta({searching:net.searching})); render(); }
function saveProfileAndBack(){ const i=document.getElementById("profileName"); if(i){ profile.name=i.value.trim().slice(0,18); } saveProfile(); if(net.lobby) net.lobby.track(meMeta({searching:net.searching})); goToModeSelect(); }
function promptCreator(){ const v=prompt("Entre ton code créateur :"); if(v!==null){ if(!claimCreator(v)) alert("Code incorrect."); } }

function renderProfile(){
  const el=document.createElement("div"); el.className="screen";
  el.innerHTML = `
    ${renderHeader("Profil", true)}
    <div class="profile-card">
      <div onclick="promptCreator()" style="cursor:pointer" title="Code créateur">${avatarHtml(profile.name||"Invité", profile.color, 5, profile.isCreator)}</div>
      <div class="profile-name">${escapeHtml(profile.name||"Invité")}</div>
      ${profile.isCreator?`<div style="margin-top:0.4rem">${creatorBadge()}</div>`:`<div class="profile-sub">Appuie sur l'avatar pour le badge créateur</div>`}
    </div>
    <label class="field-label">Nom affiché</label>
    <input class="text-input" id="profileName" maxlength="18" value="${escapeHtml(profile.name)}" placeholder="Ton prénom">
    <label class="field-label" style="margin-top:1rem">Couleur</label>
    <div class="color-row">
      ${TEAM_COLORS.map(c=>`<button class="color-dot${c===profile.color?' sel':''}" style="background:${c}" onclick="setProfileColor('${c}')" aria-label="couleur"></button>`).join("")}
    </div>
    <button class="btn-primary" style="margin-top:1.4rem" onclick="saveProfileAndBack()">Enregistrer</button>
  `;
  return el;
}

function renderOnlineName(){
  const el=document.createElement("div"); el.className="screen";
  el.innerHTML = `
    ${renderHeader("En ligne", true)}
    <div class="online-hero">
      <div class="online-hero-icon">${ICONS.users}</div>
      <h2 class="online-hero-title">Choisis ton nom</h2>
      <p class="online-hero-sub">Il sera visible par tes amis pendant les duels.</p>
    </div>
    <input class="text-input" id="nameInput" maxlength="18" placeholder="Ton prénom" value="${escapeHtml(profile.name)}">
    <label class="field-label" style="margin-top:1rem">Couleur</label>
    <div class="color-row">
      ${TEAM_COLORS.map(c=>`<button class="color-dot${c===profile.color?' sel':''}" style="background:${c}" onclick="setProfileColor('${c}')" aria-label="couleur"></button>`).join("")}
    </div>
    <button class="btn-primary" style="margin-top:1.4rem" onclick="saveName(document.getElementById('nameInput').value)">Continuer</button>
  `;
  return el;
}

function renderOnline(){
  const el=document.createElement("div"); el.className="screen";
  if(!onlineConfigured()){
    el.innerHTML = `
      ${renderHeader("En ligne", true)}
      <div class="online-hero">
        <div class="online-hero-icon">${ICONS.users}</div>
        <h2 class="online-hero-title">Mode en ligne</h2>
        <p class="online-hero-sub">Le multijoueur a besoin d'un petit serveur temps réel gratuit (Supabase).</p>
      </div>
      <div class="info-card">Ouvre le fichier, trouve le bloc <b>CONFIG EN LIGNE</b> tout en haut du script, et colle l'URL + la clé « anon » de ton projet Supabase. Aucune table à créer. Les instructions détaillées sont dans le message.</div>
    `;
    return el;
  }
  const n = net.connected || 1;
  el.innerHTML = `
    ${renderHeader("En ligne", true, "leaveOnline()")}
    <div class="presence-card">
      <span class="live-dot"></span>
      <span class="presence-num">${n}</span>
      <span class="presence-lbl">${n>1?"joueurs connectés":"joueur connecté"}</span>
    </div>
    <button class="me-row" onclick="openProfile()">
      ${avatarHtml(profile.name, profile.color, 2.3, profile.isCreator)}
      <span class="me-name">${escapeHtml(profile.name)}</span>
      ${profile.isCreator?creatorBadge():`<span class="me-edit">Modifier</span>`}
    </button>
    ${net.searching ? `
      <div class="searching-card">
        <div class="spinner"></div>
        <div class="searching-txt">Recherche d'un adversaire…</div>
        <div class="opp-progress">${freshLookers()>0?(freshLookers()+" autre"+(freshLookers()>1?"s":"")+" en recherche…"):"Ton ami doit aussi lancer une « Partie aléatoire »."}</div>
        <button class="btn-ghost" style="margin-top:1rem" onclick="setSearching(false)">Annuler</button>
      </div>
    ` : `
      <button class="online-action primary" onclick="setSearching(true)">
        <span class="oa-ico">${ICONS.bolt}</span>
        <span class="oa-txt"><b>Partie aléatoire</b><small>Tombe avec un joueur connecté</small></span>
        <span class="chev">${ICONS.chevronRight}</span>
      </button>
      <button class="online-action" onclick="createRoomFlow()">
        <span class="oa-ico">${ICONS.plusCircle}</span>
        <span class="oa-txt"><b>Créer une partie</b><small>Invite un ami avec un code</small></span>
        <span class="chev">${ICONS.chevronRight}</span>
      </button>
      <button class="online-action" onclick="state.screen='online-join';net.error='';render()">
        <span class="oa-ico">${ICONS.users}</span>
        <span class="oa-txt"><b>Rejoindre</b><small>Entre le code d'un ami</small></span>
        <span class="chev">${ICONS.chevronRight}</span>
      </button>
    `}
  `;
  return el;
}
function createRoomFlow(){ createRoom(genCode(), true); }

function renderOnlineJoin(){
  const el=document.createElement("div"); el.className="screen";
  el.innerHTML = `
    ${renderHeader("Rejoindre", true, "state.screen='online';render()")}
    <div class="online-hero">
      <div class="online-hero-icon">${ICONS.users}</div>
      <h2 class="online-hero-title">Entre le code</h2>
      <p class="online-hero-sub">Demande à ton ami le code à 4 caractères de sa partie.</p>
    </div>
    <input class="code-input" id="joinCode" maxlength="4" placeholder="ABCD" autocapitalize="characters" autocomplete="off" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    ${net.error?`<div class="err-msg">${escapeHtml(net.error)}</div>`:""}
    <button class="btn-primary" style="margin-top:1.2rem" onclick="joinRoom(document.getElementById('joinCode').value,false)">Rejoindre</button>
  `;
  return el;
}

function renderOnlineRoom(){
  const el=document.createElement("div"); el.className="screen";
  const canStart = net.isHost && net.oppPresent;
  el.innerHTML = `
    ${renderHeader("Salon", true, "leaveOnline()")}
    <div class="code-hero">
      <div class="code-label">Code de la partie</div>
      <div class="code-big">${escapeHtml(net.code||"")}</div>
      <div class="code-hint">${net.isHost?"Partage ce code avec ton ami":"Tu as rejoint la partie"}</div>
    </div>
    <div class="vs-row">
      <div class="vs-player">${avatarHtml(profile.name, profile.color, 3.4, profile.isCreator)}<div class="vs-name">${escapeHtml(profile.name)}</div><div class="vs-tag">Toi</div></div>
      <div class="vs-mid">VS</div>
      <div class="vs-player">${net.oppPresent?avatarHtml(net.opp.name, net.opp.color, 3.4, net.opp.isCreator):`<span class="avatar waiting" style="width:3.4rem;height:3.4rem;font-size:1.4rem;">?</span>`}<div class="vs-name">${net.oppPresent?escapeHtml(net.opp.name):"En attente…"}</div><div class="vs-tag">${net.oppPresent&&net.opp.isCreator?"Créateur":"Adversaire"}</div></div>
    </div>
    ${net.isHost ? `
      <div class="len-label">Longueur du duel</div>
      <div class="len-row">
        ${Object.keys(LENGTHS).map(k=>`<button class="len-chip${net.lengthKey===k?' sel':''}" onclick="net.lengthKey='${k}';render()">${LENGTHS[k]*3} questions</button>`).join("")}
      </div>
      <button class="btn-primary" style="margin-top:1.3rem" ${canStart?"":"disabled"} onclick="hostStart()">${canStart?"Commencer le duel":"En attente de l'adversaire…"}</button>
    ` : `
      <div class="waiting-note">${net.oppPresent?"Prêt ! En attente du lancement par l'hôte…":"Connexion au salon…"}</div>
    `}
  `;
  return el;
}

function renderOnlinePlay(){
  const el=document.createElement("div"); el.className="screen";
  if(net.oppLeft){
    el.innerHTML = `${renderHeader("Duel", true, "leaveOnline()")}
      <div class="online-hero"><div class="online-hero-icon">${ICONS.user}</div>
      <h2 class="online-hero-title">Adversaire parti</h2>
      <p class="online-hero-sub">Ton adversaire a quitté la partie.</p></div>
      <button class="btn-primary" onclick="leaveOnline()">Retour au menu</button>`;
    return el;
  }
  const total = net.deck.length;
  const scorebar = `
    <div class="duel-scorebar">
      <div class="ds-side me"><span class="ds-name">${escapeHtml(profile.name)}</span><span class="ds-score">${net.score}</span></div>
      <div class="ds-vs">VS</div>
      <div class="ds-side"><span class="ds-name">${escapeHtml(net.opp?net.opp.name:"Adversaire")}</span><span class="ds-score">${net.oppScore}</span></div>
    </div>`;
  if(net.myDone){
    el.innerHTML = `${renderHeader("Duel", false)}
      ${scorebar}
      <div class="searching-card">
        <div class="spinner"></div>
        <div class="searching-txt">Tu as terminé, bien joué !</div>
        <div class="opp-progress">Ton adversaire en est à ${net.oppIndex}/${total}</div>
      </div>`;
    return el;
  }
  const q = net.deck[net.idx];
  const info = TIER_INFO[q.tier];
  const oppPct = Math.round((net.oppIndex/total)*100);
  const optionsHtml = q.shuffledOptions.map((opt,idx)=>{
    const letter=["A","B","C","D"][idx];
    let cls="option-btn";
    if(net.revealed){
      if(opt===q.correct) cls+=" correct";
      else if(opt===net.selected) cls+=" incorrect";
      else cls+=" dim";
    }
    if(!net.revealed){
      return `<button class="${cls}" onclick="onlineAnswer(${idx})"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span></button>`;
    }
    let ic=""; if(opt===q.correct) ic=`<span class="opt-icon">${ICONS.checkCircle}</span>`; else if(opt===net.selected) ic=`<span class="opt-icon">${ICONS.xCircle}</span>`;
    return `<div class="${cls}"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span>${ic}</div>`;
  }).join("");
  el.innerHTML = `${renderHeader("Duel", false)}
    ${scorebar}
    <div class="opp-track"><div class="opp-fill" style="width:${oppPct}%"></div></div>
    <div class="play-meta"><span class="tier-chip ${info.cls}">${tierDotsHtml(info.level)}${info.label} · ${info.pts} pts</span><span class="q-counter">${net.idx+1}/${total}</span></div>
    <div class="question-card"><div class="qtext">${escapeHtml(q.q)}</div></div>
    <div class="options-grid">${optionsHtml}</div>
    ${net.revealed?`<div class="fact-card"><span class="fact-ico">${ICONS.book}</span><span>${escapeHtml(q.fact)}</span></div><button class="btn-next" onclick="onlineNext()">${net.idx+1>=total?"Terminer":"Question suivante"}</button>`:""}`;
  return el;
}

function renderOnlineEnd(){
  const el=document.createElement("div"); el.className="screen";
  const win = net.score>net.oppScore, tie = net.score===net.oppScore;
  const title = tie?"Égalité !":(win?"Victoire !":"Défaite");
  if(win){ requestAnimationFrame(()=>launchConfetti()); }
  el.innerHTML = `${renderHeader("Résultat", false)}
    <div class="end-hero"><div class="end-icon">${ICONS.trophy}</div>
      <div class="end-eyebrow">Duel terminé</div>
      <h1 class="end-title">${title}</h1></div>
    <div class="duel-result">
      <div class="dr-side ${win?'winner':''}">${avatarHtml(profile.name,profile.color,3.4,profile.isCreator)}<div class="dr-name">${escapeHtml(profile.name)}</div><div class="dr-score">${net.score}</div></div>
      <div class="dr-vs">VS</div>
      <div class="dr-side ${(!win&&!tie)?'winner':''}">${net.opp?avatarHtml(net.opp.name,net.opp.color,3.4,net.opp.isCreator):`<span class="avatar waiting" style="width:3.4rem;height:3.4rem;font-size:1.4rem;">?</span>`}<div class="dr-name">${escapeHtml(net.opp?net.opp.name:"Adversaire")}</div><div class="dr-score">${net.oppScore}</div></div>
    </div>
    ${net.status?`<div class="info-card">${escapeHtml(net.status)}</div>`:""}
    <div class="end-actions">
      <button class="btn-replay" onclick="onlineRematch()">Rejouer</button>
      <button class="btn-newgame" onclick="leaveOnline()">Quitter</button>
    </div>`;
  return el;
}

function render(){
  const app = document.getElementById("app");
  const sameScreen = (state.screen === lastScreen);
  const prevScroll = sameScreen ? app.scrollTop : 0;

  let node;
  if(state.screen==="splash") node = renderSplash();
  else if(state.screen==="mode") node = renderModeSelect();
  else if(state.screen==="setup") node = renderSetup();
  else if(state.screen==="play") node = renderPlay();
  else if(state.screen==="profile") node = renderProfile();
  else if(state.screen==="online-name") node = renderOnlineName();
  else if(state.screen==="online") node = renderOnline();
  else if(state.screen==="online-join") node = renderOnlineJoin();
  else if(state.screen==="online-room") node = renderOnlineRoom();
  else if(state.screen==="online-play") node = renderOnlinePlay();
  else if(state.screen==="online-end") node = renderOnlineEnd();
  else node = renderEnd();

  // Only play the entrance animation on a genuine screen change,
  // never on same-screen interactions (that was the flicker).
  if(!sameScreen) node.classList.add("screen-enter");

  app.replaceChildren(node);
  if(sameScreen) app.scrollTop = prevScroll;
  lastScreen = state.screen;

  if(state.screen==="play") saveState();
  else if(state.screen==="end" || state.screen==="mode") clearSavedGame();
}

const _savedGame = loadSavedGame();
render();
if(_savedGame){
  // Reprise automatique : le jeu ne repart plus à zéro après une mise en arrière-plan
  setTimeout(()=>{ Object.assign(state, _savedGame); render(); }, 900);
} else if(state.screen==="splash"){
  setTimeout(()=>{ state.screen="mode"; render(); }, 2500);
}
</script>
</body>
</html>
