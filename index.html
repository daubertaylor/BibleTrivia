    { q:"Selon la toute première phrase de la Bible, qui a créé les cieux et la terre ?", options:["Les anges","Dieu","Moïse","Adam"], correct:"Dieu", fact:"« Au commencement, Dieu créa les cieux et la terre » (Genèse 1:1)." },
    { q:"Quel animal a trompé Ève dans le jardin d'Éden ?", options:["Le corbeau","Le serpent","Le renard","Le bouc"], correct:"Le serpent", fact:"« Le serpent était le plus rusé de tous les animaux des champs » (Genèse 3:1)." },
    { q:"Quelle prière Jésus a-t-il enseignée à ses disciples ?", options:["Le Notre Père","Le Psaume 23","Le Credo","La prière de Jabets"], correct:"Le Notre Père", fact:"On la trouve en Matthieu 6:9-13, au cœur du sermon sur la montagne." },
    { q:"Quelle parente de Marie attendait Jean-Baptiste ?", options:["Marthe","Élisabeth","Anne","Salomé"], correct:"Élisabeth", fact:"L'enfant a tressailli en elle quand Marie l'a saluée (Luc 1:41)." },
    { q:"Où le bébé Jésus a-t-il été couché à sa naissance ?", options:["Dans un berceau royal","Dans une mangeoire","Sur une natte","Dans un panier"], correct:"Dans une mangeoire", fact:"Car il n'y avait pas de place pour eux dans l'hôtellerie (Luc 2:7)." },
    { q:"Quel métier exerçaient Pierre et André avant de suivre Jésus ?", options:["Bergers","Pêcheurs","Charpentiers","Percepteurs"], correct:"Pêcheurs", fact:"« Suivez-moi, et je vous ferai pêcheurs d'hommes » (Matthieu 4:19)." },
    { q:"Qui a annoncé la naissance de Jésus aux bergers ?", options:["Un ange","Une étoile","Un roi","Un prophète"], correct:"Un ange", fact:"Puis une multitude de l'armée céleste s'est mise à louer Dieu (Luc 2)." },
    { q:"Que faisait Jésus dans la barque pendant la tempête ?", options:["Il ramait","Il dormait","Il priait","Il pêchait"], correct:"Il dormait", fact:"Réveillé, il a dit à la mer : « Silence, tais-toi ! » (Marc 4:38-39)." },
    { q:"Qu'est-il sorti du rocher frappé par Moïse au désert ?", options:["Du feu","De l'eau","Du miel","De l'huile"], correct:"De l'eau", fact:"Tout le peuple et ses troupeaux ont pu boire (Exode 17)." },
    { q:"Quel pain tombé du ciel nourrissait les Hébreux au désert ?", options:["Le levain","La manne","L'azyme","Le froment"], correct:"La manne", fact:"Chacun en ramassait chaque matin, sauf le jour du sabbat (Exode 16)." },
    { q:"Quel animal a chanté juste après le troisième reniement de Pierre ?", options:["Une colombe","Un coq","Un corbeau","Un agneau"], correct:"Un coq", fact:"Pierre s'est alors souvenu de la parole de Jésus et a pleuré amèrement (Luc 22)." },
    { q:"Qui portait un vêtement en poil de chameau et mangeait du miel sauvage ?", options:["Élie","Jean-Baptiste","Pierre","Samson"], correct:"Jean-Baptiste", fact:"Il vivait dans le désert et appelait à la repentance (Matthieu 3)." },
    { q:"Qui était le meilleur ami de David ?", options:["Absalom","Jonathan","Joab","Samuel"], correct:"Jonathan", fact:"Fils du roi Saül, il a protégé David de la colère de son père (1 Samuel 20)." },
    { q:"Quelle femme est devenue l'épouse d'Isaac ?", options:["Rachel","Rébecca","Léa","Sara"], correct:"Rébecca", fact:"Le serviteur d'Abraham l'a rencontrée près d'un puits (Genèse 24)." },
    { q:"Quel était le métier de Joseph, l'époux de Marie ?", options:["Pêcheur","Charpentier","Berger","Scribe"], correct:"Charpentier", fact:"Jésus lui-même est appelé « le fils du charpentier » (Matthieu 13:55)." },
    { q:"Combien de fois Naaman a-t-il dû se plonger dans le Jourdain pour être guéri ?", options:["Trois fois","Sept fois","Dix fois","Une fois"], correct:"Sept fois", fact:"Ce chef syrien a d'abord refusé, puis a obéi et sa lèpre a disparu (2 Rois 5)." },
    { q:"Comment s'appelle le dernier repas de Jésus avec ses disciples ?", options:["La Pâque royale","La Cène","Les Rameaux","L'agape"], correct:"La Cène", fact:"Jésus y a partagé le pain et la coupe, « en mémoire de moi » (Luc 22)." },
    { q:"Combien de jours et de nuits a-t-il plu pendant le déluge ?", options:["7","40","100","365"], correct:"40", fact:"Les eaux ont ensuite recouvert la terre pendant de longs mois (Genèse 7)." },
    { q:"Qui a aidé Jésus à porter sa croix ?", options:["Pierre","Simon de Cyrène","Jean","Joseph d'Arimathée"], correct:"Simon de Cyrène", fact:"Les soldats l'ont réquisitionné alors qu'il revenait des champs (Luc 23:26)." },
    { q:"Quel auteur d'évangile était médecin ?", options:["Matthieu","Luc","Marc","Jean"], correct:"Luc", fact:"Paul l'appelle « Luc, le médecin bien-aimé » (Colossiens 4:14)." },
    { q:"Sur dix lépreux guéris par Jésus, combien sont revenus dire merci ?", options:["Tous","Un seul","La moitié","Aucun"], correct:"Un seul", fact:"Et c'était un Samaritain (Luc 17:11-19)." },
    { q:"Quel apôtre a coupé l'oreille d'un serviteur lors de l'arrestation de Jésus ?", options:["Jean","Pierre","Jacques","Thomas"], correct:"Pierre", fact:"Jésus a touché l'oreille de Malchus et l'a guérie (Luc 22:51)." },
    { q:"Sur quelle mer Jésus a-t-il marché ?", options:["La mer Rouge","La mer de Galilée","La mer Morte","La Méditerranée"], correct:"La mer de Galilée", fact:"Aussi appelée lac de Tibériade ou de Génésareth (Jean 6)." },
    { q:"Quel patriarche a lutté toute une nuit avec un ange ?", options:["Abraham","Jacob","Isaac","Joseph"], correct:"Jacob", fact:"Il en est ressorti boitant, avec un nouveau nom : Israël (Genèse 32)." },
    { q:"Combien d'évangiles compte le Nouveau Testament ?", options:["Deux","Quatre","Sept","Douze"], correct:"Quatre", fact:"Matthieu, Marc, Luc et Jean racontent chacun la vie de Jésus." },
    { q:"Quel psaume commence par « L'Éternel est mon berger » ?", options:["Le Psaume 1","Le Psaume 23","Le Psaume 100","Le Psaume 150"], correct:"Le Psaume 23", fact:"L'un des textes les plus aimés de toute la Bible." },
    { q:"Qui a construit une grande arche pour survivre au déluge ?", options:["Abraham","Noé","Moïse","David"], correct:"Noé", fact:"Dieu a demandé à Noé de faire entrer un couple de chaque espèce animale dans l'arche (Genèse 6-7)." },
    { q:"Qui a vaincu le géant Goliath avec une simple fronde ?", options:["Samson","Josué","David","Salomon"], correct:"David", fact:"David n'était encore qu'un jeune berger quand il a affronté Goliath (1 Samuel 17)." },
    { q:"Quel est le premier livre de la Bible ?", options:["L'Exode","La Genèse","Les Psaumes","Matthieu"], correct:"La Genèse", fact:"« Genèse » signifie « origine » ou « commencement »." },
    { q:"Dans quelle ville Jésus est-il né ?", options:["Nazareth","Jérusalem","Bethléem","Capernaüm"], correct:"Bethléem", fact:"Cette naissance accomplissait une prophétie écrite des siècles plus tôt." },
    { q:"Combien de disciples proches (apôtres) Jésus a-t-il choisis ?", options:["7","10","12","40"], correct:"12", fact:"Leurs noms sont listés par exemple en Matthieu 10:2-4." },
    { q:"Qui a trahi Jésus pour 30 pièces d'argent ?", options:["Pierre","Thomas","Judas","Barabbas"], correct:"Judas", fact:"Judas Iscariot était l'un des douze apôtres (Matthieu 26:14-16)." },
    { q:"Quel est le dernier livre de la Bible ?", options:["Malachie","L'Apocalypse","Les Actes","Jude"], correct:"L'Apocalypse", fact:"Il a été écrit par l'apôtre Jean, exilé sur l'île de Patmos." },
    { q:"Combien de plaies Dieu a-t-il envoyées sur l'Égypte avant la libération des Hébreux ?", options:["5","7","10","12"], correct:"10", fact:"La dernière plaie fut la mort des premiers-nés (Exode 7-12)." },
    { q:"Qui a été avalé par un grand poisson ?", options:["Élie","Jonas","Daniel","Pierre"], correct:"Jonas", fact:"Jonas y est resté trois jours et trois nuits avant d'être recraché sur le rivage." },
    { q:"Quel est le premier miracle de Jésus, selon l'évangile de Jean ?", options:["Marcher sur l'eau","Guérir un aveugle","Changer l'eau en vin","Multiplier les pains"], correct:"Changer l'eau en vin", fact:"Ce miracle a eu lieu lors des noces de Cana (Jean 2:1-11)." },
    { q:"Combien de jours Jésus a-t-il jeûné dans le désert avant d'être tenté par Satan ?", options:["7","12","40","100"], correct:"40", fact:"Ce récit se trouve en Matthieu 4:1-11." },
    { q:"Quel est le nom du jardin où Adam et Ève ont vécu au commencement ?", options:["Gethsémané","Éden","Canaan","Sinaï"], correct:"Éden", fact:"Deux fleuves célèbres, le Tigre et l'Euphrate, sont mentionnés en lien avec ce jardin (Genèse 2)." },
    { q:"Qui a reçu les Dix Commandements sur une montagne ?", options:["Abraham","Moïse","Élie","Josué"], correct:"Moïse", fact:"C'était sur le mont Sinaï (Exode 20)." },
    { q:"Quelle mer les Hébreux ont-ils traversée à pied sec en fuyant l'Égypte ?", options:["La mer Morte","La mer Rouge","La mer de Galilée","La Méditerranée"], correct:"La mer Rouge", fact:"L'armée égyptienne qui les poursuivait fut engloutie par les eaux (Exode 14)." },
    { q:"Qui était le père terrestre (adoptif) de Jésus ?", options:["Zacharie","Joseph","Jean","Nicodème"], correct:"Joseph", fact:"Joseph était charpentier, originaire de Nazareth." },
    { q:"Qui a été le premier homme créé par Dieu, selon la Genèse ?", options:["Abel","Adam","Noé","Seth"], correct:"Adam", fact:"Son nom signifie « homme » ou « tiré de la terre » (Genèse 2:7)." },
    { q:"Qui a été la première femme créée par Dieu ?", options:["Marie","Sara","Ève","Rachel"], correct:"Ève", fact:"Son nom signifie « celle qui donne la vie » (Genèse 3:20)." },
    { q:"Comment s'appelle le fils d'Adam et Ève qui a tué son frère Abel ?", options:["Seth","Caïn","Hénoc","Lémek"], correct:"Caïn", fact:"Ce premier meurtre est raconté en Genèse 4." },
    { q:"Combien de frères Joseph avait-il, selon la Genèse ?", options:["7","9","11","12"], correct:"11", fact:"Avec Joseph, cela faisait douze fils pour Jacob, futurs chefs des douze tribus." },
    { q:"Quel cadeau spécial le père de Joseph lui avait-il offert ?", options:["Une épée","Une tunique de plusieurs couleurs","Un troupeau","Une couronne"], correct:"Une tunique de plusieurs couleurs", fact:"Ce cadeau a attisé la jalousie de ses frères (Genèse 37)." },
    { q:"Qui a interprété les rêves du Pharaon concernant sept années de famine ?", options:["Moïse","Joseph","Daniel","Aaron"], correct:"Joseph", fact:"Cette interprétation lui a valu de devenir gouverneur d'Égypte (Genèse 41)." },
    { q:"Dans quelle ville Jésus a-t-il grandi avec ses parents ?", options:["Bethléem","Jérusalem","Nazareth","Capernaüm"], correct:"Nazareth", fact:"C'est pourquoi Jésus est parfois appelé « Jésus de Nazareth »." },
    { q:"En combien de jours Dieu a-t-il créé le monde, selon la Genèse ?", options:["3 jours","6 jours","7 jours","40 jours"], correct:"6 jours", fact:"Dieu s'est reposé le septième jour (Genèse 2:2)." },
    { q:"Quel apôtre était collecteur d'impôts avant de suivre Jésus ?", options:["Pierre","Matthieu","Jacques","André"], correct:"Matthieu", fact:"Il est aussi appelé Lévi (Matthieu 9:9)." },
    { q:"Quel roi a fait décapiter Jean-Baptiste ?", options:["Hérode","Pilate","Nebucadnetsar","Salomon"], correct:"Hérode", fact:"La fille d'Hérodias avait réclamé sa tête sur un plateau, à la demande de sa mère (Matthieu 14)." },
    { q:"Qui a été changée en statue de sel pour avoir regardé en arrière vers Sodome ?", options:["La femme de Loth","Sara","Rébecca","Dalila"], correct:"La femme de Loth", fact:"Voir Genèse 19:26." },
    { q:"Avec quelle autre ville Sodome a-t-elle été détruite à cause de sa méchanceté ?", options:["Ninive","Babylone","Gomorrhe","Jéricho"], correct:"Gomorrhe", fact:"Dieu a fait pleuvoir du feu et du soufre sur ces deux villes (Genèse 19)." },
    { q:"Quel disciple a douté de la résurrection de Jésus jusqu'à voir ses blessures ?", options:["Pierre","Thomas","Jean","Philippe"], correct:"Thomas", fact:"D'où l'expression familière d'un « Thomas incrédule » (Jean 20:24-29)." },
    { q:"Quel est le nom de la mère de Jésus ?", options:["Marthe","Marie","Élisabeth","Anne"], correct:"Marie", fact:"Un ange lui a annoncé la naissance de Jésus (Luc 1:26-38)." },
    { q:"Qui a baptisé Jésus dans le Jourdain ?", options:["Pierre","Jean-Baptiste","Philippe","André"], correct:"Jean-Baptiste", fact:"Une voix venue du ciel a alors déclaré Jésus « Fils bien-aimé » (Matthieu 3:13-17)." },
    { q:"Combien de personnes ont été sauvées dans l'arche de Noé, selon 2 Pierre 3:20 ?", options:["4","6","8","10"], correct:"8", fact:"Noé, sa femme, ses trois fils et leurs femmes." },
    { q:"Quel est le nom du roi réputé pour sa grande sagesse, fils de David ?", options:["Saül","Salomon","Roboam","Achab"], correct:"Salomon", fact:"Dieu lui a accordé un cœur sage et intelligent après qu'il le lui ait demandé (1 Rois 3)." },
    { q:"Avec combien de pains et de poissons Jésus a-t-il nourri une foule de 5000 personnes ?", options:["2 pains et 5 poissons","5 pains et 2 poissons","7 pains et 2 poissons","5 pains et 5 poissons"], correct:"5 pains et 2 poissons", fact:"Il restait douze paniers de morceaux après que tous eurent mangé (Matthieu 14:13-21)." },
    { q:"Quels trois disciples ont été témoins de la transfiguration de Jésus sur la montagne ?", options:["Pierre, Jacques et Jean","André, Philippe et Thomas","Pierre, André et Matthieu","Jacques, Jean et Thomas"], correct:"Pierre, Jacques et Jean", fact:"Jésus est apparu resplendissant, avec Moïse et Élie à ses côtés (Matthieu 17:1-8)." },
    { q:"Quel est le nom du fils qu'Abraham a reçu l'ordre d'offrir en sacrifice à Dieu ?", options:["Ismaël","Isaac","Jacob","Ésaü"], correct:"Isaac", fact:"Un ange a arrêté Abraham juste à temps (Genèse 22)." },
    { q:"Qui a offert de l'or, de l'encens et de la myrrhe à Jésus enfant ?", options:["Les bergers","Les mages","Les anges","Les prêtres"], correct:"Les mages", fact:"Ils avaient suivi une étoile depuis l'Orient (Matthieu 2:1-11)." },
    { q:"Quel est le nom de l'ange qui a annoncé à Marie qu'elle allait enfanter Jésus ?", options:["Michel","Gabriel","Raphaël","Uriel"], correct:"Gabriel", fact:"Le même ange était aussi apparu à Zacharie pour annoncer la naissance de Jean-Baptiste (Luc 1)." },
    { q:"Quel prophète a oint le jeune David comme futur roi, alors qu'il gardait encore les moutons ?", options:["Nathan","Samuel","Élie","Gad"], correct:"Samuel", fact:"Dieu avait dit à Samuel de ne pas se fier à l'apparence (1 Samuel 16)." },
    { q:"Qui a trahi Jésus par un baiser dans le jardin de Gethsémané ?", options:["Pierre","Thomas","Judas","Barabbas"], correct:"Judas", fact:"Ce signe convenu permettait aux soldats de reconnaître Jésus dans l'obscurité (Matthieu 26:47-49)." },
    { q:"Quel est le nom du livre qui suit immédiatement les quatre évangiles dans le Nouveau Testament ?", options:["Romains","Les Actes des Apôtres","Jacques","Apocalypse"], correct:"Les Actes des Apôtres", fact:"Il raconte les débuts de l'Église après l'ascension de Jésus." },
    { q:"Quel animal a parlé à Balaam pour l'avertir de la présence d'un ange ?", options:["Une ânesse","Un serpent","Un corbeau","Un bélier"], correct:"Une ânesse", fact:"L'ânesse voyait l'ange que Balaam ne voyait pas encore (Nombres 22)." },
    { q:"Combien de fils Noé avait-il ?", options:["Deux","Trois","Quatre","Cinq"], correct:"Trois", fact:"Sem, Cham et Japhet, dont sont issus tous les peuples (Genèse 6)." },
    { q:"Quel prophète a été nourri par des corbeaux au bord d'un torrent ?", options:["Élisée","Élie","Jonas","Amos"], correct:"Élie", fact:"Pendant la grande sécheresse qu'il avait annoncée (1 Rois 17)." },
    { q:"Quel jeune homme jouait de la harpe pour apaiser le roi Saül ?", options:["Salomon","Samuel","David","Jonathan"], correct:"David", fact:"La musique calmait l'esprit tourmenté du roi (1 Samuel 16)." },
    { q:"Quelle femme a prié avec ferveur pour avoir un enfant et a donné naissance au prophète Samuel ?", options:["Sara","Anne","Ruth","Rachel"], correct:"Anne", fact:"Elle a ensuite consacré Samuel au service de Dieu (1 Samuel 1)." },
    { q:"Que Jésus a-t-il transformé en vin lors des noces de Cana ?", options:["De l'eau","Du lait","De l'huile","Du miel"], correct:"De l'eau", fact:"Ce fut son tout premier miracle public (Jean 2)." },
    { q:"Sur quel animal Jésus est-il entré dans Jérusalem le jour des Rameaux ?", options:["Un cheval","Un ânon","Un chameau","Une mule"], correct:"Un ânon", fact:"Accomplissant une ancienne prophétie de Zacharie (Matthieu 21)." },
    { q:"À qui attribue-t-on la rédaction de la plupart des Psaumes ?", options:["Salomon","Moïse","David","Asaph"], correct:"David", fact:"Le roi David, souvent appelé le doux psalmiste d'Israël." },
    { q:"Quel jour Dieu s'est-il reposé après avoir créé le monde ?", options:["Le sixième","Le premier","Le septième","Le huitième"], correct:"Le septième", fact:"Il l'a béni et sanctifié, à l'origine du sabbat (Genèse 2)." },
    { q:"Quel signe Dieu a-t-il placé dans le ciel comme gage de son alliance après le déluge ?", options:["Une étoile","Un arc-en-ciel","Une colombe","Un éclair"], correct:"Un arc-en-ciel", fact:"La promesse de ne plus jamais détruire la terre par un déluge (Genèse 9)." },
    { q:"Quel apôtre est appelé « le disciple que Jésus aimait » et a écrit un évangile ?", options:["Pierre","Jean","Luc","Marc"], correct:"Jean", fact:"L'apôtre Jean, aussi auteur de l'Apocalypse (Jean 21)." },
    { q:"Dans quel pays le peuple hébreu était-il réduit en esclavage avant l'Exode ?", options:["La Perse","L'Égypte","Babylone","Canaan"], correct:"L'Égypte", fact:"Sous l'autorité de Pharaon, jusqu'à la sortie conduite par Moïse (Exode 1)." },
    { q:"Quel géant philistin David a-t-il affronté avec une fronde ?", options:["Goliath","Og","Samson","Sisera"], correct:"Goliath", fact:"Une seule pierre a suffi (1 Samuel 17)." },
    { q:"Combien d'apôtres Jésus a-t-il choisis ?", options:["Sept","Dix","Douze","Soixante-dix"], correct:"Douze", fact:"Comme les douze tribus d'Israël (Marc 3)." },
    { q:"Quel oiseau Noé a-t-il lâché en premier hors de l'arche ?", options:["Une colombe","Un corbeau","Un aigle","Un moineau"], correct:"Un corbeau", fact:"La colombe ne fut envoyée qu'ensuite (Genèse 8)." },
    { q:"Qui a construit une arche pour échapper au déluge ?", options:["Abraham","Noé","Moïse","Hénoc"], correct:"Noé", fact:"Il fut averti par Dieu et crut avant de voir (Genèse 6)." },
    { q:"Quel livre ouvre le Nouveau Testament ?", options:["Marc","Jean","Matthieu","Luc"], correct:"Matthieu", fact:"Son évangile commence par la généalogie de Jésus." },
    { q:"Quelle mer s'est ouverte devant Moïse et le peuple d'Israël ?", options:["La mer Morte","La mer Rouge","La mer de Galilée","La Méditerranée"], correct:"La mer Rouge", fact:"Le peuple passa à sec entre deux murailles d'eau (Exode 14)." },
    { q:"Qui a trahi Jésus pour trente pièces d'argent ?", options:["Pierre","Thomas","Judas","Jean"], correct:"Judas", fact:"Judas Iscariote, l'un des Douze (Matthieu 26)." },
    { q:"Quel prophète a été jeté dans la fosse aux lions ?", options:["Daniel","Jérémie","Élie","Osée"], correct:"Daniel", fact:"Dieu ferma la gueule des lions (Daniel 6)." },
    { q:"Quel fruit défendu est traditionnellement associé au jardin d'Éden ?", options:["La figue","La pomme","Le raisin","La grenade"], correct:"La pomme", fact:"La Bible parle en réalité seulement du « fruit de l'arbre » (Genèse 3)." },
    { q:"Qui était la mère de Jésus ?", options:["Marthe","Marie","Élisabeth","Anne"], correct:"Marie", fact:"Une jeune fille de Nazareth, fiancée à Joseph (Luc 1)." },
    { q:"Combien de jours Jésus a-t-il jeûné dans le désert ?", options:["Sept","Douze","Quarante","Cinquante"], correct:"Quarante", fact:"Avant d'être tenté par le diable (Matthieu 4)." },
    { q:"Quel apôtre a marché sur l'eau vers Jésus avant de douter ?", options:["Jean","Pierre","Jacques","André"], correct:"Pierre", fact:"« Homme de peu de foi, pourquoi as-tu douté ? » (Matthieu 14)." }
  ],
  moyen: [
    { q:"Quelle reine est venue de loin pour tester la sagesse de Salomon ?", options:["La reine Esther","La reine de Saba","La reine Jézabel","La reine Athalie"], correct:"La reine de Saba", fact:"Elle repartit émerveillée : « on ne m'en avait pas dit la moitié » (1 Rois 10)." },
    { q:"Depuis combien de jours Lazare était-il au tombeau quand Jésus l'a ressuscité ?", options:["1 jour","2 jours","4 jours","7 jours"], correct:"4 jours", fact:"Marthe s'inquiétait : « il sent déjà » (Jean 11:39)." },
    { q:"Quel apôtre a été libéré de prison par un ange, ses chaînes tombées ?", options:["Paul","Pierre","Jacques","Jean"], correct:"Pierre", fact:"Il croyait d'abord avoir une vision (Actes 12)." },
    { q:"Quelle disciple de Jaffa, connue pour ses bonnes œuvres, Pierre a-t-il ressuscitée ?", options:["Lydie","Tabitha","Marthe","Suzanne"], correct:"Tabitha", fact:"Son nom grec était Dorcas, « la gazelle » (Actes 9:36-42)." },
    { q:"Quel magicien de Samarie a voulu acheter le pouvoir de donner le Saint-Esprit ?", options:["Élymas","Simon","Apollos","Hermès"], correct:"Simon", fact:"D'où le mot « simonie », l'achat des choses saintes (Actes 8)." },
    { q:"Sur quelle île Paul a-t-il fait naufrage en route vers Rome ?", options:["Chypre","Malte","La Crète","Patmos"], correct:"Malte", fact:"Une vipère l'y a mordu sans lui faire aucun mal (Actes 28)." },
    { q:"Quel prophète était berger et cultivateur de sycomores à Tekoa ?", options:["Osée","Amos","Michée","Joël"], correct:"Amos", fact:"Il a dénoncé l'injustice sociale du royaume du Nord (Amos 7:14)." },
    { q:"Quelle femme a tué le général Sisera avec un pieu de tente ?", options:["Débora","Yaël","Judith","Abigaïl"], correct:"Yaël", fact:"Comme annoncé, l'honneur de la victoire est revenu à une femme (Juges 4)." },
    { q:"Avec quelle arme improvisée Samson a-t-il terrassé mille Philistins ?", options:["Une fronde","Une mâchoire d'âne","Un bâton","Une lance"], correct:"Une mâchoire d'âne", fact:"L'Esprit de l'Éternel l'avait saisi avec puissance (Juges 15)." },
    { q:"Quel prophète a expliqué le songe de la grande statue de Nebucadnetsar ?", options:["Ézéchiel","Daniel","Jérémie","Ésaïe"], correct:"Daniel", fact:"La statue représentait la succession des empires (Daniel 2)." },
    { q:"Quel échanson du roi de Perse a reconstruit les murailles de Jérusalem ?", options:["Esdras","Néhémie","Zorobabel","Mardochée"], correct:"Néhémie", fact:"Les travaux furent achevés en 52 jours malgré l'opposition (Néhémie 6:15)." },
    { q:"Quel prophète a annoncé que le Messie naîtrait à Bethléem ?", options:["Ésaïe","Michée","Zacharie","Malachie"], correct:"Michée", fact:"« Et toi, Bethléem Éphrata… de toi sortira celui qui dominera sur Israël » (Michée 5)." },
    { q:"Comment s'appelait la prophétesse âgée qui a reconnu l'enfant Jésus au Temple ?", options:["Anne","Élisabeth","Débora","Hulda"], correct:"Anne", fact:"Veuve de 84 ans, elle ne quittait pas le Temple (Luc 2:36-38)." },
    { q:"Quel vieillard a pris l'enfant Jésus dans ses bras en bénissant Dieu ?", options:["Zacharie","Siméon","Nicodème","Gamaliel"], correct:"Siméon", fact:"Il attendait « la consolation d'Israël » (Luc 2:25-32)." },
    { q:"Quel pharisien, docteur de la loi, est venu interroger Jésus de nuit ?", options:["Gamaliel","Nicodème","Caïphe","Simon"], correct:"Nicodème", fact:"Jésus lui a parlé de la nouvelle naissance (Jean 3)." },
    { q:"Qui a offert son tombeau neuf pour ensevelir Jésus ?", options:["Nicodème","Joseph d'Arimathée","Simon de Cyrène","Zachée"], correct:"Joseph d'Arimathée", fact:"Un membre du sanhédrin devenu disciple (Matthieu 27:57-60)." },
    { q:"Qui a vu Jésus ressuscité en tout premier ?", options:["Pierre","Marie de Magdala","Jean","Thomas"], correct:"Marie de Magdala", fact:"Elle l'a d'abord pris pour le jardinier (Jean 20:14-16)." },
    { q:"Vers quel village marchaient les deux disciples qui ont reconnu Jésus au partage du pain ?", options:["Béthanie","Emmaüs","Jéricho","Capernaüm"], correct:"Emmaüs", fact:"« Notre cœur ne brûlait-il pas au-dedans de nous ? » (Luc 24:32)." },
    { q:"Qui a baptisé le ministre éthiopien sur la route de Gaza ?", options:["Pierre","Philippe","Paul","Barnabas"], correct:"Philippe", fact:"L'Éthiopien lisait justement le prophète Ésaïe (Actes 8)." },
    { q:"Quel compagnon de Paul était surnommé « fils d'encouragement » ?", options:["Silas","Barnabas","Tite","Apollos"], correct:"Barnabas", fact:"Son vrai nom était Joseph, un lévite originaire de Chypre (Actes 4:36)." },
    { q:"Quel jeune collaborateur Paul appelle-t-il « mon enfant légitime dans la foi » ?", options:["Tite","Timothée","Silas","Marc"], correct:"Timothée", fact:"Deux épîtres du Nouveau Testament lui sont adressées (1 Timothée 1:2)." },
    { q:"Quel esclave en fuite Paul a-t-il renvoyé à son maître Philémon ?", options:["Onésime","Épaphras","Tychique","Démas"], correct:"Onésime", fact:"Paul demande de l'accueillir « comme un frère bien-aimé » (Philémon 16)." },
    { q:"Quel apôtre portait le surnom de « Zélote » ?", options:["Simon","Jude","Jacques","Barthélemy"], correct:"Simon", fact:"À ne pas confondre avec Simon-Pierre (Luc 6:15)." },
    { q:"De quel père Jacques et Jean étaient-ils les fils ?", options:["Zébédée","Alphée","Jonas","Clopas"], correct:"Zébédée", fact:"Jésus les surnommait « Boanergès », fils du tonnerre (Marc 3:17)." },
    { q:"Quel prisonnier la foule a-t-elle réclamé à la place de Jésus ?", options:["Barabbas","Malchus","Silas","Alexandre"], correct:"Barabbas", fact:"Pilate le relâcha selon la coutume de la fête (Matthieu 27)." },
    { q:"Quel gouverneur romain s'est lavé les mains lors du procès de Jésus ?", options:["Hérode","Ponce Pilate","Festus","Félix"], correct:"Ponce Pilate", fact:"« Je suis innocent du sang de ce juste » (Matthieu 27:24)." },
    { q:"Pendant quelle fête juive le Saint-Esprit est-il descendu sur les disciples ?", options:["La Pâque","La Pentecôte","Les Tabernacles","Pourim"], correct:"La Pentecôte", fact:"Des langues comme de feu se posèrent sur chacun d'eux (Actes 2)." },
    { q:"Quel apôtre a vu en vision un grand drap rempli d'animaux descendre du ciel ?", options:["Jean","Pierre","Paul","Jacques"], correct:"Pierre", fact:"Dieu lui montrait que l'Évangile est aussi pour les non-Juifs (Actes 10)." },
    { q:"Quel centenier romain de Césarée a reçu le baptême par Pierre ?", options:["Corneille","Julius","Longin","Claudius"], correct:"Corneille", fact:"Le premier païen officiellement accueilli dans l'Église (Actes 10)." },
    { q:"Quelle marchande de pourpre a accueilli Paul à Philippes ?", options:["Lydie","Phoebé","Chloé","Damaris"], correct:"Lydie", fact:"« Le Seigneur lui ouvrit le cœur » pendant qu'elle écoutait (Actes 16:14)." },
    { q:"Combien de livres compte le Nouveau Testament ?", options:["24","27","39","66"], correct:"27", fact:"L'Ancien Testament, lui, en compte 39 dans le canon protestant." },
    { q:"Quel roi d'Israël a fait construire le premier Temple de Jérusalem ?", options:["David","Saül","Salomon","Ézéchias"], correct:"Salomon", fact:"David avait préparé les matériaux, mais c'est son fils Salomon qui a bâti le Temple (1 Rois 6)." },
    { q:"Quel apôtre a marché sur l'eau avant de commencer à couler par manque de foi ?", options:["Jean","André","Pierre","Jacques"], correct:"Pierre", fact:"Jésus lui tend la main en disant : « Homme de peu de foi, pourquoi as-tu douté ? » (Matthieu 14:22-33)." },
    { q:"Quel est le nom de la femme moabite qui a épousé Booz ?", options:["Rébecca","Ruth","Rachel","Léa"], correct:"Ruth", fact:"Leur histoire est racontée dans le livre de Ruth ; ils sont des ancêtres du roi David." },
    { q:"Qui a été jeté dans une fosse aux lions et en est sorti indemne ?", options:["Daniel","Ézéchiel","Job","Néhémie"], correct:"Daniel", fact:"Dieu a fermé la gueule des lions toute la nuit (Daniel 6)." },
    { q:"Quel est le nom du frère jumeau d'Ésaü ?", options:["Ruben","Jacob","Joseph","Benjamin"], correct:"Jacob", fact:"Jacob deviendra plus tard « Israël », père des douze tribus." },
    { q:"Quel prophète a affronté seul les prophètes de Baal sur le mont Carmel ?", options:["Élisée","Ésaïe","Élie","Jérémie"], correct:"Élie", fact:"Dieu a fait descendre le feu du ciel pour prouver sa puissance (1 Rois 18)." },
    { q:"Qui a révélé le secret de la force de Samson à ses ennemis ?", options:["Dalila","Ruth","Esther","Miriam"], correct:"Dalila", fact:"Le secret résidait dans ses cheveux, jamais coupés (Juges 16)." },
    { q:"Sur le chemin de quelle ville l'apôtre Paul (alors Saul) a-t-il été aveuglé par une lumière céleste ?", options:["Jérusalem","Damas","Antioche","Rome"], correct:"Damas", fact:"Cet épisode marque sa conversion spectaculaire (Actes 9)." },
    { q:"Quel roi d'Israël a commis l'adultère avec Bath-Shéba ?", options:["Salomon","Saül","David","Roboam"], correct:"David", fact:"Le prophète Nathan est venu le confronter avec une parabole (2 Samuel 12)." },
    { q:"Comment s'appelle la colline où Jésus a été crucifié ?", options:["Le mont des Oliviers","Golgotha","Le mont Sinaï","Le mont Carmel"], correct:"Golgotha", fact:"Ce nom signifie « lieu du crâne »." },
    { q:"Quel apôtre a écrit la majorité des épîtres du Nouveau Testament ?", options:["Pierre","Jean","Paul","Jacques"], correct:"Paul", fact:"On lui attribue treize épîtres, de Romains à Philémon." },
    { q:"Quel est le nom du jardin où Jésus a prié avant son arrestation ?", options:["Éden","Gethsémané","Le jardin du roi","Le jardin d'Achkelon"], correct:"Gethsémané", fact:"Il se trouve au pied du mont des Oliviers." },
    { q:"Quel livre biblique raconte l'histoire d'une reine juive qui sauve son peuple en Perse ?", options:["Ruth","Esther","Judith","Débora"], correct:"Esther", fact:"Le nom de Dieu n'apparaît jamais explicitement dans ce livre." },
    { q:"Combien de temps Jésus est-il resté sur terre après sa résurrection, avant son ascension ?", options:["3 jours","40 jours","40 ans","7 semaines"], correct:"40 jours", fact:"Voir Actes 1:3." },
    { q:"Quel fils Abraham a-t-il eu avec Sara dans leur vieillesse, celui de la promesse ?", options:["Ismaël","Isaac","Jacob","Ésaü"], correct:"Isaac", fact:"Son nom signifie « il rit », en lien avec le rire de Sara à l'annonce de sa naissance (Genèse 18, 21)." },
    { q:"Combien d'années Jacob a-t-il servi Laban pour pouvoir épouser Rachel ?", options:["7 ans","10 ans","14 ans","20 ans"], correct:"14 ans", fact:"Laban l'a d'abord trompé en lui donnant Léa (Genèse 29)." },
    { q:"Qui a vendu son droit d'aînesse à son frère pour un plat de lentilles ?", options:["Jacob","Ésaü","Ruben","Benjamin"], correct:"Ésaü", fact:"Ce récit se trouve en Genèse 25:29-34." },
    { q:"Quel est le nom du frère de Moïse qui parlait à sa place devant Pharaon ?", options:["Aaron","Josué","Caleb","Nadab"], correct:"Aaron", fact:"Aaron deviendra aussi le premier grand-prêtre d'Israël." },
    { q:"Quelle femme de Jéricho a caché les espions israélites envoyés par Josué ?", options:["Déborah","Rahab","Yaël","Miriam"], correct:"Rahab", fact:"Sa famille a été épargnée lors de la chute de Jéricho (Josué 2 et 6)." },
    { q:"Qui a été le tout premier roi d'Israël ?", options:["David","Saül","Salomon","Samuel"], correct:"Saül", fact:"Il a été oint par le prophète Samuel (1 Samuel 10)." },
    { q:"Quel prophète a confronté David après son péché avec Bath-Shéba, à l'aide d'une parabole ?", options:["Samuel","Nathan","Gad","Élie"], correct:"Nathan", fact:"Sa parabole de la brebis a amené David à reconnaître sa faute (2 Samuel 12)." },
    { q:"Quel fils de David s'est révolté contre son propre père ?", options:["Salomon","Absalom","Amnon","Adonija"], correct:"Absalom", fact:"Il est mort suspendu par les cheveux à un arbre (2 Samuel 18)." },
    { q:"Qui a renié connaître Jésus trois fois avant que le coq chante ?", options:["Judas","Pierre","Jean","Thomas"], correct:"Pierre", fact:"Jésus le lui avait pourtant annoncé à l'avance (Matthieu 26:34, 69-75)." },
    { q:"Qui a lavé les pieds de ses disciples lors de la dernière Cène ?", options:["Pierre","Judas","Jésus","Jean"], correct:"Jésus", fact:"Un geste d'humilité donné en exemple (Jean 13:1-17)." },
    { q:"Quel disciple a demandé à Jésus : « Montre-nous le Père » ?", options:["Thomas","Philippe","André","Barthélemy"], correct:"Philippe", fact:"Jésus lui répond : « Celui qui m'a vu a vu le Père » (Jean 14:8-9)." },
    { q:"Quelle ville est connue comme la ville natale du roi David ?", options:["Jérusalem","Hébron","Bethléem","Jéricho"], correct:"Bethléem", fact:"C'est aussi pourquoi le Messie devait y naître, selon la prophétie de Michée." },
    { q:"Que voulaient construire les hommes pour atteindre le ciel, selon Genèse 11 ?", options:["Un temple","Une tour","Un palais","Un mur"], correct:"Une tour", fact:"Dieu a confondu leur langage, créant la diversité des langues (Genèse 11:1-9)." },
    { q:"Combien de temps l'apôtre Paul est-il resté aveugle après avoir vu Jésus sur le chemin de Damas ?", options:["1 jour","3 jours","7 jours","40 jours"], correct:"3 jours", fact:"Ananias est venu lui rendre la vue et le baptiser (Actes 9:9-18)." },
    { q:"Quel est le nom du disciple qui a remplacé Judas parmi les douze apôtres ?", options:["Matthias","Barnabas","Silas","Timothée"], correct:"Matthias", fact:"Il a été choisi par tirage au sort (Actes 1:15-26)." },
    { q:"Quel est le nom du beau-père de Moïse, prêtre de Madian, chez qui il s'est réfugié ?", options:["Jéthro","Balaam","Coré","Balaak"], correct:"Jéthro", fact:"Moïse gardait ses troupeaux quand Dieu lui est apparu dans le buisson ardent (Exode 3)." },
    { q:"Environ combien d'années a duré le règne du roi Salomon sur Israël ?", options:["20 ans","40 ans","60 ans","10 ans"], correct:"40 ans", fact:"Comme son père David avant lui, qui a aussi régné environ 40 ans." },
    { q:"Qui a succédé au prophète Élie après avoir reçu une double portion de son esprit ?", options:["Élisée","Amos","Osée","Michée"], correct:"Élisée", fact:"Il a vu Élie monter au ciel et a recueilli son manteau (2 Rois 2:9-14)." },
    { q:"Quel est le nom de la sœur de Moïse qui a surveillé le panier déposé sur le Nil ?", options:["Miriam","Léa","Séphora","Ruth"], correct:"Miriam", fact:"Elle a proposé à la fille de Pharaon que sa propre mère nourrisse l'enfant (Exode 2:1-10)." },
    { q:"Quel roi d'Israël a fait ériger deux veaux d'or pour détourner son peuple du Temple de Jérusalem ?", options:["Achab","Jéroboam","Omri","Baesha"], correct:"Jéroboam", fact:"Il craignait que le peuple ne retourne à Roboam s'il continuait à monter adorer à Jérusalem (1 Rois 12)." },
    { q:"Quel général de l'armée de David a tué Absalom, malgré l'ordre contraire du roi ?", options:["Joab","Abner","Amasa","Benaja"], correct:"Joab", fact:"David a profondément pleuré la mort de son fils malgré sa rébellion (2 Samuel 18)." },
    { q:"Selon les rêves de Pharaon interprétés par Joseph, combien d'années de famine ont suivi sept années d'abondance ?", options:["3 ans","5 ans","7 ans","10 ans"], correct:"7 ans", fact:"Joseph a fait stocker du grain durant les années d'abondance pour préparer la famine (Genèse 41)." },
    { q:"Selon l'évangile de Jean, qui est le premier appelé à suivre Jésus parmi les futurs apôtres ?", options:["Pierre","André","Jean","Philippe"], correct:"André", fact:"André est allé ensuite chercher son frère Simon, qui deviendra Pierre (Jean 1:35-42)." },
    { q:"Sur quel lac Jésus a-t-il calmé une tempête en ordonnant au vent et aux vagues de se taire ?", options:["La mer Morte","Le lac de Galilée","La mer Rouge","La Méditerranée"], correct:"Le lac de Galilée", fact:"Les disciples se sont exclamés : « Quel est donc celui-ci, à qui même le vent et la mer obéissent ? » (Marc 4:35-41)." },
    { q:"Quel est le nom du chef des publicains, petit de taille, qui a grimpé dans un arbre pour voir Jésus ?", options:["Matthieu","Zachée","Lévi","Barthélemy"], correct:"Zachée", fact:"Jésus a demandé à loger chez lui ce jour-là (Luc 19:1-10)." },
    { q:"Quel jeune homme s'est endormi et est tombé d'une fenêtre pendant un long discours de Paul ?", options:["Eutyque","Timothée","Tychique","Silas"], correct:"Eutyque", fact:"Paul est descendu et l'a ramené à la vie (Actes 20)." },
    { q:"Quelle a été la première des dix plaies d'Égypte ?", options:["Les ténèbres","L'eau changée en sang","Les sauterelles","La grêle"], correct:"L'eau changée en sang", fact:"Le Nil et toutes les eaux d'Égypte devinrent du sang (Exode 7)." },
    { q:"Quel prophète a vu une vallée d'ossements desséchés reprendre vie et chair ?", options:["Ésaïe","Ézéchiel","Jérémie","Daniel"], correct:"Ézéchiel", fact:"Une vision de la restauration future d'Israël (Ézéchiel 37)." },
    { q:"Quel couple est mort après avoir menti au sujet d'un don, selon le livre des Actes ?", options:["Ananias et Saphira","Aquilas et Priscille","Zacharie et Élisabeth","Joseph et Marie"], correct:"Ananias et Saphira", fact:"Ils avaient menti non aux hommes mais à l'Esprit Saint (Actes 5)." },
    { q:"Quel roi de Juda, monté sur le trône à huit ans, est connu pour ses grandes réformes religieuses ?", options:["Ézéchias","Josias","Ozias","Achaz"], correct:"Josias", fact:"Il a fait redécouvrir le livre de la Loi dans le Temple (2 Rois 22)." },
    { q:"Combien de mages sont explicitement mentionnés dans l'évangile de Matthieu ?", options:["Le nombre n'est pas précisé","Deux","Trois","Quatre"], correct:"Le nombre n'est pas précisé", fact:"On parle souvent de trois à cause des trois présents, mais aucun nombre n'est donné (Matthieu 2)." },
    { q:"Quel disciple est surnommé « Didyme », c'est-à-dire « le jumeau » ?", options:["Jacques","Thomas","Nathanaël","Philippe"], correct:"Thomas", fact:"Le même qui douta d'abord de la résurrection (Jean 11 et 20)." },
    { q:"Quel objet fabriqué par Moïse guérissait ceux qui le regardaient après une morsure de serpent ?", options:["Une arche","Un serpent d'airain","Un bâton","Une lampe"], correct:"Un serpent d'airain", fact:"Jésus y verra une image de sa propre élévation sur la croix (Nombres 21 ; Jean 3)." },
    { q:"À quelle reine Salomon a-t-il répondu sur toutes ses questions, éprouvé par sa sagesse ?", options:["La reine de Saba","La reine Esther","La reine Jézabel","La reine Vasthi"], correct:"La reine de Saba", fact:"Elle repartit émerveillée par sa sagesse et sa richesse (1 Rois 10)." },
    { q:"Dans quelle ville les disciples ont-ils été appelés « chrétiens » pour la première fois ?", options:["Jérusalem","Antioche","Rome","Éphèse"], correct:"Antioche", fact:"C'est là que ce nom leur fut donné (Actes 11:26)." },
    { q:"Quel notable est venu de nuit interroger Jésus, puis a aidé à l'ensevelir avec des aromates ?", options:["Nicodème","Joseph d'Arimathée","Barnabas","Gamaliel"], correct:"Nicodème", fact:"Ce pharisien apporta myrrhe et aloès pour l'ensevelissement (Jean 3 et 19)." },
    { q:"Depuis combien de jours Lazare était-il mort lorsque Jésus l'a ressuscité ?", options:["Deux","Trois","Quatre","Sept"], correct:"Quatre", fact:"Sa sœur Marthe fit remarquer qu'il sentait déjà (Jean 11)." },
    { q:"Quelle femme juge a conduit Israël à la victoire avec Barak ?", options:["Débora","Ruth","Esther","Athalie"], correct:"Débora", fact:"Elle jugeait Israël sous un palmier (Juges 4)." },
    { q:"Quel roi a demandé à Dieu la sagesse plutôt que la richesse ?", options:["David","Salomon","Ézéchias","Saül"], correct:"Salomon", fact:"Dieu lui accorda aussi ce qu'il n'avait pas demandé (1 Rois 3)." },
    { q:"Quel roi de Juda a obtenu quinze années de vie supplémentaires après sa prière ?", options:["Josias","Ézéchias","Asa","Joas"], correct:"Ézéchias", fact:"L'ombre recula de dix degrés en signe de la promesse (2 Rois 20)." },
    { q:"Sur quelle montagne Moïse a-t-il reçu les tables de la Loi ?", options:["Le Carmel","Le Sinaï","Le Nébo","Les Oliviers"], correct:"Le Sinaï", fact:"Aussi appelée Horeb, la montagne de Dieu (Exode 19)." },
    { q:"Quel patriarche a lutté toute une nuit avec un inconnu et reçu le nom d'Israël ?", options:["Abraham","Isaac","Jacob","Joseph"], correct:"Jacob", fact:"Au gué du Jabbok, il en garda une boiterie (Genèse 32)." },
    { q:"Quelle reine a risqué sa vie en paraissant devant le roi sans y être invitée ?", options:["Bethsabée","Esther","Jézabel","La reine de Saba"], correct:"Esther", fact:"« Si je dois périr, je périrai » (Esther 4)." },
    { q:"Quel prophète a épousé une femme infidèle sur l'ordre de Dieu, en signe pour Israël ?", options:["Osée","Amos","Michée","Sophonie"], correct:"Osée", fact:"Son mariage illustrait l'amour fidèle de Dieu (Osée 1)." },
    { q:"Combien de lépreux guéris par Jésus sont revenus le remercier ?", options:["Aucun","Un","Cinq","Dix"], correct:"Un", fact:"Sur dix guéris, un seul — un Samaritain (Luc 17)." },
    { q:"Quel disciple a renié Jésus trois fois avant le chant du coq ?", options:["Jean","Pierre","Thomas","Jacques"], correct:"Pierre", fact:"Il pleura amèrement, puis fut restauré trois fois (Luc 22 ; Jean 21)." },
    { q:"Quel fleuve Naaman a-t-il dû se plonger sept fois pour être guéri de la lèpre ?", options:["Le Nil","L'Euphrate","Le Jourdain","L'Abana"], correct:"Le Jourdain", fact:"Il trouvait d'abord l'ordre indigne de lui (2 Rois 5)." },
    { q:"Quel apôtre a été appelé sur le chemin de Damas ?", options:["Barnabas","Paul","Étienne","Timothée"], correct:"Paul", fact:"Saul de Tarse, terrassé par une lumière venue du ciel (Actes 9)." },
    { q:"Dans la parabole, que fait le père en voyant revenir le fils prodigue ?", options:["Il l'ignore","Il court à sa rencontre","Il le punit","Il envoie un serviteur"], correct:"Il court à sa rencontre", fact:"Il court, se jette à son cou et l'embrasse (Luc 15)." }
  ],
  difficile: [
    { q:"Quel sacrificateur a élevé le jeune Samuel au sanctuaire de Silo ?", options:["Éli","Aaron","Sadok","Abiathar"], correct:"Éli", fact:"Samuel y a entendu Dieu l'appeler pendant la nuit (1 Samuel 3)." },
    { q:"Comment s'appelaient les deux fils indignes du sacrificateur Éli ?", options:["Hophni et Phinées","Nadab et Abihu","Guerschom et Éliézer","Jabin et Sisera"], correct:"Hophni et Phinées", fact:"Ils moururent le jour où l'arche fut prise (1 Samuel 4)." },
    { q:"Quel roi de Perse a fait d'Esther sa reine ?", options:["Cyrus","Assuérus","Darius","Artaxerxès"], correct:"Assuérus", fact:"Souvent identifié à Xerxès Ier (Esther 2)." },
    { q:"Qui a été pendu à la potence qu'il avait fait dresser pour Mardochée ?", options:["Haman","Sanballat","Tobija","Memucan"], correct:"Haman", fact:"Un retournement complet, raconté en Esther 7." },
    { q:"Quel juge d'Israël a fait un vœu imprudent concernant sa fille unique ?", options:["Jephté","Gédéon","Samson","Otniel"], correct:"Jephté", fact:"Voir Juges 11 — l'un des récits les plus discutés de la Bible." },
    { q:"Quel prophète a vu des séraphins à six ailes autour du trône de Dieu ?", options:["Ézéchiel","Ésaïe","Daniel","Zacharie"], correct:"Ésaïe", fact:"« Saint, saint, saint est l'Éternel des armées ! » (Ésaïe 6)." },
    { q:"De quelle ville l'apôtre Paul était-il originaire ?", options:["Antioche","Tarse","Damas","Jérusalem"], correct:"Tarse", fact:"Une ville de Cilicie ; Paul était aussi citoyen romain (Actes 22)." },
    { q:"Devant quel roi Paul a-t-il plaidé, qui a failli « devenir chrétien » ?", options:["Hérode Antipas","Agrippa","Félix","Néron"], correct:"Agrippa", fact:"« Tu vas bientôt me persuader de devenir chrétien ! » (Actes 26:28)." },
    { q:"Quel grand-prêtre a déchiré ses vêtements pendant le procès de Jésus ?", options:["Anne","Caïphe","Sadok","Ananias"], correct:"Caïphe", fact:"Il avait dit qu'il valait mieux qu'un seul homme meure pour le peuple (Jean 11:49-51)." },
    { q:"Quel autre nom porte l'apôtre Thomas dans l'évangile de Jean ?", options:["Didyme","Boanergès","Céphas","Justus"], correct:"Didyme", fact:"Ce surnom grec signifie « jumeau » (Jean 11:16)." },
    { q:"Quel prophète a eu la vision d'un rouleau volant de vingt coudées ?", options:["Zacharie","Aggée","Habacuc","Nahum"], correct:"Zacharie", fact:"Le rouleau portait une malédiction contre le vol et le parjure (Zacharie 5)." },
    { q:"Quelle est la plus courte épître de Paul ?", options:["Tite","Philémon","2 Thessaloniciens","Jude"], correct:"Philémon", fact:"25 versets seulement — et l'épître de Jude n'est pas de Paul !" },
    { q:"Quel roi d'Israël a acheté la colline où il a bâti Samarie ?", options:["Omri","Achab","Jéhu","Baescha"], correct:"Omri", fact:"Il l'a payée deux talents d'argent à Schémer (1 Rois 16:24)." },
    { q:"Quelle prophétesse a authentifié le livre de la Loi retrouvé sous Josias ?", options:["Hulda","Miriam","Débora","Noadia"], correct:"Hulda", fact:"Le roi a envoyé ses ministres la consulter (2 Rois 22)." },
    { q:"Quel roi de Juda a brisé le serpent d'airain devenu objet d'idolâtrie ?", options:["Ézéchias","Josias","Asa","Josaphat"], correct:"Ézéchias", fact:"On l'appelait Nehuschtan (2 Rois 18:4)." },
    { q:"Combien d'anciens siègent autour du trône dans l'Apocalypse ?", options:["12","24","70","144"], correct:"24", fact:"Vêtus de blanc, avec des couronnes d'or (Apocalypse 4:4)." },
    { q:"Combien de portes possède la nouvelle Jérusalem ?", options:["4","7","12","24"], correct:"12", fact:"Chacune faite d'une seule perle, d'où les « portes de perle » (Apocalypse 21:21)." },
    { q:"Quel serviteur d'Élisée est devenu lépreux à cause de sa cupidité ?", options:["Guéhazi","Ittaï","Baana","Schaphan"], correct:"Guéhazi", fact:"Il avait couru réclamer à Naaman ce que son maître avait refusé (2 Rois 5)." },
    { q:"Quel apôtre Paul a-t-il repris publiquement à Antioche ?", options:["Pierre","Jacques","Barnabas","Jean"], correct:"Pierre", fact:"Au sujet des repas partagés avec les non-Juifs (Galates 2:11-14)." },
    { q:"Sous quel arbre la juge Débora rendait-elle ses jugements ?", options:["Un palmier","Un cèdre","Un olivier","Un térébinthe"], correct:"Un palmier", fact:"« Le palmier de Débora », entre Rama et Béthel (Juges 4:5)." },
    { q:"Quel roi et sacrificateur mystérieux a béni Abraham avec du pain et du vin ?", options:["Melchisédek","Abimélec","Jéthro","Balaam"], correct:"Melchisédek", fact:"Roi de Salem, figure du Christ selon Hébreux 7." },
    { q:"Quel nom Naomi a-t-elle voulu porter à son retour, signifiant « amère » ?", options:["Mara","Noa","Orpa","Séla"], correct:"Mara", fact:"« Car le Tout-Puissant m'a remplie d'amertume » (Ruth 1:20)." },
    { q:"Combien de chapitres compte le livre des Psaumes ?", options:["100","119","150","176"], correct:"150", fact:"Le grand recueil de prières et de chants d'Israël." },
    { q:"Quelle idole des Philistins est tombée face contre terre devant l'arche ?", options:["Dagon","Baal","Astarté","Moloc"], correct:"Dagon", fact:"Retrouvée décapitée le second matin (1 Samuel 5)." },
    { q:"Sur quelle colline d'Athènes Paul a-t-il annoncé « le Dieu inconnu » ?", options:["L'Acropole","L'Aréopage","Le Pnyx","Le Lycabette"], correct:"L'Aréopage", fact:"Il y a même cité des poètes grecs (Actes 17)." },
    { q:"Qui se présente simplement comme « l'ancien » au début de 2 et 3 Jean ?", options:["Pierre","Jean","Jacques","Paul"], correct:"Jean", fact:"Ce sont les deux plus courtes lettres du Nouveau Testament." },
    { q:"Quel faux prophète a été frappé d'aveuglement par Paul à Chypre ?", options:["Élymas","Simon","Hyménée","Alexandre"], correct:"Élymas", fact:"Appelé aussi Bar-Jésus, devant le proconsul Sergius Paulus (Actes 13)." },
    { q:"Quelle église de l'Apocalypse est qualifiée de « tiède » ?", options:["Éphèse","Laodicée","Sardes","Smyrne"], correct:"Laodicée", fact:"« Ni froide ni bouillante » (Apocalypse 3:16)." },
    { q:"Combien d'églises d'Asie reçoivent une lettre dans l'Apocalypse ?", options:["3","7","10","12"], correct:"7", fact:"D'Éphèse à Laodicée (Apocalypse 2-3)." },
    { q:"Lequel de ces fleuves est cité parmi ceux du jardin d'Éden ?", options:["Le Nil","L'Euphrate","Le Jourdain","Le Yarmouk"], correct:"L'Euphrate", fact:"Avec le Pischon, le Guihon et le Tigre (Genèse 2:10-14)." },
    { q:"Combien de livres compte la Bible protestante au total (Ancien + Nouveau Testament) ?", options:["39","46","66","73"], correct:"66", fact:"39 livres dans l'Ancien Testament et 27 dans le Nouveau." },
    { q:"Quel livre compte le plus grand nombre de chapitres de toute la Bible ?", options:["Genèse","Ésaïe","Psaumes","Jérémie"], correct:"Psaumes", fact:"Le livre des Psaumes compte 150 chapitres (psaumes)." },
    { q:"Quel est le plus long chapitre de toute la Bible ?", options:["Psaume 23","Psaume 119","Ésaïe 53","Genèse 1"], correct:"Psaume 119", fact:"Il compte 176 versets, presque tous consacrés à la Parole de Dieu." },
    { q:"Quel est le plus court chapitre de la Bible ?", options:["Psaume 117","Psaume 1","Jude 1","2 Jean 1"], correct:"Psaume 117", fact:"Il ne compte que 2 versets." },
    { q:"Combien d'années les Hébreux ont-ils erré dans le désert avant d'entrer en Terre promise ?", options:["10 ans","25 ans","40 ans","70 ans"], correct:"40 ans", fact:"Cette période suit l'épisode du manque de foi du peuple à Kadès-Barnéa (Nombres 14)." },
    { q:"Qui a succédé à Moïse pour conduire le peuple en Terre promise ?", options:["Caleb","Josué","Aaron","Samuel"], correct:"Josué", fact:"C'est sous sa conduite que les murailles de Jéricho sont tombées." },
    { q:"Quel prophète a été enlevé au ciel dans un char de feu, sans connaître la mort ?", options:["Ésaïe","Élie","Élisée","Ézéchiel"], correct:"Élie", fact:"Son manteau est tombé sur Élisée, son successeur (2 Rois 2)." },
    { q:"Selon la tradition biblique, quel autre personnage de l'Ancien Testament n'a pas connu la mort, comme Élie ?", options:["Hénoc","Noé","Abraham","Job"], correct:"Hénoc", fact:"« Hénoc marcha avec Dieu, puis il ne fut plus, car Dieu le prit » (Genèse 5:24)." },
    { q:"Combien de temps Jonas est-il resté dans le ventre du grand poisson ?", options:["1 jour","3 jours et 3 nuits","7 jours","40 jours"], correct:"3 jours et 3 nuits", fact:"Jésus a comparé cet épisode à sa propre mort et résurrection (Matthieu 12:40)." },
    { q:"Quel roi a vu une main mystérieuse écrire sur le mur pendant un festin ?", options:["Nebucadnetsar","Belschatsar","Cyrus","Darius"], correct:"Belschatsar", fact:"Daniel a interprété ce message annonçant la chute de son royaume (Daniel 5)." },
    { q:"Quel est le nom de la montagne où l'arche de Noé se serait posée après le déluge ?", options:["Le mont Sinaï","Le mont Ararat","Le mont Nébo","Le mont Horeb"], correct:"Le mont Ararat", fact:"Voir Genèse 8:4." },
    { q:"Combien de fruits de l'Esprit l'apôtre Paul énumère-t-il en Galates 5 ?", options:["5","7","9","12"], correct:"9", fact:"Amour, joie, paix, patience, bonté, bénignité, fidélité, douceur et maîtrise de soi." },
    { q:"Quel nom donné à Jésus dans les prophéties signifie « Dieu avec nous » ?", options:["Messie","Emmanuel","Sauveur","Fils de l'Homme"], correct:"Emmanuel", fact:"Ce nom est annoncé en Ésaïe 7:14, puis repris en Matthieu 1:23." },
    { q:"Quel est le nom du serviteur d'Abraham envoyé pour trouver une femme à Isaac ?", options:["Éliézer","Lot","Laban","Ismaël"], correct:"Éliézer", fact:"Il a trouvé Rébecca près d'un puits (Genèse 24)." },
    { q:"Sur quelle montagne Abraham a-t-il été prêt à offrir son fils Isaac en sacrifice ?", options:["Le mont Sinaï","Le mont Moriya","Le mont Carmel","Le mont Nébo"], correct:"Le mont Moriya", fact:"Dieu a finalement pourvu un bélier pour remplacer Isaac (Genèse 22)." },
    { q:"Combien de fils Jacob (Israël) a-t-il eus au total ?", options:["7","10","12","13"], correct:"12", fact:"Ils donneront leur nom aux douze tribus d'Israël (Genèse 35 et 49)." },
    { q:"Quel est le nom du deuxième livre de la Bible ?", options:["La Genèse","L'Exode","Le Lévitique","Les Nombres"], correct:"L'Exode", fact:"Il raconte la sortie d'Égypte du peuple hébreu sous la conduite de Moïse." },
    { q:"Quel prophète Dieu a-t-il chargé d'épouser une femme infidèle, en signe symbolique pour Israël ?", options:["Amos","Osée","Joël","Michée"], correct:"Osée", fact:"Ce mariage illustrait l'amour fidèle de Dieu malgré l'infidélité de son peuple (Osée 1)." },
    { q:"Quel personnage biblique a vécu le plus longtemps, selon la Genèse, avec 969 ans ?", options:["Noé","Mathusalem","Adam","Hénoc"], correct:"Mathusalem", fact:"Voir Genèse 5:27." },
    { q:"Quel est le livre le plus court de l'Ancien Testament, avec seulement 21 versets ?", options:["Abdias","Aggée","Sophonie","Nahum"], correct:"Abdias", fact:"Ce livre annonce le jugement d'Édom." },
    { q:"Combien de jours a duré le siège de Jéricho avant la chute de ses murailles ?", options:["3 jours","7 jours","12 jours","40 jours"], correct:"7 jours", fact:"Les Israélites ont marché autour de la ville une fois par jour, puis sept fois le septième jour (Josué 6)." },
    { q:"Sur quelle montagne Élie a-t-il entendu Dieu lui parler dans un « murmure doux et léger » ?", options:["Le mont Carmel","Le mont Horeb","Le mont Thabor","Le mont Nébo"], correct:"Le mont Horeb", fact:"Voir 1 Rois 19:11-13." },
    { q:"Quel roi de Babylone a été frappé de folie pendant sept temps, selon le livre de Daniel, avant de retrouver la raison ?", options:["Cyrus","Nebucadnetsar","Darius","Belschatsar"], correct:"Nebucadnetsar", fact:"Il a fini par reconnaître la souveraineté de Dieu (Daniel 4)." },
    { q:"Qui est considéré comme le premier martyr chrétien, lapidé selon le livre des Actes ?", options:["Jacques","Étienne","Barnabas","Timothée"], correct:"Étienne", fact:"Saul, le futur Paul, était présent et approuvait sa mort (Actes 7)." },
    { q:"De combien d'années la vie du roi Ézéchias a-t-elle été prolongée après sa prière lors d'une maladie mortelle ?", options:["5 ans","10 ans","15 ans","20 ans"], correct:"15 ans", fact:"Dieu lui a donné un signe : l'ombre a reculé de dix degrés (2 Rois 20:1-11)." },
    { q:"Quel scribe a aidé à lire et expliquer la Loi au peuple, aux côtés de Néhémie, après l'Exil ?", options:["Esdras","Baruch","Malachie","Zorobabel"], correct:"Esdras", fact:"Voir Néhémie 8." },
    { q:"Quel roi perse a autorisé la reconstruction du Temple de Jérusalem après l'Exil babylonien ?", options:["Darius","Cyrus","Xerxès","Artaxerxès"], correct:"Cyrus", fact:"Voir Esdras 1:1-4." },
    { q:"Quels sont les noms des trois compagnons de Daniel jetés dans la fournaise ardente ?", options:["Shadrak, Méshak et Abed-Nego","Anne, Caïphe et Pilate","Gad, Nathan et Aser","Éliab, Abinadab et Schamma"], correct:"Shadrak, Méshak et Abed-Nego", fact:"Ils en sont ressortis indemnes, sans même une odeur de brûlé (Daniel 3)." },
    { q:"Quelle est la seule femme juge d'Israël mentionnée dans le livre des Juges ?", options:["Ruth","Débora","Esther","Miriam"], correct:"Débora", fact:"Elle a aussi été prophétesse et a conduit Israël à la victoire (Juges 4-5)." },
    { q:"Quel nombre symbolique est associé à « la bête » dans le livre de l'Apocalypse ?", options:["7","12","40","666"], correct:"666", fact:"Voir Apocalypse 13:18." },
    { q:"Quelle était la première épouse de Jacob, donnée à la place de Rachel le soir de ses noces ?", options:["Léa","Bilha","Zilpa","Tamar"], correct:"Léa", fact:"Laban justifiera cette tromperie par la coutume de marier l'aînée en premier (Genèse 29:16-26)." },
    { q:"Combien de temps l'arche de l'alliance est-elle restée capturée chez les Philistins avant d'être renvoyée ?", options:["7 jours","7 semaines","7 mois","7 ans"], correct:"7 mois", fact:"Sa présence provoquait des fléaux chez les Philistins, qui ont fini par la renvoyer (1 Samuel 5-6)." },
    { q:"Quel roi de Juda a régné le plus longtemps, avec 55 ans de règne ?", options:["David","Salomon","Manassé","Ézéchias"], correct:"Manassé", fact:"Son règne fut pourtant marqué par une grande idolâtrie (2 Rois 21:1)." },
    { q:"Quel est le nom du dernier roi de Juda avant la destruction de Jérusalem par les Babyloniens ?", options:["Josias","Sédécias","Jojakim","Achaz"], correct:"Sédécias", fact:"Nebucadnetsar l'a fait capturer après avoir vu ses fils exécutés sous ses yeux (2 Rois 25)." },
    { q:"Sur quel mont Moïse est-il mort, sans avoir pu entrer en Terre promise ?", options:["Le mont Sinaï","Le mont Nébo","Le mont Horeb","Le mont Thabor"], correct:"Le mont Nébo", fact:"Dieu lui a montré tout le pays promis avant sa mort (Deutéronome 34)." },
    { q:"Quel prophète a été jeté dans une citerne boueuse pour avoir annoncé un message jugé décourageant ?", options:["Ésaïe","Jérémie","Ézéchiel","Amos"], correct:"Jérémie", fact:"Un serviteur du roi l'en a fait remonter à l'aide de cordes (Jérémie 38)." },
    { q:"Dans quelle ville Jésus a-t-il ressuscité Lazare, quatre jours après sa mort ?", options:["Béthanie","Capernaüm","Jéricho","Cana"], correct:"Béthanie", fact:"Cette ville était proche de Jérusalem, sur le mont des Oliviers (Jean 11)." },
    { q:"Quel roi de Juda a découpé et brûlé le rouleau contenant les prophéties de Jérémie ?", options:["Josias","Jojakim","Sédécias","Manassé"], correct:"Jojakim", fact:"Jérémie a dû dicter une seconde fois ses prophéties à son secrétaire Baruc (Jérémie 36)." },
    { q:"Quel roi d'Israël a consulté une nécromancienne, la « sorcière d'En-Dor », avant sa dernière bataille ?", options:["Saül","David","Achab","Jéroboam"], correct:"Saül", fact:"Il cherchait désespérément à faire évoquer l'esprit du prophète Samuel, déjà mort (1 Samuel 28)." },
    { q:"Quel livre du Nouveau Testament, adressé à des chrétiens d'origine juive, traite longuement du sacerdoce de Jésus ?", options:["L'épître aux Romains","L'épître aux Hébreux","L'épître aux Galates","L'épître de Jacques"], correct:"L'épître aux Hébreux", fact:"Son auteur exact reste débattu depuis les premiers siècles de l'Église." },
    { q:"Quel est le verset le plus court de toute la Bible ?", options:["« Jésus pleura »","« Priez sans cesse »","« Dieu est amour »","« Réjouissez-vous »"], correct:"« Jésus pleura »", fact:"Deux mots seulement, devant le tombeau de Lazare (Jean 11:35)." },
    { q:"Quel prophète a ressuscité le fils de la Sunamite qui l'avait hébergé ?", options:["Élie","Élisée","Nathan","Ésaïe"], correct:"Élisée", fact:"Élie, lui, avait ressuscité le fils de la veuve de Sarepta (2 Rois 4)." },
    { q:"Quel roi d'Israël s'est déguisé en simple soldat mais fut tué par une flèche tirée au hasard ?", options:["Saül","Achab","Joram","Josias"], correct:"Achab", fact:"Son déguisement n'a pas empêché l'accomplissement de la parole prophétique (1 Rois 22)." },
    { q:"Sur quelle île l'apôtre Jean fut-il exilé lorsqu'il reçut l'Apocalypse ?", options:["Chypre","Patmos","Malte","Crète"], correct:"Patmos", fact:"Il s'y trouvait « à cause de la parole de Dieu » (Apocalypse 1:9)." },
    { q:"Quel prophète mineur a annoncé une invasion de sauterelles et « le jour de l'Éternel » ?", options:["Amos","Joël","Abdias","Nahum"], correct:"Joël", fact:"Le fléau des sauterelles y symbolise le jugement à venir (livre de Joël)." },
    { q:"Quel roi de Juda est devenu lépreux pour avoir voulu offrir l'encens dans le Temple ?", options:["Achaz","Ozias","Joram","Manassé"], correct:"Ozias", fact:"Il usurpa la fonction réservée aux prêtres (2 Chroniques 26)." },
    { q:"Combien de temps a duré la construction du premier Temple, sous Salomon ?", options:["Trois ans","Sept ans","Quatorze ans","Vingt ans"], correct:"Sept ans", fact:"Précisé en 1 Rois 6:38." },
    { q:"Quel prophète a acheté un champ en gage d'espérance, alors que Jérusalem allait tomber ?", options:["Jérémie","Ézéchiel","Ésaïe","Baruc"], correct:"Jérémie", fact:"Un signe que l'on rachèterait encore des terres après l'exil (Jérémie 32)." },
    { q:"Quel compagnon de Paul et Barnabas les a quittés au début du premier voyage missionnaire ?", options:["Silas","Jean-Marc","Tite","Luc"], correct:"Jean-Marc", fact:"Ce départ provoqua plus tard une vive dispute entre Paul et Barnabas (Actes 13 et 15)." },
    { q:"Quelle est la dernière parole de Jésus sur la croix selon l'évangile de Luc ?", options:["« Tout est accompli »","« Père, je remets mon esprit entre tes mains »","« Pourquoi m'as-tu abandonné ? »","« J'ai soif »"], correct:"« Père, je remets mon esprit entre tes mains »", fact:"Chaque évangile rapporte des paroles différentes ; celle-ci est propre à Luc 23:46." },
    { q:"Combien de livres composent le Pentateuque (la Torah) ?", options:["Quatre","Cinq","Six","Sept"], correct:"Cinq", fact:"Genèse, Exode, Lévitique, Nombres et Deutéronome." },
    { q:"Quel homme riche et intègre a tout perdu, puis fut éprouvé par Satan avec la permission de Dieu ?", options:["Lot","Job","Booz","Nabal"], correct:"Job", fact:"Son livre explore le mystère de la souffrance du juste." },
    { q:"Quel scribe et sacrificateur a conduit le retour d'exil et enseigné la Loi à Jérusalem ?", options:["Néhémie","Esdras","Zorobabel","Aggée"], correct:"Esdras", fact:"Il avait appliqué son cœur à étudier, pratiquer et enseigner la Loi (Esdras 7)." },
    { q:"Quel prophète a vu un char de feu enlever Élie au ciel ?", options:["Élisée","Samuel","Nathan","Michée"], correct:"Élisée", fact:"Il reçut une double portion de son esprit (2 Rois 2)." },
    { q:"Quelle est la plus longue épître de Paul ?", options:["1 Corinthiens","Romains","Éphésiens","Hébreux"], correct:"Romains", fact:"Seize chapitres denses, sommet de sa théologie." },
    { q:"Quel homme fut choisi par tirage au sort pour remplacer Judas parmi les Douze ?", options:["Barsabbas","Matthias","Silas","Apollos"], correct:"Matthias", fact:"Le sort tomba sur lui plutôt que sur Joseph Barsabbas (Actes 1)." },
    { q:"Quel prophète fut envoyé à Ninive, capitale de l'Assyrie ?", options:["Nahum","Jonas","Abdias","Habakuk"], correct:"Jonas", fact:"Nahum annoncera plus tard la chute de la même ville." },
    { q:"Quel roi babylonien a vu une main écrire sur le mur de son palais ?", options:["Nebucadnetsar","Belschatsar","Darius","Cyrus"], correct:"Belschatsar", fact:"« Mené, Mené, Thekel, Parsin » — pesé et trouvé léger (Daniel 5)." },
    { q:"Quelle servante a ouvert au disciple Pierre après sa libération miraculeuse de prison ?", options:["Rhode","Lydie","Dorcas","Phœbé"], correct:"Rhode", fact:"De joie, elle oublia d'ouvrir la porte et courut l'annoncer (Actes 12)." },
    { q:"Quel couple d'artisans, faiseurs de tentes, a accompagné Paul et instruit Apollos ?", options:["Aquilas et Priscille","Ananias et Saphira","Philémon et Apphia","Andronicus et Junias"], correct:"Aquilas et Priscille", fact:"Ils exposèrent plus exactement la voie de Dieu à Apollos (Actes 18)." },
    { q:"Combien d'années les Israélites ont-ils marché dans le désert avant d'entrer en Canaan ?", options:["Sept","Douze","Quarante","Soixante-dix"], correct:"Quarante", fact:"Une année par jour d'exploration des espions (Nombres 14)." },
    { q:"Quel est le dernier mot du livre de l'Apocalypse (et de la Bible) ?", options:["Amen","Alléluia","Maranatha","Gloire"], correct:"Amen", fact:"« Que la grâce du Seigneur Jésus soit avec tous ! Amen » (Apocalypse 22:21)." },
    { q:"Quel juge d'Israël a vaincu Madian avec seulement trois cents hommes ?", options:["Samson","Gédéon","Jephté","Éhud"], correct:"Gédéon", fact:"Dieu réduisit l'armée pour que la gloire lui revienne (Juges 7)." },
    { q:"Quelle ville a vu ses murailles tomber après sept tours au son des trompettes ?", options:["Aï","Jéricho","Gabaon","Hébron"], correct:"Jéricho", fact:"Première conquête en Canaan, par la foi (Josué 6)." }

let qTimerId = null, qTimerLeft = 0;
function stopQTimer(){ if(qTimerId){ clearInterval(qTimerId); qTimerId = null; } }
function timerSecondsFor(key){ return TIMER_OPTS[key] === undefined ? null : TIMER_OPTS[key]; }
function startQTimer(seconds, onExpire){
  stopQTimer();
  if(!seconds) return;
  qTimerLeft = seconds;
  updateTimerChip();
  qTimerId = setInterval(()=>{
    qTimerLeft -= 1;
    if(qTimerLeft <= 5 && qTimerLeft > 0 && settings.sfx){ tock(880, 0, 0.006); }
    if(qTimerLeft <= 0){
      stopQTimer();
      updateTimerChip();
      onExpire();
      return;
    }
    updateTimerChip();
  }, 1000);
}
function updateTimerChip(){
  const chip = document.getElementById("qTimerChip");
  if(!chip) return;
  const val = chip.querySelector(".tv");
  if(val) val.textContent = Math.max(qTimerLeft,0) + " s";
  chip.classList.toggle("low", qTimerLeft <= 5);
}
function timerChipHtml(seconds){
  if(!seconds) return "";
  return `<span class="timer-chip" id="qTimerChip"><span class="ico">${ICONS.clock}</span><span class="tv">${seconds} s</span></span>`;
}
function soloTimeUp(){
  if(state.revealed) return;
  state.revealed = true; justRevealed = true; state.timedOut = true;
  state.soloSelected = null;
  state.soloStreak = 0;
  playIncorrect();
  render();
}
function groupTimeUp(){
  if(state.revealed) return;
  state.revealed = true; justRevealed = true; state.timedOut = true;
  playIncorrect();
  render();
}

/* ===================== SEED / DECK SYNCHRONISÉ ===================== */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function seededDeck(seed, lengthKey){
  const rng = mulberry32(seed>>>0);
  const ss = (arr)=>{ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
  const n = LENGTHS[lengthKey] || 5;
  let list = [];
  ["facile","moyen","difficile"].forEach(tier=>{
    ss(BANK[tier]).slice(0,n).forEach(q=>{ list.push({ ...q, tier, shuffledOptions: ss(q.options) }); });
  });
  return ss(list);
}
function genCode(){ const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s=""; for(let i=0;i<4;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }

  const supa = initSupa();
  if(!supa) return;
  if(net.lobby) return;
  net.lookers = {};
  const ch = supa.channel("bt-lobby-v1", { config:{ presence:{ key: myId }, broadcast:{ self:false } } });

  ch.on("presence", { event:"sync" }, ()=>{
    const st = ch.presenceState();
    net.connected = Object.keys(st).length;
    reRenderIfOnline();
  });
  ch.on("broadcast", { event:"looking" }, ({ payload })=>{
    if(!payload || payload.id===myId) return;
    net.lookers[payload.id] = Date.now();
    matchFromLookers();
    reRenderIfOnline();
  });
  ch.on("broadcast", { event:"matched" }, ({ payload })=>{
    if(!payload || net.room) return;
    if(payload.guest === myId){
      net.searching = false; net.matching = false; stopSearchHeartbeat();
      joinRoom(payload.code, false);

function freshLookers(){
  const now = Date.now(); let c = 0;
  Object.keys(net.lookers||{}).forEach(id=>{ if(id!==myId && (now - net.lookers[id]) < 4500) c++; });
  return c;
}
function matchFromLookers(){
  if(!net.searching || net.matching || net.room) return;
  const now = Date.now();
  const ids = [myId];
  Object.keys(net.lookers).forEach(id=>{ if(id!==myId && (now - net.lookers[id]) < 4500) ids.push(id); });
  ids.sort();
  const pos = ids.indexOf(myId);
  const partnerPos = pos % 2 === 0 ? pos+1 : pos-1;
  if(partnerPos < 0 || partnerPos >= ids.length) return;
  if(pos % 2 === 0){
    net.matching = true;
    net.searching = false; stopSearchHeartbeat();
    const code = genCode();
    const guest = ids[partnerPos];
    net.lobby.send({ type:"broadcast", event:"matched", payload:{ code, host:myId, guest } });
    createRoom(code, true);
  }
}

/* ===================== SALON / DUEL ===================== */
function bindRoom(ch){
  ch.on("presence", { event:"sync" }, ()=>{
    const st = ch.presenceState();
    const others = [];
    Object.keys(st).forEach(k=>{ if(k!==myId && st[k] && st[k][0]) others.push(st[k][0]); });
    net.oppPresent = others.length > 0;
    if(others.length){
      net.opp = others[0];
      net.oppLastSeen = Date.now();
      if(net.joinTimer){ clearTimeout(net.joinTimer); net.joinTimer = null; }
    }
    reRenderIfOnline();
  });
  ch.on("presence", { event:"leave" }, ()=>{
    const st = ch.presenceState();
    const stillThere = Object.keys(st).some(k=>k!==myId);
    if(!stillThere){
      net.oppPresent = false;
      if(state.screen==="online-play" || state.screen==="online-end"){ markOppGone(); }
      else if(state.screen==="online-room" && !net.isHost){
        cleanupRoom();
        net.error = "L'hôte a quitté le salon.";
        state.screen = "online"; render();
      }
      else { reRenderIfOnline(); }
    }
  });
  ch.on("broadcast", { event:"start" }, ({ payload })=>{
    if(!payload) return;
    net.oppLastSeen = Date.now();
    beginDuel(payload.seed, payload.lengthKey, payload.timerKey);
  });
  ch.on("broadcast", { event:"hb" }, ({ payload })=>{
    if(!payload || payload.id===myId) return;
    net.oppLastSeen = Date.now();
    if(net.oppGone){ net.oppGone = false; reRenderIfOnline(); }
  });
  ch.on("broadcast", { event:"progress" }, ({ payload })=>{
    if(!payload || payload.id===myId) return;
    net.oppIndex = payload.idx; net.oppScore = payload.score; net.oppDone = !!payload.done;
    net.oppLastSeen = Date.now();
    if(net.myDone && net.oppDone && state.screen!=="online-end"){ state.screen="online-end"; playWin(); }
    reRenderIfOnline();
  });
  ch.on("broadcast", { event:"rematch" }, ()=>{
    if(state.screen==="online-end"){ net.status="Ton adversaire veut rejouer…"; reRenderIfOnline(); }
  });
}
function createRoom(code, host){
  const supa = initSupa(); if(!supa) return;
  net.code = code; net.isHost = host; net.opp=null; net.oppPresent=false; net.oppGone=false;
  const ch = supa.channel("bt-room-"+code, { config:{ presence:{ key: myId } } });
  net.room = ch;
  bindRoom(ch);
  ch.subscribe(async (status)=>{
    if(status==="SUBSCRIBED"){
      await ch.track(meMeta());
      state.screen="online-room"; render();
      if(!host){
        net.joinTimer = setTimeout(()=>{
          net.joinTimer = null;
          if(!net.oppPresent && state.screen==="online-room"){
            cleanupRoom();
            net.error = "Aucune partie trouvée pour ce code.";
            state.screen = "online-join"; render();
          }
        }, 5000);
      }
    }
  });
}
function joinRoom(code, host){
  code = (code||"").toUpperCase().trim();
  if(code.length<4){ net.error="Code invalide."; render(); return; }
  createRoom(code, !!host);
}

/* ===================== SOUND — cloches douces, chaudes et très légères ===================== */
let actx = null;
let masterGain = null, masterFilter = null;
function getCtx(){
  if(!actx){
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterFilter = actx.createBiquadFilter();
    masterFilter.type = "lowpass";
    masterFilter.frequency.value = 2400;   // arrondit les aigus -> chaud et doux
    masterFilter.Q.value = 0.4;
    masterGain = actx.createGain();
    masterGain.gain.value = 0.92; // niveau général fixe (les effets ne bougent pas)
    masterFilter.connect(masterGain);
    masterGain.connect(actx.destination);
  }
  return actx;
}
const SFX_GAIN = 1.7; // les effets passent au-dessus de la musique
// une voix "cloche" : montée sans clic, extinction douce
function blip(freq, start, dur, vol, type){
  const ctx = getCtx();
  if(ctx.state==="suspended"){ ctx.resume(); }
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  osc.connect(gain); gain.connect(masterFilter);
  const t0 = ctx.currentTime + start;
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);   // 12ms, aucun clic
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);  // queue douce
  osc.start(t0); osc.stop(t0 + dur + 0.03);
}
/* Carillon : exactement la même voix que les cloches de la musique de fond
   (sinus + halo d'octave, filtré chaud) et la même tonalité (do majeur).
   Chaque effet est donc une petite phrase musicale cohérente avec la nappe. */
/* Carillon organique : deux voix légèrement désaccordées (chaleur de chœur),
   attaque arrondie, halo d'octave discret, et une pointe d'aléatoire pour que
   deux sons identiques ne soient jamais exactement les mêmes. */
function chime(freq, start, dur, vol){
  const ctx = getCtx();
  if(ctx.state==="suspended"){ ctx.resume(); }
  const t0 = ctx.currentTime + start + Math.random()*0.012;
  const v = vol * SFX_GAIN * (0.9 + Math.random()*0.2);
  const jit = 1 + (Math.random()-0.5)*0.004;
  [-2.8, 2.8].forEach((det)=>{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = freq * jit; o.detune.value = det;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(v * 0.42, t0 + 0.022);
    g.gain.exponentialRampToValueAtTime(v * 0.62, t0 + 0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(masterFilter);
    o.start(t0); o.stop(t0 + dur + 0.05);
  });
  const h = ctx.createOscillator(), hg = ctx.createGain();
  h.type = "sine"; h.frequency.value = freq * 2 * jit;
  hg.gain.setValueAtTime(0.0001, t0);
  hg.gain.linearRampToValueAtTime(v * 0.09, t0 + 0.03);
  hg.gain.exponentialRampToValueAtTime(0.0001, t0 + Math.max(dur * 0.55, 0.12));
  h.connect(hg); hg.connect(masterFilter);
  h.start(t0); h.stop(t0 + dur);
}
/* Toc feutré et boisé : un corps grave très bref + un souffle d'air discret,
   comme une touche qui se pose — plus rien d'électronique. */
function tock(freq, start, vol){
  const ctx = getCtx();
  if(ctx.state==="suspended"){ ctx.resume(); }
  const t0 = ctx.currentTime + start;
  const v = vol * SFX_GAIN * (0.85 + Math.random()*0.3);
  const b = ctx.createOscillator(), bg = ctx.createGain();
  b.type = "sine";
  b.frequency.setValueAtTime(freq * 0.34 * (1 + (Math.random()-0.5)*0.06), t0);
  b.frequency.exponentialRampToValueAtTime(freq * 0.22, t0 + 0.06);
  bg.gain.setValueAtTime(0.0001, t0);
  bg.gain.linearRampToValueAtTime(v * 1.6, t0 + 0.006);
  bg.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.075);
  b.connect(bg); bg.connect(masterFilter);
  b.start(t0); b.stop(t0 + 0.1);
  const a = ctx.createOscillator(), ag = ctx.createGain();
  a.type = "sine"; a.frequency.value = freq * 1.7;
  ag.gain.setValueAtTime(0.0001, t0);
  ag.gain.linearRampToValueAtTime(v * 0.18, t0 + 0.005);
  ag.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.03);
  a.connect(ag); ag.connect(masterFilter);
  a.start(t0); a.stop(t0 + 0.05);
}

/* ===================== MUSIQUE DE FOND — nappe générative apaisante =====================
   Aucun fichier audio : une progression I–vi–IV–V en sinus purs (zéro bruit mécanique),
   nappes à attaque très lente + rares cloches cristallines, le tout adouci au filtre. */
let musicBusNode = null, musicTimer = null, musicStep = 0, musicNextBar = 0, musicPlaying = false;
const MUSIC_BAR = 7.2;
const MUSIC_CHORDS = [
  [130.81, 196.00, 261.63, 329.63, 493.88],
  [110.00, 164.81, 220.00, 329.63, 440.00],
  [ 87.31, 174.61, 261.63, 349.23, 440.00],
  [ 98.00, 196.00, 246.94, 293.66, 392.00]
];
const MUSIC_BELLS = [
  [523.25, 659.25, 783.99, 987.77],
  [440.00, 523.25, 659.25, 880.00],
  [523.25, 698.46, 880.00, 1046.50],
  [493.88, 587.33, 783.99, 987.77]
];
function musicBus(){
  const ctx = getCtx();
  if(!musicBusNode){
    musicBusNode = ctx.createGain();
    musicBusNode.gain.value = 0.0001;
    musicBusNode.connect(masterFilter);
  }
  return musicBusNode;
}
function padVoice(freq, t0, dur, vol){
  const ctx = getCtx();
  [-2.2, 2.2].forEach((det)=>{
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = freq; o.detune.value = det;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + dur*0.42);
    g.gain.setValueAtTime(vol, t0 + dur*0.66);
    g.gain.linearRampToValueAtTime(0.0001, t0 + dur + 1.2);
    o.connect(g); g.connect(musicBus());
    o.start(t0); o.stop(t0 + dur + 1.3);
  });
}
function bellVoice(freq, t0){
  const ctx = getCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = "sine"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.02, t0 + 0.06);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.6);
  o.connect(g); g.connect(musicBus());
  o.start(t0); o.stop(t0 + 2.7);
  const h = ctx.createOscillator(), hg = ctx.createGain();
  h.type = "sine"; h.frequency.value = freq*2;
  hg.gain.setValueAtTime(0.0001, t0);
  hg.gain.exponentialRampToValueAtTime(0.0045, t0 + 0.05);
  hg.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.6);
  h.connect(hg); hg.connect(musicBus());
  h.start(t0); h.stop(t0 + 1.7);
}
function scheduleMusicBar(){
  const i = musicStep % MUSIC_CHORDS.length;
  MUSIC_CHORDS[i].forEach((f, k)=>{ padVoice(f, musicNextBar, MUSIC_BAR, k===0 ? 0.022 : 0.014); });
  const bells = MUSIC_BELLS[i];
  const nb = 2 + (musicStep % 2);
  for(let k=0; k<nb; k++){
    const f = bells[(musicStep*2 + k*3 + ((Math.random()*2)|0)) % bells.length];
    bellVoice(f, musicNextBar + 1 + k*(MUSIC_BAR-2)/nb + Math.random()*0.5);
  }
  musicStep += 1; musicNextBar += MUSIC_BAR;
}
function musicTick(){
  if(!musicPlaying) return;
  const ctx = getCtx();
  if(ctx.state === "suspended") return;
  if(musicNextBar < ctx.currentTime - 1){ musicNextBar = ctx.currentTime + 0.1; }
  while(musicNextBar < ctx.currentTime + 1.6){ scheduleMusicBar(); }
}
function startMusic(){
  if(musicPlaying) return;
  const ctx = getCtx();
  ensureAudioAwake();
  musicPlaying = true;
  musicNextBar = ctx.currentTime + 0.12;
  const g = musicBus().gain;
  g.cancelScheduledValues(ctx.currentTime);
  g.setValueAtTime(Math.max(g.value, 0.0001), ctx.currentTime);
  g.linearRampToValueAtTime(settings.volume, ctx.currentTime + 2.4);
  musicTick();
  musicTimer = setInterval(musicTick, 500);
}
function stopMusic(){
  if(!musicPlaying) return;
  musicPlaying = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  if(musicBusNode && actx){
    const g = musicBusNode.gain;
    g.cancelScheduledValues(actx.currentTime);
    g.setValueAtTime(g.value, actx.currentTime);
    g.linearRampToValueAtTime(0.0001, actx.currentTime + 0.7);
  }
}
function maybeStartMusic(){ if(settings.music && !musicPlaying && document.visibilityState==="visible"){ startMusic(); } }

}
function shareScore(kind){
  let text = "";
  if(kind === "group"){
    const withRanks = computeRanks();
    const winners = withRanks.filter(r=>r.rank===1).map(r=>state.teams[r.teamIdx].name);
    text = `BibleTrivia — ${winners.join(" & ")} remporte la partie avec ${state.scores[withRanks[0].teamIdx]} points !`;
  } else if(kind === "duel"){
    const win = net.score>net.oppScore, tie = net.score===net.oppScore;
    const opp = net.opp ? net.opp.name : "mon adversaire";
    text = `BibleTrivia — ${tie?"Égalité":(win?"Victoire":"Beau duel")} contre ${opp} : ${net.score} à ${net.oppScore} !`;
  } else {
    const max = maxPossibleScore();
    const pct = max>0 ? Math.round((state.soloScore/max)*100) : 0;
    text = `BibleTrivia — ${state.soloScore} points en solo (${pct}% du maximum, ${state.soloCorrect}/${state.questions.length} bonnes réponses) !`;
  }
  try { navigator.share({ text }).catch(()=>{}); } catch(e){}
}
