  button, input{ font-family:'Inter',sans-serif; }
  button{ cursor:pointer; }
  button:focus-visible, input:focus-visible{ outline:2px solid var(--primary); outline-offset:2px; }

  #app{ position:relative; z-index:1; width:100%; max-width:640px; margin:0 auto; height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; display:flex; flex-direction:column; padding:calc(env(safe-area-inset-top) + 0.35rem) calc(env(safe-area-inset-right) + 0.7rem) calc(env(safe-area-inset-bottom) + 0.35rem) calc(env(safe-area-inset-left) + 0.7rem); }
  .screen{ display:flex; flex-direction:column; flex:1; }
  .screen-enter{ animation:screenIn 0.42s cubic-bezier(0.16,1,0.3,1); }

  svg{ width:100%; height:100%; display:block; }

  /* ---------- Header ---------- */
  .app-header{ display:flex; align-items:center; justify-content:space-between; gap:0.75rem; margin-bottom:1.3rem; border-radius:18px; padding:0.55rem 0.6rem; }
  .header-title{ font-family:'Poppins',sans-serif; font-weight:600; font-size:1.05rem; }
  .icon-btn{
    width:2.25rem; height:2.25rem; border-radius:50%;
    border:1px solid rgba(255,255,255,0.6); background:rgba(255,255,255,0.5);
    backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%); color:var(--ink);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0.5rem;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.7), 0 2px 8px rgba(15,12,10,0.14);
  }
  .icon-btn.spacer{ visibility:hidden; }

  /* ---------- Hero / mode select ---------- */
  .hero{ position:relative; text-align:center; padding:2.25rem 1rem 2rem; }
  .hero-mute{ position:absolute; top:0.15rem; right:0.5rem; background:rgba(255,255,255,0.2); color:#fff; border-color:rgba(255,255,255,0.35); backdrop-filter:blur(10px) saturate(180%); -webkit-backdrop-filter:blur(10px) saturate(180%); }
  .hero-icon{ width:5.5rem; height:5.5rem; margin:0 auto 1.1rem; border-radius:23%; box-shadow:0 12px 28px rgba(10,8,6,0.45); display:block; object-fit:cover; }
  .hero-title{ font-family:'Poppins',sans-serif; font-weight:700; font-size:2rem; margin:0; letter-spacing:-0.01em; color:#fff; text-shadow:0 1px 12px rgba(0,0,0,0.35); }
  .hero-tag{ color:rgba(255,255,255,0.92); font-size:0.92rem; margin-top:0.5rem; line-height:1.5; text-shadow:0 1px 8px rgba(0,0,0,0.3); }

  .mode-card{
    width:100%; display:flex; align-items:center; gap:1rem;
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:1.1rem 1.2rem; margin-bottom:0.9rem; text-align:left;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.7), 0 4px 16px rgba(15,12,10,0.1); transition:transform 0.15s ease;
  }
  .mode-card:active{ transform:scale(0.98); }
  .mode-card .chev{ width:1.1rem; height:1.1rem; color:var(--mist-dim,#c3bcae); flex-shrink:0; margin-left:auto; opacity:0.5; }
  .mode-icon{ width:3.1rem; height:3.1rem; border-radius:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0.72rem; color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 10px rgba(15,12,10,0.18); }
  .mode-icon.group{ background:linear-gradient(150deg, #EE7358, #D6472C); }
  .mode-icon.solo{ background:linear-gradient(150deg, #E8BC5E, #CE8A2A); }
  .mode-text{ display:flex; flex-direction:column; gap:0.2rem; }
  .mode-title{ font-family:'Poppins',sans-serif; font-weight:600; font-size:1.05rem; }
  .mode-desc{ font-size:0.85rem; color:var(--ink-soft); line-height:1.4; }

  /* ---------- Cards / setup ---------- */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:1.3rem 1.2rem; margin-bottom:1.1rem; box-shadow:0 2px 10px var(--shadow); }
  .card h2{ font-family:'Poppins',sans-serif; font-size:1rem; font-weight:600; margin:0 0 0.9rem; }

  .team-row{ display:flex; align-items:center; gap:0.6rem; margin-bottom:0.6rem; }
  .team-dot{ width:0.8rem; height:0.8rem; border-radius:50%; flex-shrink:0; }
  .dot-sm{ display:inline-block; width:0.5rem; height:0.5rem; border-radius:50%; margin-right:0.4rem; vertical-align:middle; flex-shrink:0; }
  .team-row input{ flex:1; background:var(--surface-alt); border:1px solid var(--border); color:var(--ink); padding:0.65rem 0.8rem; border-radius:10px; font-size:0.95rem; }
  .team-remove{ background:none; border:none; color:var(--ink-soft); width:1.8rem; height:1.8rem; padding:0.4rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .team-remove:disabled{ opacity:0.25; }

  .add-team{ width:100%; display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-top:0.4rem; background:transparent; border:1.5px dashed var(--primary); color:var(--primary); border-radius:12px; padding:0.65rem; font-size:0.9rem; font-weight:600; }
  .add-team .ico{ width:1rem; height:1rem; }
  .add-team:disabled{ opacity:0.35; }

  .chip-row{ display:flex; gap:0.5rem; flex-wrap:wrap; }
  .chip{ flex:1; min-width:30%; text-align:center; background:var(--surface-alt); border:1px solid var(--border); color:var(--ink-soft); padding:0.65rem 0.5rem; border-radius:12px; font-size:0.85rem; font-weight:600; }
  .chip.active{ background:var(--primary-soft); border-color:var(--primary); color:var(--primary-dark); }
  .chip .sub{ display:block; font-weight:400; font-size:0.72rem; margin-top:0.15rem; opacity:0.85; }

  .rules{ font-size:0.85rem; color:var(--ink-soft); line-height:1.6; background:rgba(244,239,231,0.78); backdrop-filter:blur(14px) saturate(180%); -webkit-backdrop-filter:blur(14px) saturate(180%); border:1px solid rgba(255,255,255,0.4); border-radius:14px; padding:0.9rem 1rem; margin-bottom:1.1rem; }
  .rules b{ color:var(--ink); }

  .btn-primary{ width:100%; background:var(--primary); color:#fff; border:none; border-radius:15px; padding:1rem; font-size:1rem; font-weight:700; letter-spacing:0.01em; box-shadow:inset 0 1px 0 rgba(255,255,255,0.28), 0 6px 18px rgba(224,87,59,0.32), 0 1px 3px rgba(224,87,59,0.2); }
  .btn-primary:disabled{ opacity:0.4; box-shadow:none; }
  .error-msg{ color:#ff8a76; font-size:0.82rem; text-align:center; margin-top:0.6rem; min-height:1.2em; text-shadow:0 1px 6px rgba(0,0,0,0.35); }

  /* ---------- Play ---------- */
  .play-meta{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:0.5rem 0.75rem; margin-bottom:0.9rem; }
  .tier-chip{ display:inline-flex; align-items:center; gap:0.4rem; font-size:0.82rem; font-weight:600; background:rgba(255,255,255,0.66); backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%); border:1px solid rgba(255,255,255,0.6); padding:0.34rem 0.7rem; border-radius:100px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.75), 0 2px 8px rgba(15,12,10,0.1); }
  .tier-dots{ display:inline-flex; gap:3px; }
  .tdot{ width:6px; height:6px; border-radius:50%; background:rgba(0,0,0,0.14); }
  .tdot.filled{ background:currentColor; box-shadow:0 0 5px currentColor; }
  .tier-facile{ color:var(--green); }
  .tier-moyen{ color:var(--gold); }
  .tier-difficile{ color:var(--plum); }
  .q-counter{ font-size:0.8rem; color:var(--ink); font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:0.01em; background:rgba(255,255,255,0.66); backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%); border:1px solid rgba(255,255,255,0.6); padding:0.34rem 0.7rem; border-radius:100px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.75), 0 2px 8px rgba(15,12,10,0.1); }
  .streak-chip{ display:flex; align-items:center; gap:0.32rem; background:linear-gradient(180deg, rgba(251,241,221,0.9), rgba(246,217,139,0.75)); backdrop-filter:blur(18px) saturate(180%); -webkit-backdrop-filter:blur(18px) saturate(180%); border:1px solid rgba(214,162,60,0.5); color:#8a5e14; padding:0.34rem 0.7rem; border-radius:100px; font-size:0.8rem; font-weight:700; box-shadow:inset 0 1px 0 rgba(255,255,255,0.7), 0 2px 8px rgba(184,140,50,0.18); }
  .streak-chip .ico{ width:0.85rem; height:0.85rem; }

  .progress-track{ position:relative; height:8px; margin-bottom:1.4rem; background:rgba(255,255,255,0.32); backdrop-filter:blur(14px) saturate(180%); -webkit-backdrop-filter:blur(14px) saturate(180%); border-radius:100px; border:1px solid rgba(255,255,255,0.4); box-shadow:inset 0 1px 2px rgba(15,12,10,0.12); overflow:hidden; }
  .progress-fill{ position:absolute; left:0; top:0; bottom:0; border-radius:100px; background:linear-gradient(90deg, #E9694E, #D6A23C); box-shadow:0 0 10px rgba(224,87,59,0.5); transition:width 0.55s cubic-bezier(0.16,1,0.3,1); }
  .progress-fill::after{ content:""; position:absolute; inset:0; border-radius:100px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.45); }

  .question-card{ background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1.6rem 1.4rem; margin-bottom:1.1rem; box-shadow:0 2px 12px var(--shadow); text-align:center; }
  .question-card .qtext{ font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(1.15rem, 4.2vw, 1.5rem); line-height:1.45; }

  .options-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; margin-bottom:1.1rem; }
  @media (max-width:420px){ .options-grid{ grid-template-columns:1fr; } }
  .option-btn{
    display:flex; align-items:center; gap:0.6rem;
    background:var(--surface); border:1px solid var(--border); border-radius:15px;

  /* ---------- End ---------- */
  .end-hero{ text-align:center; padding:0.5rem 0 1.5rem; }

  .end-title{ font-family:'Poppins',sans-serif; font-weight:700; font-size:clamp(1.5rem,6vw,2rem); margin:0.25rem 0 0.3rem; }

  .podium{ display:flex; align-items:flex-end; justify-content:center; gap:0.6rem; margin:0.5rem 0 1.3rem; }
  .podium-col{ flex:1; max-width:33%; display:flex; flex-direction:column; align-items:center; }
  .podium-crown{ width:1.5rem; height:1.5rem; color:var(--gold); margin-bottom:0.3rem; opacity:0; animation:crownPop 0.5s ease 0.3s forwards; }
  .podium-avatar{ width:2.6rem; height:2.6rem; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Poppins',sans-serif; font-weight:700; font-size:1.1rem; border:3px solid rgba(255,255,255,0.7); box-shadow:0 4px 12px rgba(15,12,10,0.2); margin-bottom:0.5rem; }
  .podium-name{ font-weight:600; font-size:0.8rem; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; margin-bottom:0.15rem; }

  .app-header, .card, .mode-card, .question-card, .solo-summary, .solo-score-bar{

    width:6.5rem; height:6.5rem; object-fit:cover; border-radius:26%; display:block;
    box-shadow:0 18px 44px rgba(0,0,0,0.5);

    animation: splashFade 1s ease forwards, doveFloat3D 3.4s ease-in-out 1s infinite;

  .splash-title{ font-family:'Poppins',sans-serif; font-weight:700; font-size:2.5rem; color:#fff; margin:0; letter-spacing:-0.01em; text-shadow:0 2px 18px rgba(0,0,0,0.45); opacity:0; animation: splashRise 0.8s ease 0.5s forwards; }

  .splash-dot:nth-child(3){ animation-delay:0.4s; }

  button, .mode-card{ -webkit-user-select:none; user-select:none; touch-action:manipulation; transition:transform 0.13s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, background 0.22s ease, border-color 0.22s ease, opacity 0.22s ease; }

  .icon-btn:active, .adj-btn:active, .team-remove:active:not(:disabled){ transform:scale(0.9); }

  .option-btn{ transition:background 0.28s ease, border-color 0.28s ease, transform 0.13s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease; }

  .btn-primary, .btn-next, .btn-replay{ background-image:linear-gradient(180deg, #E9694E, #DC5136); }
  .btn-reveal:active{ background:var(--primary-soft); }

  /* progress fill fades in */

  /* per-question staggered entrance (only when the question changes) */
  .question-card.animate{ animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1); }
  .options-grid.animate .option-btn{ opacity:0; animation:optionIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
  .options-grid.animate .option-btn:nth-child(1){ animation-delay:0.05s; }
  .options-grid.animate .option-btn:nth-child(2){ animation-delay:0.11s; }
  .options-grid.animate .option-btn:nth-child(3){ animation-delay:0.17s; }
  .options-grid.animate .option-btn:nth-child(4){ animation-delay:0.23s; }

  /* one-shot feedback on the revealed answer */
  .option-btn.reveal-pop{ animation:revealPop 0.5s cubic-bezier(0.16,1,0.3,1); }
  .option-btn.reveal-shake{ animation:revealShake 0.4s ease; }

  @keyframes cardIn{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes optionIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes revealPop{ 0%{ transform:scale(1); } 45%{ transform:scale(1.035); } 100%{ transform:scale(1); } }
  @keyframes revealShake{ 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-4px); } 50%{ transform:translateX(4px); } 75%{ transform:translateX(-2px); } }

  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; } }
</style>

    { q:"Sur quelle montagne Abraham a-t-il été prêt à offrir son fils Isaac en sacrifice ?", options:["Le mont Sinaï","Le mont Moriya","Le mont Carmel","Le mont Nébo"], correct:"Le mont Moriya", fact:"Dieu a finalement pourvu un bélier pour remplacer Isaac (Genèse 22)." },
    { q:"Combien de fils Jacob (Israël) a-t-il eus au total ?", options:["7","10","12","13"], correct:"12", fact:"Ils donneront leur nom aux douze tribus d'Israël (Genèse 35 et 49)." },
    { q:"Quel est le nom du deuxième livre de la Bible ?", options:["La Genèse","L'Exode","Le Lévitique","Les Nombres"], correct:"L'Exode", fact:"Il raconte la sortie d'Égypte du peuple hébreu sous la conduite de Moïse." },
    { q:"Quel prophète Dieu a-t-il chargé d'épouser une femme infidèle, en signe symbolique pour Israël ?", options:["Amos","Osée","Joël","Michée"], correct:"Osée", fact:"Ce mariage illustrait l'amour fidèle de Dieu malgré l'infidélité de son peuple (Osée 1)." },
    { q:"Quel personnage biblique a vécu le plus longtemps, selon la Genèse, avec 969 ans ?", options:["Noé","Mathusalem","Adam","Hénoc"], correct:"Mathusalem", fact:"Voir Genèse 5:27." },
    { q:"Quel est le livre le plus court de l'Ancien Testament, avec seulement 21 versets ?", options:["Abdias","Aggée","Sophonie","Nahum"], correct:"Abdias", fact:"Ce livre annonce le jugement d'Édom." },
    { q:"Combien de jours a duré le siège de Jéricho avant la chute de ses murailles ?", options:["3 jours","7 jours","12 jours","40 jours"], correct:"7 jours", fact:"Les Israélites ont marché autour de la ville une fois par jour, puis sept fois le septième jour (Josué 6)." },
    { q:"Sur quelle montagne Élie a-t-il entendu Dieu lui parler dans un « murmure doux et léger » ?", options:["Le mont Carmel","Le mont Horeb","Le mont Thabor","Le mont Nébo"], correct:"Le mont Horeb", fact:"Voir 1 Rois 19:11-13." },
    { q:"Quel roi de Babylone a été frappé de folie pendant sept temps, selon le livre de Daniel, avant de retrouver la raison ?", options:["Cyrus","Nebucadnetsar","Darius","Belschatsar"], correct:"Nebucadnetsar", fact:"Il a fini par reconnaître la souveraineté de Dieu (Daniel 4)." },
    { q:"Qui est considéré comme le premier martyr chrétien, lapidé selon le livre des Actes ?", options:["Jacques","Étienne","Barnabas","Timothée"], correct:"Étienne", fact:"Saul, le futur Paul, était présent et approuvait sa mort (Actes 7)." },
    { q:"De combien d'années la vie du roi Ézéchias a-t-elle été prolongée après sa prière lors d'une maladie mortelle ?", options:["5 ans","10 ans","15 ans","20 ans"], correct:"15 ans", fact:"Dieu lui a donné un signe : l'ombre a reculé de dix degrés (2 Rois 20:1-11)." },
    { q:"Quel scribe a aidé à lire et expliquer la Loi au peuple, aux côtés de Néhémie, après l'Exil ?", options:["Esdras","Baruch","Malachie","Zorobabel"], correct:"Esdras", fact:"Voir Néhémie 8." },
    { q:"Quel roi perse a autorisé la reconstruction du Temple de Jérusalem après l'Exil babylonien ?", options:["Darius","Cyrus","Xerxès","Artaxerxès"], correct:"Cyrus", fact:"Voir Esdras 1:1-4." },
    { q:"Quels sont les noms des trois compagnons de Daniel jetés dans la fournaise ardente ?", options:["Shadrak, Méshak et Abed-Nego","Anne, Caïphe et Pilate","Gad, Nathan et Aser","Éliab, Abinadab et Schamma"], correct:"Shadrak, Méshak et Abed-Nego", fact:"Ils en sont ressortis indemnes, sans même une odeur de brûlé (Daniel 3)." },
    { q:"Quelle est la seule femme juge d'Israël mentionnée dans le livre des Juges ?", options:["Ruth","Débora","Esther","Miriam"], correct:"Débora", fact:"Elle a aussi été prophétesse et a conduit Israël à la victoire (Juges 4-5)." },
    { q:"Quel nombre symbolique est associé à « la bête » dans le livre de l'Apocalypse ?", options:["7","12","40","666"], correct:"666", fact:"Voir Apocalypse 13:18." },
    { q:"Quelle était la première épouse de Jacob, donnée à la place de Rachel le soir de ses noces ?", options:["Léa","Bilha","Zilpa","Tamar"], correct:"Léa", fact:"Laban justifiera cette tromperie par la coutume de marier l'aînée en premier (Genèse 29:16-26)." },
    { q:"Combien de temps l'arche de l'alliance est-elle restée capturée chez les Philistins avant d'être renvoyée ?", options:["7 jours","7 semaines","7 mois","7 ans"], correct:"7 mois", fact:"Sa présence provoquait des fléaux chez les Philistins, qui ont fini par la renvoyer (1 Samuel 5-6)." },
    { q:"Quel roi de Juda a régné le plus longtemps, avec 55 ans de règne ?", options:["David","Salomon","Manassé","Ézéchias"], correct:"Manassé", fact:"Son règne fut pourtant marqué par une grande idolâtrie (2 Rois 21:1)." },
    { q:"Quel est le nom du dernier roi de Juda avant la destruction de Jérusalem par les Babyloniens ?", options:["Josias","Sédécias","Jojakim","Achaz"], correct:"Sédécias", fact:"Nebucadnetsar l'a fait capturer après avoir vu ses fils exécutés sous ses yeux (2 Rois 25)." },
    { q:"Sur quel mont Moïse est-il mort, sans avoir pu entrer en Terre promise ?", options:["Le mont Sinaï","Le mont Nébo","Le mont Horeb","Le mont Thabor"], correct:"Le mont Nébo", fact:"Dieu lui a montré tout le pays promis avant sa mort (Deutéronome 34)." },
    { q:"Quel prophète a été jeté dans une citerne boueuse pour avoir annoncé un message jugé décourageant ?", options:["Ésaïe","Jérémie","Ézéchiel","Amos"], correct:"Jérémie", fact:"Un serviteur du roi l'en a fait remonter à l'aide de cordes (Jérémie 38)." },
    { q:"Dans quelle ville Jésus a-t-il ressuscité Lazare, quatre jours après sa mort ?", options:["Béthanie","Capernaüm","Jéricho","Cana"], correct:"Béthanie", fact:"Cette ville était proche de Jérusalem, sur le mont des Oliviers (Jean 11)." },
    { q:"Quel roi de Juda a découpé et brûlé le rouleau contenant les prophéties de Jérémie ?", options:["Josias","Jojakim","Sédécias","Manassé"], correct:"Jojakim", fact:"Jérémie a dû dicter une seconde fois ses prophéties à son secrétaire Baruc (Jérémie 36)." },
    { q:"Quel roi d'Israël a consulté une nécromancienne, la « sorcière d'En-Dor », avant sa dernière bataille ?", options:["Saül","David","Achab","Jéroboam"], correct:"Saül", fact:"Il cherchait désespérément à faire évoquer l'esprit du prophète Samuel, déjà mort (1 Samuel 28)." },
    { q:"Quel livre du Nouveau Testament, adressé à des chrétiens d'origine juive, traite longuement du sacerdoce de Jésus ?", options:["L'épître aux Romains","L'épître aux Hébreux","L'épître aux Galates","L'épître de Jacques"], correct:"L'épître aux Hébreux", fact:"Son auteur exact reste débattu depuis les premiers siècles de l'Église." }
  ]

/* ===================== STATE ===================== */
let state = {
  screen:"splash",
  mode:null,
  teams:[ {name:"Équipe 1"}, {name:"Équipe 2"} ],
  lengthKey:"normale",
  scores:[],
  soloScore:0,
  soloStreak:0,
  soloBestStreak:0,
  soloCorrect:0,
  soloSelected:null,
  questions:[],
  currentIndex:0,
  revealed:false,
  awarded:[],
  muted:false
};

/* ===================== UTILS ===================== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function muteLabel(){ return state.muted ? "Activer le son" : "Couper le son"; }

/* ===================== SOUND (doux, ondes sinusoïdales) ===================== */
let actx = null;
function getCtx(){ if(!actx){ actx = new (window.AudioContext||window.webkitAudioContext)(); } return actx; }
function tone(freq, start, dur, vol){
  const ctx = getCtx();
  if(ctx.state==="suspended"){ ctx.resume(); }
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = freq;
  gain.gain.value = 0;
  osc.connect(gain); gain.connect(ctx.destination);
  const t0 = ctx.currentTime + start;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0+0.07);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.start(t0); osc.stop(t0+dur+0.05);
}
function playCorrect(){ if(state.muted) return; tone(523,0,0.5,0.065); tone(659,0.13,0.65,0.055); }
function playIncorrect(){ if(state.muted) return; tone(349,0,0.5,0.045); }
function playTap(){ if(state.muted) return; tone(494,0,0.16,0.032); }
function playWin(){ if(state.muted) return; [523,659,784,1047].forEach((f,i)=>tone(f,i*0.22,0.75,0.05)); }
function playStreak(){ if(state.muted) return; tone(659,0,0.3,0.045); tone(880,0.12,0.42,0.04); }
function toggleMute(){ state.muted = !state.muted; render(); }
function ensureAudioAwake(){ if(actx && actx.state==="suspended"){ actx.resume().catch(()=>{}); } }
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible"){ ensureAudioAwake(); } });
window.addEventListener("pageshow", ensureAudioAwake);
window.addEventListener("focus", ensureAudioAwake);

/* ===================== NAVIGATION ===================== */
function selectMode(m){ state.mode = m; state.screen = "setup"; render(); }
function goToModeSelect(){ state.screen = "mode"; render(); }

/* ===================== SETUP (group) ===================== */
function addTeam(){ if(state.teams.length>=6) return; state.teams.push({name:"Équipe "+(state.teams.length+1)}); render(); }
function removeTeam(i){ if(state.teams.length<=2) return; state.teams.splice(i,1); render(); }
function renameTeam(i, val){ state.teams[i].name = val; }
function setLength(key){ state.lengthKey = key; render(); }
function validTeams(){ return state.teams.filter(t=>t.name.trim().length>0).map(t=>({name:t.name.trim()})); }

/* ===================== GAME LIFECYCLE ===================== */
function buildQuestions(){
  const n = LENGTHS[state.lengthKey];
  let list = [];
  ["facile","moyen","difficile"].forEach(tier=>{
    const pool = shuffle(BANK[tier]);
    pool.slice(0,n).forEach(q=>{ list.push({ ...q, tier, shuffledOptions: shuffle(q.options) }); });
  });
  state.questions = shuffle(list);
}
function startGame(){
  if(state.mode==="group"){
    const valid = validTeams();
    if(valid.length<2){
      document.getElementById("setupError").textContent = "Ajoutez au moins deux équipes avec un nom pour commencer.";
      return;
    }
    state.teams = valid;
    state.scores = valid.map(()=>0);
  } else {
    state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; state.soloCorrect = 0;
  }
  buildQuestions();
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function replayGame(){
  buildQuestions();
  if(state.mode==="group"){ state.scores = state.teams.map(()=>0); }
  else { state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; state.soloCorrect = 0; }
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function newGame(){
  state = { screen:"mode", mode:null, teams:[{name:"Équipe 1"},{name:"Équipe 2"}], lengthKey: state.lengthKey, scores:[], soloScore:0, soloStreak:0, soloBestStreak:0, soloCorrect:0, soloSelected:null, questions:[], currentIndex:0, revealed:false, awarded:[], muted: state.muted };
  render();
}

/* ===================== PLAY ===================== */
function currentQ(){ return state.questions[state.currentIndex]; }

function revealAnswer(){ state.revealed = true; justRevealed = true; playCorrect(); render(); }

function soloAnswer(idx){
  if(state.revealed) return;
  const q = currentQ();
  const opt = q.shuffledOptions[idx];
  state.soloSelected = opt;
  state.revealed = true;
  justRevealed = true;
  if(opt===q.correct){
    state.soloScore += TIER_INFO[q.tier].pts;
    state.soloCorrect += 1;
    state.soloStreak += 1;
    if(state.soloStreak > state.soloBestStreak) state.soloBestStreak = state.soloStreak;
    if(state.soloStreak>=3 && state.soloStreak%3===0){ playStreak(); } else { playCorrect(); }
  } else {
    state.soloStreak = 0;
    playIncorrect();
  }
  render();
}

function toggleAward(teamIdx){
  const q = currentQ();
  const pos = state.awarded.indexOf(teamIdx);
  if(pos>=0){ state.awarded.splice(pos,1); state.scores[teamIdx] -= TIER_INFO[q.tier].pts; }
  else { state.awarded.push(teamIdx); state.scores[teamIdx] += TIER_INFO[q.tier].pts; playTap(); }
  render();
}
function adjustScore(teamIdx, delta){ state.scores[teamIdx] = Math.max(0, state.scores[teamIdx]+delta); render(); }

function nextQuestion(){
  if(!state.revealed) return;
  if(state.currentIndex >= state.questions.length-1){
    state.screen = "end";
    render();
    launchConfetti();
    playWin();
    return;
  }
  state.currentIndex++;
  state.revealed = false; state.awarded = []; state.soloSelected = null;
  render();
}

function rankedTeamIndices(){ return state.teams.map((t,i)=>i).sort((a,b)=>state.scores[b]-state.scores[a]); }
function computeRanks(){
  const ranked = rankedTeamIndices();
  const ranks = []; let prevScore=null, prevRank=0;
  ranked.forEach((teamIdx,pos)=>{
    const sc = state.scores[teamIdx];
    if(sc===prevScore){ ranks.push(prevRank); } else { ranks.push(pos+1); prevRank=pos+1; prevScore=sc; }
  });
  return ranked.map((teamIdx,pos)=>({teamIdx, rank:ranks[pos]}));
}
function maxPossibleScore(){ return state.questions.reduce((sum,q)=>sum+TIER_INFO[q.tier].pts,0); }
function soloPerformanceMessage(pct){
  if(pct>=85) return "Excellent ! Tu connais vraiment bien ta Bible.";
  if(pct>=65) return "Très bien ! Continue comme ça.";
  if(pct>=40) return "Bien joué, il y a de bonnes bases.";
  return "Beau début ! Chaque partie t'apprend un peu plus.";
}

function launchConfetti(){
  const layer = document.createElement("div");
  layer.className = "confetti-layer";
  document.body.appendChild(layer);
  const colors = TEAM_COLORS.concat(["#E0573B","#D6A23C"]);
  for(let i=0;i<70;i++){
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random()*100+"vw";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2.2+Math.random()*1.6)+"s";
    p.style.animationDelay = (Math.random()*0.6)+"s";
    p.style.borderRadius = Math.random()>0.5 ? "50%" : "2px";
    layer.appendChild(p);
  }
  setTimeout(()=>layer.remove(), 4200);
}

/* ===================== RENDER HELPERS ===================== */
function renderHeader(title, showBack){
  return `
    <div class="app-header">
      ${showBack ? `<button class="icon-btn" onclick="goToModeSelect()" aria-label="Retour"><span class="ico" style="width:1.1rem;height:1.1rem;">${ICONS.chevronLeft}</span></button>` : `<span class="icon-btn spacer"></span>`}
      <span class="header-title">${escapeHtml(title)}</span>
      <button class="icon-btn" onclick="toggleMute()" aria-label="${muteLabel()}"><span class="ico" style="width:1.15rem;height:1.15rem;">${state.muted?ICONS.speakerOff:ICONS.speakerOn}</span></button>
    </div>
  `;
}
function renderLengthCard(){
  return `
    <div class="card">
      <h2>Durée de la partie</h2>
      <div class="chip-row">
        ${Object.keys(LENGTHS).map(k=>`
          <button class="chip ${state.lengthKey===k?'active':''}" onclick="setLength('${k}')">
            ${LENGTH_LABELS[k]}
            <span class="sub">${LENGTHS[k]*3} questions</span>
          </button>
        `).join("")}
      </div>
    </div>
  `;
}
function tierDotsHtml(level){
  return `<span class="tier-dots">${[1,2,3].map(n=>`<span class="tdot ${n<=level?'filled':''}"></span>`).join("")}</span>`;
}

/* ===================== RENDER: MODE SELECT ===================== */
function renderModeSelect(){
  const el = document.createElement("div");
  el.className = "screen";
  el.innerHTML = `
    <div class="hero">
      <button class="icon-btn hero-mute" onclick="toggleMute()" aria-label="${muteLabel()}"><span class="ico" style="width:1.15rem;height:1.15rem;">${state.muted?ICONS.speakerOff:ICONS.speakerOn}</span></button>
      <img class="hero-icon" src="${DOVE_ICON}" alt="BibleTrivia">
      <h1 class="hero-title">BibleTrivia</h1>
      <p class="hero-tag">Découvre ou redécouvre les Écritures, une question à la fois</p>
    </div>
    <button class="mode-card" onclick="selectMode('group')">
      <span class="mode-icon group">${ICONS.users}</span>
      <span class="mode-text">
        <span class="mode-title">Mode Groupe</span>
        <span class="mode-desc">Église, jeunesse, en équipes face à face</span>
      </span>
      <span class="chev">${ICONS.chevronRight}</span>
    </button>
    <button class="mode-card" onclick="selectMode('solo')">
      <span class="mode-icon solo">${ICONS.user}</span>
      <span class="mode-text">
        <span class="mode-title">Mode Solo</span>
        <span class="mode-desc">Teste tes connaissances à ton rythme</span>
      </span>
      <span class="chev">${ICONS.chevronRight}</span>
    </button>
    <footer class="hint">120 questions · difficulté mélangée</footer>
  `;
  return el;
}

/* ===================== RENDER: SETUP ===================== */
function renderSetup(){
  const el = document.createElement("div");
  el.className = "screen";
  if(state.mode==="group"){
    el.innerHTML = `
      ${renderHeader("Mode Groupe", true)}
      <div class="card">
        <h2>Équipes</h2>
        ${state.teams.map((t,i)=>`
          <div class="team-row">
            <span class="team-dot" style="background:${TEAM_COLORS[i%6]}"></span>
            <input type="text" value="${escapeHtml(t.name)}" maxlength="20" oninput="renameTeam(${i}, this.value)" placeholder="Nom de l'équipe">
            <button class="team-remove" onclick="removeTeam(${i})" ${state.teams.length<=2?"disabled":""} aria-label="Retirer cette équipe"><span class="ico" style="width:0.9rem;height:0.9rem;">${ICONS.close}</span></button>
          </div>
        `).join("")}
        <button class="add-team" onclick="addTeam()" ${state.teams.length>=6?"disabled":""}><span class="ico">${ICONS.plusCircle}</span>Ajouter une équipe</button>
      </div>
      ${renderLengthCard()}
      <div class="rules"><b>Déroulé :</b> lisez la question à voix haute → révélez la réponse → attribuez les points à la bonne équipe. Une erreur ? Les boutons −/+ sur chaque score corrigent à tout moment.</div>
      <button class="btn-primary" onclick="startGame()">Commencer la partie</button>
      <div class="error-msg" id="setupError"></div>
      <footer class="hint">120 questions au total · un tirage différent à chaque partie</footer>
    `;
  } else {
    el.innerHTML = `
      ${renderHeader("Mode Solo", true)}
      ${renderLengthCard()}
      <div class="rules"><b>Déroulé :</b> réponds aux questions à ton rythme, tous niveaux mélangés. Enchaîne les bonnes réponses pour faire grimper ta série.</div>
      <button class="btn-primary" onclick="startGame()">Commencer</button>
      <footer class="hint">120 questions au total · un tirage différent à chaque partie</footer>
    `;
  }
  return el;
}

/* ===================== RENDER: PLAY ===================== */
let lastPlayedQ = -1;
let justRevealed = false;
function renderPlay(){
  const el = document.createElement("div");
  el.className = "screen";
  const q = currentQ();
  const info = TIER_INFO[q.tier];
  const total = state.questions.length;

  const fresh = (state.currentIndex !== lastPlayedQ);
  lastPlayedQ = state.currentIndex;
  const pop = justRevealed;
  justRevealed = false;

  const optionsHtml = q.shuffledOptions.map((opt,idx)=>{
    const letter = ["A","B","C","D"][idx];
    let cls = "option-btn";
    let trailingIcon = "";
    if(state.revealed){
      if(opt===q.correct){ cls+=" correct" + (pop?" reveal-pop":""); trailingIcon = `<span class="opt-icon">${ICONS.checkCircle}</span>`; }
      else if(state.mode==="solo" && opt===state.soloSelected){ cls+=" incorrect" + (pop?" reveal-shake":""); trailingIcon = `<span class="opt-icon">${ICONS.xCircle}</span>`; }
      else { cls+=" dim"; }
    }
    const interactive = state.mode==="solo" && !state.revealed;
    if(interactive){
      return `<button class="${cls}" onclick="soloAnswer(${idx})"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span></button>`;
    }
    return `<div class="${cls}"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span>${trailingIcon}</div>`;
  }).join("");

  let bottomHtml;
  if(state.mode==="group"){
    const ranked = rankedTeamIndices();
    bottomHtml = `
      ${state.revealed ? `<div class="fact-card"><span class="ficon">${ICONS.book}</span><span class="ftext">${escapeHtml(q.fact)}</span></div>` : `<button class="btn-reveal" onclick="revealAnswer()">Révéler la réponse</button>`}
      ${state.revealed ? `
        <div class="award-label">Qui a trouvé la bonne réponse ?</div>
        <div class="award-grid">
          ${state.teams.map((t,i)=>`
            <button class="award-btn ${state.awarded.includes(i)?'awarded':''}" onclick="toggleAward(${i})">
              <span style="display:flex;align-items:center;gap:0.5rem;overflow:hidden;">
                <span class="dot" style="background:${TEAM_COLORS[i%6]}"></span>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(t.name)}</span>
              </span>
              <span class="pts">+${info.pts}</span>
            </button>
          `).join("")}
        </div>
      ` : ""}
      <button class="btn-next" onclick="nextQuestion()" ${!state.revealed?"disabled":""}>${state.currentIndex>=total-1 ? "Voir les résultats" : "Question suivante"}</button>
      <div class="score-strip">
        ${ranked.map(i=>`
          <div class="score-pane">
            <span class="nm"><span class="dot-sm" style="background:${TEAM_COLORS[i%6]}"></span>${escapeHtml(state.teams[i].name)}</span>
            <span class="score-row">
              <button class="adj-btn" onclick="adjustScore(${i},-10)" aria-label="Retirer 10 points">−</button>
              <span class="sc">${state.scores[i]}</span>
              <button class="adj-btn" onclick="adjustScore(${i},10)" aria-label="Ajouter 10 points">+</button>
            </span>
          </div>
        `).join("")}
      </div>
    `;
  } else {
    bottomHtml = `
      ${state.revealed ? `<div class="fact-card"><span class="ficon">${ICONS.book}</span><span class="ftext">${escapeHtml(q.fact)}</span></div>` : ""}
      <button class="btn-next" onclick="nextQuestion()" ${!state.revealed?"disabled":""}>${state.currentIndex>=total-1 ? "Voir les résultats" : "Continuer"}</button>
      <div class="solo-score-bar"><span class="label">Score</span><span class="value">${state.soloScore} pts</span></div>
    `;
  }

  el.innerHTML = `
    ${renderHeader("BibleTrivia", true)}
    <div class="play-meta">
      <span class="tier-chip ${info.cls}">${tierDotsHtml(info.level)}${info.label} · ${info.pts} pts</span>
      <span class="q-counter">${state.currentIndex+1}/${total}</span>
      ${state.mode==="solo" ? `<span class="streak-chip"><span class="ico">${ICONS.bolt}</span>${state.soloStreak}</span>` : ""}
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${Math.round(((state.currentIndex + (state.revealed?1:0)) / total) * 100)}%"></div>
    </div>
    <div class="question-card${fresh?' animate':''}"><div class="qtext">${escapeHtml(q.q)}</div></div>
    <div class="options-grid${fresh?' animate':''}">${optionsHtml}</div>
    ${bottomHtml}
  `;
  return el;
}

/* ===================== RENDER: END ===================== */
function renderEndGroup(){
  const withRanks = computeRanks();
  const winners = withRanks.filter(r=>r.rank===1).map(r=>state.teams[r.teamIdx].name);
  const podiumOrder = [1,0,2]; // visual: 2nd, 1st, 3rd
  const barClass = {0:"p1",1:"p2",2:"p3"};
  const podiumTeams = withRanks.slice(0,3);

  const podiumHtml = podiumTeams.length>=2 ? `
    <div class="podium">
      ${podiumOrder.filter(i=>i<podiumTeams.length).map(i=>{
        const r = podiumTeams[i];
        const initial = escapeHtml(state.teams[r.teamIdx].name.charAt(0).toUpperCase());
        return `
        <div class="podium-col">
          ${i===0 ? `<span class="podium-crown">${ICONS.crown}</span>` : `<span class="podium-crown" style="visibility:hidden"></span>`}
          <span class="podium-avatar" style="background:${TEAM_COLORS[r.teamIdx%6]}">${initial}</span>
          <span class="podium-name">${escapeHtml(state.teams[r.teamIdx].name)}</span>
          <span class="podium-score">${state.scores[r.teamIdx]}</span>
          <div class="podium-bar ${barClass[i]}">${r.rank}</div>
        </div>`;
      }).join("")}
    </div>` : "";

  return `
    <div class="end-hero">
      <div class="end-icon">${ICONS.trophy}</div>
      <div class="end-eyebrow">${winners.length>1 ? "Égalité" : "Vainqueur"}</div>
      <h1 class="end-title">${winners.length>1 ? "Ex æquo en tête !" : escapeHtml(winners[0])}</h1>
      <p class="end-sub">Bravo à toutes les équipes — continuez à explorer la Parole.</p>
    </div>
    ${podiumHtml}
    <div class="rank-list">
      ${withRanks.map(r=>{
        const g = r.rank<=3 ? `g${r.rank}` : "";
        return `
        <div class="rank-row">
          <span class="rank-badge ${g}">${r.rank}</span>
          <span class="rank-dot" style="background:${TEAM_COLORS[r.teamIdx%6]}"></span>
          <span class="rank-name">${escapeHtml(state.teams[r.teamIdx].name)}</span>
          <span class="rank-score-wrap">
            <button class="adj-btn" onclick="adjustScore(${r.teamIdx},-10)" aria-label="Retirer 10 points">−</button>
            <span class="rank-score">${state.scores[r.teamIdx]} pts</span>
            <button class="adj-btn" onclick="adjustScore(${r.teamIdx},10)" aria-label="Ajouter 10 points">+</button>
          </span>
        </div>`;
      }).join("")}
    </div>
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Nouvelle partie</button>
    </div>
  `;
}
function renderEndSolo(){
  const max = maxPossibleScore();
  const pct = max>0 ? Math.round((state.soloScore/max)*100) : 0;
  const totalQ = state.questions.length;
  const R = 52, C = 2*Math.PI*R;
  const offset = C * (1 - pct/100);
  return `
    <div class="end-hero">
      <div class="end-icon">${ICONS.trophy}</div>
      <div class="end-eyebrow">Partie terminée</div>
      <h1 class="end-title">${state.soloScore} points</h1>
      <p class="end-sub">${soloPerformanceMessage(pct)}</p>
    </div>
    <div class="solo-summary">
      <div class="ring-wrap">
        <svg viewBox="0 0 120 120">
          <defs><linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E0573B"/><stop offset="100%" stop-color="#D6A23C"/>
          </linearGradient></defs>
          <circle class="ring-bg" cx="60" cy="60" r="${R}"></circle>
          <circle class="ring-fg" cx="60" cy="60" r="${R}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}" data-target="${offset.toFixed(1)}"></circle>
        </svg>
        <div class="ring-center">
          <span class="ring-score">${pct}%</span>
          <span class="ring-label">du maximum</span>
        </div>
      </div>
      <div class="solo-stats">
        <div class="solo-stat"><div class="val"><span class="ico">${ICONS.target}</span>${state.soloCorrect}/${totalQ}</div><div class="lbl">Bonnes réponses</div></div>
        <div class="solo-stat"><div class="val"><span class="ico">${ICONS.bolt}</span>${state.soloBestStreak}</div><div class="lbl">Meilleure série</div></div>
      </div>
    </div>
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Nouvelle partie</button>
    </div>
  `;
}
function renderEnd(){
  const el = document.createElement("div");
  el.className = "screen";
  el.innerHTML = renderHeader("Résultats", false) + (state.mode==="group" ? renderEndGroup() : renderEndSolo());
  // Animate the solo progress ring after paint
  if(state.mode==="solo"){
    requestAnimationFrame(()=>{
      const ring = el.querySelector(".ring-fg");
      if(ring){ requestAnimationFrame(()=>{ ring.style.strokeDashoffset = ring.getAttribute("data-target"); }); }
    });
  }
  return el;
}

/* ===================== RENDER ROOT ===================== */
function renderSplash(){
  const el = document.createElement("div");
  el.className = "screen splash-screen";
  el.innerHTML = `
    <div class="splash-center">
      <div class="splash-dove-wrap">
        <img class="splash-dove" src="${DOVE_ICON}" alt="BibleTrivia">
        <span class="splash-cross">${CROSS_ICON}</span>
      </div>
      <h1 class="splash-title">BibleTrivia</h1>
      <p class="splash-verse">2 Timothée 2:15</p>
    </div>
    <div class="splash-dots"><span class="splash-dot"></span><span class="splash-dot"></span><span class="splash-dot"></span></div>
  `;
  return el;
}

let lastScreen = null;
function render(){
  const app = document.getElementById("app");
  const sameScreen = (state.screen === lastScreen);
  const prevScroll = sameScreen ? app.scrollTop : 0;

  let node;
  if(state.screen==="splash") node = renderSplash();
  else if(state.screen==="mode") node = renderModeSelect();
  else if(state.screen==="setup") node = renderSetup();
  else if(state.screen==="play") node = renderPlay();
  else node = renderEnd();

  // Only play the entrance animation on a genuine screen change,
  // never on same-screen interactions (that was the flicker).
  if(!sameScreen) node.classList.add("screen-enter");

  app.replaceChildren(node);
  if(sameScreen) app.scrollTop = prevScroll;
  lastScreen = state.screen;
}

render();
if(state.screen==="splash"){
  setTimeout(()=>{ state.screen="mode"; render(); }, 2500);
}
</script>
</body>
</html>
