<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#FBF9F5">
<title>BibleTrivia — Quiz Biblique</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%226%22 fill=%22%23E0573B%22/><path d=%22M4 6.5C4 6.5 6 5.7 8.5 5.7C10.2 5.7 12 6.3 12 6.3V17.3C12 17.3 10.2 16.7 8.5 16.7C6 16.7 4 17.5 4 17.5V6.5Z%22 fill=%22white%22/><path d=%22M20 6.5C20 6.5 18 5.7 15.5 5.7C13.8 5.7 12 6.3 12 6.3V17.3C12 17.3 13.8 16.7 15.5 16.7C18 16.7 20 17.5 20 17.5V6.5Z%22 fill=%22white%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF9F5;
    --surface:#FFFFFF;
    --surface-alt:#F4EFE7;
    --ink:#2A241E;
    --ink-soft:#7A7269;
    --border:#EAE3D8;
    --primary:#E0573B;
    --primary-dark:#C7452C;
    --primary-soft:#FCEAE4;
    --gold:#D6A23C;
    --gold-soft:#FBF1DD;
    --green:#4F9B70;
    --green-soft:#E8F3EC;
    --plum:#A0475B;
    --error:#C94F41;
    --error-soft:#FBEAE7;
    --shadow:rgba(42,36,30,0.08);
  }
  *{ box-sizing:border-box; }
  html{ -webkit-tap-highlight-color:transparent; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse 800px 400px at 50% -10%, rgba(224,87,59,0.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:1.25rem;
  }
  button, input{ font-family:'Inter',sans-serif; }
  button{ cursor:pointer; }
  button:focus-visible, input:focus-visible{ outline:2px solid var(--primary); outline-offset:2px; }

  #app{ max-width:640px; margin:0 auto; min-height:calc(100vh - 2.5rem); display:flex; flex-direction:column; }
  .screen{ animation:fadeIn 0.3s ease; display:flex; flex-direction:column; flex:1; }

  svg{ width:100%; height:100%; display:block; }

  /* ---------- Header ---------- */
  .app-header{ display:flex; align-items:center; justify-content:space-between; gap:0.75rem; margin-bottom:1.3rem; }
  .header-title{ font-family:'Poppins',sans-serif; font-weight:600; font-size:1.05rem; }
  .icon-btn{
    width:2.25rem; height:2.25rem; border-radius:50%;
    border:1px solid var(--border); background:var(--surface); color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0.5rem;
  }
  .icon-btn.spacer{ visibility:hidden; }

  /* ---------- Hero / mode select ---------- */
  .hero{ position:relative; text-align:center; padding:2.25rem 1rem 2rem; }
  .hero-mute{ position:absolute; top:0.15rem; right:0.5rem; }
  .hero-icon{ width:3.5rem; height:3.5rem; margin:0 auto 1rem; border-radius:18px; background:var(--primary-soft); color:var(--primary); display:flex; align-items:center; justify-content:center; padding:0.9rem; }
  .hero-title{ font-family:'Poppins',sans-serif; font-weight:700; font-size:2rem; margin:0; letter-spacing:-0.01em; }
  .hero-tag{ color:var(--ink-soft); font-size:0.92rem; margin-top:0.5rem; line-height:1.5; }

  .mode-card{
    width:100%; display:flex; align-items:center; gap:1rem;
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    padding:1.1rem 1.2rem; margin-bottom:0.9rem; text-align:left;
    box-shadow:0 2px 10px var(--shadow); transition:transform 0.15s ease;
  }
  .mode-card:active{ transform:scale(0.98); }
  .mode-icon{ width:3rem; height:3rem; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0.7rem; }
  .mode-icon.group{ background:var(--primary-soft); color:var(--primary); }
  .mode-icon.solo{ background:var(--gold-soft); color:var(--gold); }
  .mode-text{ display:flex; flex-direction:column; gap:0.2rem; }
  .mode-title{ font-family:'Poppins',sans-serif; font-weight:600; font-size:1.02rem; }
  .mode-desc{ font-size:0.85rem; color:var(--ink-soft); line-height:1.4; }

  /* ---------- Cards / setup ---------- */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:1.3rem 1.2rem; margin-bottom:1.1rem; box-shadow:0 2px 10px var(--shadow); }
  .card h2{ font-family:'Poppins',sans-serif; font-size:1rem; font-weight:600; margin:0 0 0.9rem; }

  .team-row{ display:flex; align-items:center; gap:0.6rem; margin-bottom:0.6rem; }
  .team-dot{ width:0.8rem; height:0.8rem; border-radius:50%; flex-shrink:0; }
  .dot-sm{ display:inline-block; width:0.5rem; height:0.5rem; border-radius:50%; margin-right:0.4rem; vertical-align:middle; flex-shrink:0; }
  .team-row input{ flex:1; background:var(--surface-alt); border:1px solid var(--border); color:var(--ink); padding:0.65rem 0.8rem; border-radius:10px; font-size:0.95rem; }
  .team-remove{ background:none; border:none; color:var(--ink-soft); width:1.8rem; height:1.8rem; padding:0.4rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .team-remove:disabled{ opacity:0.25; }

  .add-team{ width:100%; display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-top:0.4rem; background:transparent; border:1.5px dashed var(--primary); color:var(--primary); border-radius:12px; padding:0.65rem; font-size:0.9rem; font-weight:600; }
  .add-team .ico{ width:1rem; height:1rem; }
  .add-team:disabled{ opacity:0.35; }

  .chip-row{ display:flex; gap:0.5rem; flex-wrap:wrap; }
  .chip{ flex:1; min-width:30%; text-align:center; background:var(--surface-alt); border:1px solid var(--border); color:var(--ink-soft); padding:0.65rem 0.5rem; border-radius:12px; font-size:0.85rem; font-weight:600; }
  .chip.active{ background:var(--primary-soft); border-color:var(--primary); color:var(--primary-dark); }
  .chip .sub{ display:block; font-weight:400; font-size:0.72rem; margin-top:0.15rem; opacity:0.85; }

  .rules{ font-size:0.85rem; color:var(--ink-soft); line-height:1.6; background:var(--surface-alt); border-radius:14px; padding:0.9rem 1rem; margin-bottom:1.1rem; }
  .rules b{ color:var(--ink); }

  .btn-primary{ width:100%; background:var(--primary); color:#fff; border:none; border-radius:14px; padding:1rem; font-size:1rem; font-weight:700; box-shadow:0 4px 14px rgba(224,87,59,0.28); }
  .btn-primary:disabled{ opacity:0.4; box-shadow:none; }
  .error-msg{ color:var(--error); font-size:0.82rem; text-align:center; margin-top:0.6rem; min-height:1.2em; }

  /* ---------- Play ---------- */
  .play-meta{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:0.5rem 0.75rem; margin-bottom:0.9rem; }
  .tier-chip{ display:inline-flex; align-items:center; gap:0.4rem; font-size:0.85rem; font-weight:600; }
  .tier-dots{ display:inline-flex; gap:3px; }
  .tdot{ width:6px; height:6px; border-radius:50%; background:var(--border); }
  .tdot.filled{ background:currentColor; }
  .tier-facile{ color:var(--green); }
  .tier-moyen{ color:var(--gold); }
  .tier-difficile{ color:var(--plum); }
  .q-counter{ font-size:0.82rem; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .streak-chip{ display:flex; align-items:center; gap:0.3rem; background:var(--gold-soft); color:#8f6318; padding:0.28rem 0.65rem; border-radius:20px; font-size:0.8rem; font-weight:700; }
  .streak-chip .ico{ width:0.85rem; height:0.85rem; }

  .progress-track{ display:flex; gap:4px; margin-bottom:1.4rem; }
  .progress-seg{ flex:1; height:5px; border-radius:3px; background:var(--border); }
  .progress-seg.done{ background:var(--primary); }
  .progress-seg.current{ background:linear-gradient(90deg, var(--primary), var(--border)); }

  .question-card{ background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1.6rem 1.4rem; margin-bottom:1.1rem; box-shadow:0 2px 12px var(--shadow); text-align:center; }
  .question-card .qtext{ font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(1.15rem, 4.2vw, 1.5rem); line-height:1.45; }

  .options-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; margin-bottom:1.1rem; }
  @media (max-width:420px){ .options-grid{ grid-template-columns:1fr; } }
  .option-btn{
    display:flex; align-items:center; gap:0.6rem;
    background:var(--surface); border:1.5px solid var(--border); border-radius:14px;
    padding:0.8rem 0.85rem; font-size:0.92rem; color:var(--ink); text-align:left; width:100%;
  }
  .option-btn .letter{ font-weight:700; color:var(--primary); font-size:0.78rem; flex-shrink:0; width:1.4rem; height:1.4rem; border-radius:50%; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; }
  .option-btn .opt-text{ flex:1; }
  .option-btn .opt-icon{ flex-shrink:0; width:1.1rem; height:1.1rem; }
  .option-btn.correct{ background:var(--green-soft); border-color:var(--green); }
  .option-btn.correct .letter{ background:var(--green); color:#fff; }
  .option-btn.correct .opt-icon{ color:var(--green); }
  .option-btn.incorrect{ background:var(--error-soft); border-color:var(--error); }
  .option-btn.incorrect .letter{ background:var(--error); color:#fff; }
  .option-btn.incorrect .opt-icon{ color:var(--error); }
  .option-btn.dim{ opacity:0.55; }

  .fact-card{ display:flex; gap:0.7rem; align-items:flex-start; background:var(--gold-soft); border:1px solid rgba(214,162,60,0.35); border-radius:14px; padding:0.85rem 1rem; margin-bottom:1.1rem; animation:fadeIn 0.3s ease; }
  .fact-card .ficon{ width:1.2rem; height:1.2rem; color:var(--gold); flex-shrink:0; margin-top:0.1rem; }
  .fact-card .ftext{ font-size:0.87rem; color:#6b5219; line-height:1.55; }

  .btn-reveal{ width:100%; background:transparent; border:1.5px solid var(--primary); color:var(--primary); border-radius:14px; padding:0.95rem; font-size:0.95rem; font-weight:700; margin-bottom:1.1rem; }
  .btn-next{ width:100%; background:var(--primary); color:#fff; border:none; border-radius:14px; padding:1rem; font-size:1rem; font-weight:700; box-shadow:0 4px 14px rgba(224,87,59,0.28); }
  .btn-next:disabled{ opacity:0.4; box-shadow:none; }

  .award-label{ font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); font-weight:600; margin-bottom:0.6rem; }
  .award-grid{ display:flex; flex-wrap:wrap; gap:0.6rem; margin-bottom:1.1rem; }
  .award-btn{ flex:1; min-width:45%; display:flex; align-items:center; justify-content:space-between; gap:0.5rem; padding:0.7rem 0.9rem; border-radius:12px; border:1.5px solid var(--border); background:var(--surface); color:var(--ink); font-size:0.85rem; font-weight:600; }
  .award-btn .dot{ width:0.65rem; height:0.65rem; border-radius:50%; flex-shrink:0; }
  .award-btn.awarded{ background:var(--primary-soft); border-color:var(--primary); color:var(--primary-dark); }
  .award-btn .pts{ font-variant-numeric:tabular-nums; opacity:0.75; }

  .score-strip{ display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:1.4rem; }
  .score-pane{ flex:1; min-width:28%; border-radius:12px; padding:0.55rem 0.7rem; border:1px solid var(--border); background:var(--surface); font-size:0.78rem; }
  .score-pane .nm{ display:flex; align-items:center; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:0.2rem; }
  .score-row{ display:flex; align-items:center; gap:0.3rem; }
  .score-pane .sc{ font-weight:700; font-variant-numeric:tabular-nums; flex:1; }
  .adj-btn{ width:1.2rem; height:1.2rem; border-radius:50%; border:1px solid var(--border); background:var(--surface-alt); color:var(--ink-soft); font-size:0.7rem; line-height:1; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .adj-btn:active{ background:var(--primary-soft); color:var(--primary); }

  .solo-score-bar{ display:flex; justify-content:space-between; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:0.8rem 1rem; margin-top:1.4rem; }
  .solo-score-bar .label{ font-size:0.78rem; color:var(--ink-soft); }
  .solo-score-bar .value{ font-family:'Poppins',sans-serif; font-weight:700; font-size:1.2rem; color:var(--primary); }

  /* ---------- End ---------- */
  .end-hero{ text-align:center; padding:0.5rem 0 1.6rem; }
  .end-icon{ width:3.5rem; height:3.5rem; margin:0 auto 0.9rem; border-radius:50%; background:var(--gold-soft); color:var(--gold); display:flex; align-items:center; justify-content:center; padding:0.9rem; }
  .end-title{ font-family:'Poppins',sans-serif; font-weight:700; font-size:clamp(1.4rem,5.5vw,1.85rem); margin:0 0 0.3rem; }
  .end-sub{ color:var(--ink-soft); font-size:0.9rem; }

  .rank-row{ display:flex; align-items:center; gap:0.75rem; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:0.85rem 1rem; margin-bottom:0.6rem; }
  .rank-row.first{ border-color:var(--gold); background:var(--gold-soft); }
  .rank-medal{ width:1.9rem; height:1.9rem; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; background:var(--surface-alt); color:var(--ink-soft); }
  .rank-row.first .rank-medal{ background:var(--gold); color:#fff; }
  .rank-dot{ width:0.7rem; height:0.7rem; border-radius:50%; flex-shrink:0; }
  .rank-name{ flex:1; font-weight:600; font-size:0.96rem; }
  .rank-score-wrap{ display:flex; align-items:center; gap:0.4rem; }
  .rank-score{ font-weight:700; font-variant-numeric:tabular-nums; color:var(--primary); }

  .solo-summary{ background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:1.4rem; text-align:center; margin-bottom:1rem; }
  .solo-summary .big-score-label{ font-size:0.82rem; color:var(--ink-soft); }
  .solo-summary .big-score{ font-family:'Poppins',sans-serif; font-weight:700; font-size:2.4rem; color:var(--primary); }
  .solo-stats{ display:flex; justify-content:center; gap:1.8rem; margin-top:1rem; }
  .solo-stat .val{ font-weight:700; font-size:1.15rem; display:flex; align-items:center; gap:0.3rem; justify-content:center; }
  .solo-stat .val .ico{ width:1rem; height:1rem; color:var(--gold); }
  .solo-stat .lbl{ font-size:0.75rem; color:var(--ink-soft); margin-top:0.15rem; }

  .end-actions{ display:flex; gap:0.7rem; margin-top:0.5rem; }
  .end-actions button{ flex:1; border-radius:14px; padding:0.9rem; font-size:0.9rem; font-weight:700; }
  .btn-replay{ background:var(--primary); border:none; color:#fff; }
  .btn-newgame{ background:transparent; border:1.5px solid var(--border); color:var(--ink); }

  footer.hint{ text-align:center; color:var(--ink-soft); font-size:0.75rem; margin-top:auto; padding-top:2rem; opacity:0.75; }

  .confetti-layer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:40; }
  .confetti-piece{ position:absolute; top:-10px; width:8px; height:14px; opacity:0.9; animation:confettiFall linear forwards; }

  @keyframes confettiFall{ to{ transform:translateY(110vh) rotate(540deg); opacity:0.2; } }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===================== ICONS (hand-built, no emoji) ===================== */
const ICONS = {

/* ===================== DATA ===================== */
const BANK = {
  facile: [
    { q:"Qui a construit une grande arche pour survivre au déluge ?", options:["Abraham","Noé","Moïse","David"], correct:"Noé", fact:"Dieu a demandé à Noé de faire entrer un couple de chaque espèce animale dans l'arche (Genèse 6-7)." },
    { q:"Qui a vaincu le géant Goliath avec une simple fronde ?", options:["Samson","Josué","David","Salomon"], correct:"David", fact:"David n'était encore qu'un jeune berger quand il a affronté Goliath (1 Samuel 17)." },
    { q:"Quel est le premier livre de la Bible ?", options:["L'Exode","La Genèse","Les Psaumes","Matthieu"], correct:"La Genèse", fact:"« Genèse » signifie « origine » ou « commencement »." },

const TIER_INFO = {
  facile:    { label:"Facile",    level:1, pts:10, cls:"tier-facile" },

};

/* ===================== STATE ===================== */
let state = {
  screen:"mode",
  mode:null,
  teams:[ {name:"Équipe 1"}, {name:"Équipe 2"} ],
  lengthKey:"normale",
  scores:[],
  soloScore:0,
  soloStreak:0,

  questions:[],
  currentIndex:0,
  revealed:false,
  awarded:[],
  muted:false
};

/* ===================== UTILS ===================== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function muteLabel(){ return state.muted ? "Activer le son" : "Couper le son"; }

/* ===================== SOUND (doux, ondes sinusoïdales) ===================== */
let actx = null;
function getCtx(){ if(!actx){ actx = new (window.AudioContext||window.webkitAudioContext)(); } return actx; }
function tone(freq, start, dur, vol){
  const ctx = getCtx();
  if(ctx.state==="suspended"){ ctx.resume(); }
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.value = freq;
  gain.gain.value = 0;
  osc.connect(gain); gain.connect(ctx.destination);
  const t0 = ctx.currentTime + start;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol, t0+0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.start(t0); osc.stop(t0+dur+0.05);
}
function playCorrect(){ if(state.muted) return; tone(587,0,0.4,0.08); tone(784,0.1,0.5,0.07); }
function playIncorrect(){ if(state.muted) return; tone(392,0,0.3,0.06); tone(311,0.09,0.4,0.05); }
function playTap(){ if(state.muted) return; tone(523,0,0.12,0.04); }
function playWin(){ if(state.muted) return; [523,659,784].forEach((f,i)=>tone(f,i*0.17,0.6,0.065)); }
function playStreak(){ if(state.muted) return; tone(880,0,0.22,0.05); tone(1047,0.09,0.32,0.045); }
function toggleMute(){ state.muted = !state.muted; render(); }

/* ===================== NAVIGATION ===================== */
function selectMode(m){ state.mode = m; state.screen = "setup"; render(); }
function goToModeSelect(){ state.screen = "mode"; render(); }

/* ===================== SETUP (group) ===================== */
function addTeam(){ if(state.teams.length>=6) return; state.teams.push({name:"Équipe "+(state.teams.length+1)}); render(); }
function removeTeam(i){ if(state.teams.length<=2) return; state.teams.splice(i,1); render(); }
function renameTeam(i, val){ state.teams[i].name = val; }
function setLength(key){ state.lengthKey = key; render(); }
function validTeams(){ return state.teams.filter(t=>t.name.trim().length>0).map(t=>({name:t.name.trim()})); }

/* ===================== GAME LIFECYCLE ===================== */
function buildQuestions(){
  const n = LENGTHS[state.lengthKey];
  let list = [];
  ["facile","moyen","difficile"].forEach(tier=>{
    const pool = shuffle(BANK[tier]);
    pool.slice(0,n).forEach(q=>{ list.push({ ...q, tier, shuffledOptions: shuffle(q.options) }); });
  });
  state.questions = list;
}
function startGame(){
  if(state.mode==="group"){
    const valid = validTeams();
    if(valid.length<2){
      document.getElementById("setupError").textContent = "Ajoutez au moins deux équipes avec un nom pour commencer.";
      return;
    }
    state.teams = valid;
    state.scores = valid.map(()=>0);
  } else {
    state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0;
  }
  buildQuestions();
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function replayGame(){
  buildQuestions();
  if(state.mode==="group"){ state.scores = state.teams.map(()=>0); }
  else { state.soloScore = 0; state.soloStreak = 0; state.soloBestStreak = 0; }
  state.currentIndex = 0; state.revealed = false; state.awarded = []; state.soloSelected = null;
  state.screen = "play";
  render();
}
function newGame(){
  state = { screen:"mode", mode:null, teams:[{name:"Équipe 1"},{name:"Équipe 2"}], lengthKey: state.lengthKey, scores:[], soloScore:0, soloStreak:0, soloBestStreak:0, soloSelected:null, questions:[], currentIndex:0, revealed:false, awarded:[], muted: state.muted };
  render();
}

/* ===================== PLAY ===================== */
function currentQ(){ return state.questions[state.currentIndex]; }

function revealAnswer(){ state.revealed = true; playCorrect(); render(); }

function soloAnswer(idx){
  if(state.revealed) return;
  const q = currentQ();
  const opt = q.shuffledOptions[idx];
  state.soloSelected = opt;
  state.revealed = true;
  if(opt===q.correct){
    state.soloScore += TIER_INFO[q.tier].pts;
    state.soloStreak += 1;
    if(state.soloStreak > state.soloBestStreak) state.soloBestStreak = state.soloStreak;
    if(state.soloStreak>=3 && state.soloStreak%3===0){ playStreak(); } else { playCorrect(); }
  } else {
    state.soloStreak = 0;
    playIncorrect();
  }
  render();
}

function toggleAward(teamIdx){
  const q = currentQ();
  const pos = state.awarded.indexOf(teamIdx);
  if(pos>=0){ state.awarded.splice(pos,1); state.scores[teamIdx] -= TIER_INFO[q.tier].pts; }
  else { state.awarded.push(teamIdx); state.scores[teamIdx] += TIER_INFO[q.tier].pts; playTap(); }
  render();
}
function adjustScore(teamIdx, delta){ state.scores[teamIdx] = Math.max(0, state.scores[teamIdx]+delta); render(); }

function nextQuestion(){
  if(!state.revealed) return;
  if(state.currentIndex >= state.questions.length-1){
    state.screen = "end";
    render();
    launchConfetti();
    playWin();
    return;
  }
  state.currentIndex++;
  state.revealed = false; state.awarded = []; state.soloSelected = null;
  render();
}

function rankedTeamIndices(){ return state.teams.map((t,i)=>i).sort((a,b)=>state.scores[b]-state.scores[a]); }
function computeRanks(){
  const ranked = rankedTeamIndices();
  const ranks = []; let prevScore=null, prevRank=0;
  ranked.forEach((teamIdx,pos)=>{
    const sc = state.scores[teamIdx];
    if(sc===prevScore){ ranks.push(prevRank); } else { ranks.push(pos+1); prevRank=pos+1; prevScore=sc; }
  });
  return ranked.map((teamIdx,pos)=>({teamIdx, rank:ranks[pos]}));
}
function maxPossibleScore(){ return state.questions.reduce((sum,q)=>sum+TIER_INFO[q.tier].pts,0); }
function soloPerformanceMessage(pct){
  if(pct>=85) return "Excellent ! Tu connais vraiment bien ta Bible.";
  if(pct>=65) return "Très bien ! Continue comme ça.";
  if(pct>=40) return "Bien joué, il y a de bonnes bases.";
  return "Beau début ! Chaque partie t'apprend un peu plus.";
}

function launchConfetti(){
  const layer = document.createElement("div");
  layer.className = "confetti-layer";
  document.body.appendChild(layer);
  const colors = TEAM_COLORS.concat(["#E0573B","#D6A23C"]);
  for(let i=0;i<70;i++){
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random()*100+"vw";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (2.2+Math.random()*1.6)+"s";
    p.style.animationDelay = (Math.random()*0.6)+"s";
    p.style.borderRadius = Math.random()>0.5 ? "50%" : "2px";
    layer.appendChild(p);
  }
  setTimeout(()=>layer.remove(), 4200);
}

/* ===================== RENDER: PLAY ===================== */
function renderPlay(){
  const el = document.createElement("div");
  el.className = "screen";
  const q = currentQ();
  const info = TIER_INFO[q.tier];
  const total = state.questions.length;

  const optionsHtml = q.shuffledOptions.map((opt,idx)=>{
    const letter = ["A","B","C","D"][idx];
    let cls = "option-btn";
    let trailingIcon = "";
    if(state.revealed){
      if(opt===q.correct){ cls+=" correct"; trailingIcon = `<span class="opt-icon">${ICONS.checkCircle}</span>`; }
      else if(state.mode==="solo" && opt===state.soloSelected){ cls+=" incorrect"; trailingIcon = `<span class="opt-icon">${ICONS.xCircle}</span>`; }
      else { cls+=" dim"; }
    }
    const interactive = state.mode==="solo" && !state.revealed;
    if(interactive){
      return `<button class="${cls}" onclick="soloAnswer(${idx})"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span></button>`;
    }
    return `<div class="${cls}"><span class="letter">${letter}</span><span class="opt-text">${escapeHtml(opt)}</span>${trailingIcon}</div>`;
  }).join("");

  let bottomHtml;
  if(state.mode==="group"){
    const ranked = rankedTeamIndices();
    bottomHtml = `
      ${state.revealed ? `<div class="fact-card"><span class="ficon">${ICONS.book}</span><span class="ftext">${escapeHtml(q.fact)}</span></div>` : `<button class="btn-reveal" onclick="revealAnswer()">Révéler la réponse</button>`}
      ${state.revealed ? `
        <div class="award-label">Qui a trouvé la bonne réponse ?</div>
        <div class="award-grid">
          ${state.teams.map((t,i)=>`
            <button class="award-btn ${state.awarded.includes(i)?'awarded':''}" onclick="toggleAward(${i})">
              <span style="display:flex;align-items:center;gap:0.5rem;overflow:hidden;">
                <span class="dot" style="background:${TEAM_COLORS[i%6]}"></span>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(t.name)}</span>
              </span>
              <span class="pts">+${info.pts}</span>
            </button>
          `).join("")}
        </div>
      ` : ""}
      <button class="btn-next" onclick="nextQuestion()" ${!state.revealed?"disabled":""}>${state.currentIndex>=total-1 ? "Voir les résultats" : "Question suivante"}</button>
      <div class="score-strip">
        ${ranked.map(i=>`
          <div class="score-pane">
            <span class="nm"><span class="dot-sm" style="background:${TEAM_COLORS[i%6]}"></span>${escapeHtml(state.teams[i].name)}</span>
            <span class="score-row">
              <button class="adj-btn" onclick="adjustScore(${i},-10)" aria-label="Retirer 10 points">−</button>
              <span class="sc">${state.scores[i]}</span>
              <button class="adj-btn" onclick="adjustScore(${i},10)" aria-label="Ajouter 10 points">+</button>
            </span>
          </div>
        `).join("")}
      </div>
    `;
  } else {
    bottomHtml = `
      ${state.revealed ? `<div class="fact-card"><span class="ficon">${ICONS.book}</span><span class="ftext">${escapeHtml(q.fact)}</span></div>` : ""}
      <button class="btn-next" onclick="nextQuestion()" ${!state.revealed?"disabled":""}>${state.currentIndex>=total-1 ? "Voir les résultats" : "Continuer"}</button>
      <div class="solo-score-bar"><span class="label">Score</span><span class="value">${state.soloScore} pts</span></div>
    `;
  }

  el.innerHTML = `
    ${renderHeader("BibleTrivia", true)}
    <div class="play-meta">
      <span class="tier-chip ${info.cls}">${tierDotsHtml(info.level)}${info.label} · ${info.pts} pts</span>
      <span class="q-counter">${state.currentIndex+1}/${total}</span>
      ${state.mode==="solo" ? `<span class="streak-chip"><span class="ico">${ICONS.bolt}</span>${state.soloStreak}</span>` : ""}
    </div>
    <div class="progress-track">
      ${state.questions.map((_,i)=>`<div class="progress-seg ${i<state.currentIndex?'done':(i===state.currentIndex?'current':'')}"></div>`).join("")}
    </div>
    <div class="question-card"><div class="qtext">${escapeHtml(q.q)}</div></div>
    <div class="options-grid">${optionsHtml}</div>
    ${bottomHtml}
  `;
  return el;
}

/* ===================== RENDER: END ===================== */
function renderEndGroup(){
  const withRanks = computeRanks();
  const winners = withRanks.filter(r=>r.rank===1).map(r=>state.teams[r.teamIdx].name);
  return `
    <div class="end-hero">
      <div class="end-icon">${ICONS.trophy}</div>
      <h1 class="end-title">${winners.length>1 ? "Égalité en tête !" : escapeHtml(winners[0])}</h1>
      <p class="end-sub">Bravo à toutes les équipes — continuez à explorer la Parole.</p>
    </div>
    ${withRanks.map(r=>`
      <div class="rank-row ${r.rank===1?'first':''}">
        <span class="rank-medal">${r.rank}</span>
        <span class="rank-dot" style="background:${TEAM_COLORS[r.teamIdx%6]}"></span>
        <span class="rank-name">${escapeHtml(state.teams[r.teamIdx].name)}</span>
        <span class="rank-score-wrap">
          <button class="adj-btn" onclick="adjustScore(${r.teamIdx},-10)" aria-label="Retirer 10 points">−</button>
          <span class="rank-score">${state.scores[r.teamIdx]} pts</span>
          <button class="adj-btn" onclick="adjustScore(${r.teamIdx},10)" aria-label="Ajouter 10 points">+</button>
        </span>
      </div>
    `).join("")}
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Nouvelle partie</button>
    </div>
  `;
}
function renderEndSolo(){
  const max = maxPossibleScore();
  const pct = max>0 ? Math.round((state.soloScore/max)*100) : 0;
  return `
    <div class="end-hero">
      <div class="end-icon">${ICONS.trophy}</div>
      <h1 class="end-title">Partie terminée</h1>
      <p class="end-sub">${soloPerformanceMessage(pct)}</p>
    </div>
    <div class="solo-summary">
      <div class="big-score-label">Score final</div>
      <div class="big-score">${state.soloScore}</div>
      <div class="solo-stats">
        <div class="solo-stat"><div class="val"><span class="ico">${ICONS.bolt}</span>${state.soloBestStreak}</div><div class="lbl">Meilleure série</div></div>
        <div class="solo-stat"><div class="val">${pct}%</div><div class="lbl">Score maximal</div></div>
      </div>
    </div>
    <div class="end-actions">
      <button class="btn-replay" onclick="replayGame()">Rejouer</button>
      <button class="btn-newgame" onclick="newGame()">Nouvelle partie</button>
    </div>
  `;
}
function renderEnd(){
  const el = document.createElement("div");
  el.className = "screen";
  el.innerHTML = renderHeader("Résultats", false) + (state.mode==="group" ? renderEndGroup() : renderEndSolo());
  return el;
}

/* ===================== RENDER ROOT ===================== */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  let node;
  if(state.screen==="mode") node = renderModeSelect();
  else if(state.screen==="setup") node = renderSetup();
  else if(state.screen==="play") node = renderPlay();
  else node = renderEnd();
  app.appendChild(node);
}

render();
</script>
</body>
</html>
